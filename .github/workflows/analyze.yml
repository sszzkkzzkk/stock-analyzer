name: 株式AI自動分析

on:
  schedule:
    - cron: "0,2,4 21 * * 0-4"   # JST 06:00 / 06:02 / 06:04
    - cron: "5,7,9 0 * * 1-5"    # JST 09:05 / 09:07 / 09:09
    - cron: "0,2,4 3 * * 1-5"    # JST 12:00 / 12:02 / 12:04
    - cron: "35,37,39 6 * * 1-5" # JST 15:35 / 15:37 / 15:39
  workflow_dispatch:
    inputs:
      session:
        description: "600 or 905 or 1200 or 1535"
        required: true
        default: "600"
        type: choice
        options:
          - "600"
          - "905"
          - "1200"
          - "1535"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: pip install -r requirements.txt

      - name: git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: prepare gh-pages worktree
        shell: bash
        run: |
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo "<!DOCTYPE html><html><body>init</body></html>" > index.html
            mkdir -p data
            touch .nojekyll
            git add .
            git commit -m "init gh-pages"
            git push origin gh-pages
            git checkout main
            git worktree add gh-pages-worktree origin/gh-pages
          fi

      - name: restore data from gh-pages
        shell: bash
        run: |
          mkdir -p data
          if [ -d gh-pages-worktree/data ]; then
            cp -r gh-pages-worktree/data/. data/ 2>/dev/null || true
          fi

      - name: decide session
        id: session
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.session }}" ]; then
            echo "session=${{ github.event.inputs.session }}" >> "$GITHUB_OUTPUT"
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW_JST=$(TZ='Asia/Tokyo' date '+%H:%M')
          TODAY_JST=$(TZ='Asia/Tokyo' date '+%F')

          get_json_date () {
            FILE="$1"
            if [ -f "$FILE" ]; then
              python - <<PY
import json
try:
    with open("$FILE", encoding="utf-8") as f:
        data = json.load(f)
    print(data.get("date", ""))
except Exception:
    print("")
PY
            else
              echo ""
            fi
          }

          D600=$(get_json_date "data/latest_600.json")
          D905=$(get_json_date "data/latest_905.json")
          D1200=$(get_json_date "data/latest_1200.json")
          D1535=$(get_json_date "data/latest_1535.json")

          SESSION=""
          RUN_NOW="false"

          if [[ "$NOW_JST" > "05:59" && "$NOW_JST" < "06:10" && "$D600" != "$TODAY_JST" ]]; then
            SESSION="600"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "09:04" && "$NOW_JST" < "09:15" && "$D905" != "$TODAY_JST" ]]; then
            SESSION="905"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "11:59" && "$NOW_JST" < "12:10" && "$D1200" != "$TODAY_JST" ]]; then
            SESSION="1200"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "15:34" && "$NOW_JST" < "15:45" && "$D1535" != "$TODAY_JST" ]]; then
            SESSION="1535"
            RUN_NOW="true"
          fi

          echo "now_jst=$NOW_JST" >> "$GITHUB_OUTPUT"
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "run_now=$RUN_NOW" >> "$GITHUB_OUTPUT"

      - name: stop when no session is due
        if: steps.session.outputs.run_now != 'true'
        run: |
          echo "No session due now."
          echo "JST now: ${{ steps.session.outputs.now_jst }}"
          exit 0

      - name: run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python main.py

      - name: inspect generated files
        shell: bash
        run: |
          echo "=== data files ==="
          ls -la data || true

          echo "=== latest_600.json ==="
          test -f data/latest_600.json && head -40 data/latest_600.json || true

          echo "=== latest_905.json ==="
          test -f data/latest_905.json && head -40 data/latest_905.json || true

          echo "=== latest_1200.json ==="
          test -f data/latest_1200.json && head -40 data/latest_1200.json || true

          echo "=== latest_1535.json ==="
          test -f data/latest_1535.json && head -40 data/latest_1535.json || true

          echo "=== review_log.json ==="
          test -f data/review_log.json && head -40 data/review_log.json || true

      - name: copy publish files to gh-pages
        shell: bash
        run: |
          rm -rf gh-pages-worktree/*
          cp index.html gh-pages-worktree/index.html
          mkdir -p gh-pages-worktree/data
          cp -r data/. gh-pages-worktree/data/
          touch gh-pages-worktree/.nojekyll

      - name: commit and push gh-pages
        shell: bash
        run: |
          cd gh-pages-worktree
          git add index.html data .nojekyll
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update site data: ${{ steps.session.outputs.session }}"
          git push origin HEAD:gh-pages