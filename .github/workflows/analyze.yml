name: 株式AI自動分析

on:
  schedule:
    - cron: "0 21 * * 0-4"
    - cron: "5 0 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "35 6 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "600 / 905 / 1200 / 1535"
        required: false
        default: "600"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish
        continue-on-error: true

      - name: Prepare publish dir
        shell: bash
        run: |
          if [ ! -d publish/.git ]; then
            rm -rf publish
            mkdir -p publish
            cd publish
            git init
            git checkout -b gh-pages
            touch .nojekyll
            mkdir -p data
            cd ..
          fi

      - name: Restore previous data
        shell: bash
        run: |
          mkdir -p data
          if [ -d publish/data ]; then
            cp -r publish/data/. data/ 2>/dev/null || true
          fi

      - name: Decide session
        id: session
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.session }}"
          NOW=$(TZ='Asia/Tokyo' date '+%H:%M')
          TODAY=$(TZ='Asia/Tokyo' date '+%F')

          echo "now_jst=$NOW" >> "$GITHUB_OUTPUT"
          echo "today_jst=$TODAY" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT" ]; then
            echo "session=$INPUT" >> "$GITHUB_OUTPUT"
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          get_date() {
            FILE="$1"
            [ -f "$FILE" ] && python3 -c "
import json,sys
try:
    d=json.load(open('$FILE',encoding='utf-8'))
    print(d.get('date',''))
except:
    print('')
" || echo ""
          }

          D600=$(get_date "data/latest_600.json")
          D905=$(get_date "data/latest_905.json")
          D1200=$(get_date "data/latest_1200.json")
          D1535=$(get_date "data/latest_1535.json")

          SESSION=""
          RUN_NOW="false"

          H=$(TZ='Asia/Tokyo' date '+%H')
          M=$(TZ='Asia/Tokyo' date '+%M')
          HM="${H}${M}"

          if [ "$H" = "06" ] && [ "$D600" != "$TODAY" ]; then
            SESSION="600"; RUN_NOW="true"
          elif [ "$H" = "09" ] && [ "$M" -ge "05" ] && [ "$D905" != "$TODAY" ]; then
            SESSION="905"; RUN_NOW="true"
          elif [ "$H" = "12" ] && [ "$D1200" != "$TODAY" ]; then
            SESSION="1200"; RUN_NOW="true"
          elif [ "$H" = "15" ] && [ "$M" -ge "35" ] && [ "$D1535" != "$TODAY" ]; then
            SESSION="1535"; RUN_NOW="true"
          fi

          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "run_now=$RUN_NOW" >> "$GITHUB_OUTPUT"

      - name: Stop when no session is due
        if: steps.session.outputs.run_now != 'true'
        run: |
          echo "No session due. JST=${{ steps.session.outputs.now_jst }}"
          exit 0

      - name: Run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python main.py

      - name: Copy publish files
        shell: bash
        run: |
          rm -rf publish/*
          cp index.html publish/index.html
          mkdir -p publish/data
          cp -r data/. publish/data/
          touch publish/.nojekyll

      - name: Commit and push gh-pages
        shell: bash
        run: |
          cd publish
          git add index.html data .nojekyll
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update: ${{ steps.session.outputs.session }} ${{ steps.session.outputs.today_jst }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
