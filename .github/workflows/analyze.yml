name: 株式AI自動分析

on:
  schedule:
    - cron: "0,2,4 21 * * 0-4"   # JST 06:00 / 06:02 / 06:04
    - cron: "5,7,9 0 * * 1-5"    # JST 09:05 / 09:07 / 09:09
    - cron: "0,2,4 3 * * 1-5"    # JST 12:00 / 12:02 / 12:04
    - cron: "35,37,39 6 * * 1-5" # JST 15:35 / 15:37 / 15:39
  workflow_dispatch:
    inputs:
      session:
        description: "600 / 905 / 1200 / 1535"
        required: false
        default: "600"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout gh-pages to publish dir
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish
        continue-on-error: true

      - name: Prepare publish dir
        shell: bash
        run: |
          if [ ! -d publish/.git ]; then
            rm -rf publish
            mkdir -p publish
            cd publish
            git init
            git checkout -b gh-pages
            touch .nojekyll
            mkdir -p data
            cd ..
          fi

      - name: Restore previous data
        shell: bash
        run: |
          mkdir -p data
          if [ -d publish/data ]; then
            cp -r publish/data/. data/ 2>/dev/null || true
          fi

      - name: Decide session
        id: session
        shell: bash
        run: |
          INPUT_SESSION="${{ github.event.inputs.session }}"

          if [ -n "$INPUT_SESSION" ]; then
            case "$INPUT_SESSION" in
              600|905|1200|1535)
                echo "session=$INPUT_SESSION" >> "$GITHUB_OUTPUT"
                echo "run_now=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              *)
                echo "Invalid manual session: $INPUT_SESSION"
                exit 1
                ;;
            esac
          fi

          NOW_JST=$(TZ='Asia/Tokyo' date '+%H:%M')
          TODAY_JST=$(TZ='Asia/Tokyo' date '+%F')

          get_json_date () {
            FILE="$1"
            if [ -f "$FILE" ]; then
              python - <<PY
import json
try:
    with open("$FILE", encoding="utf-8") as f:
        data = json.load(f)
    print(data.get("date", ""))
except Exception:
    print("")
PY
            else
              echo ""
            fi
          }

          D600=$(get_json_date "data/latest_600.json")
          D905=$(get_json_date "data/latest_905.json")
          D1200=$(get_json_date "data/latest_1200.json")
          D1535=$(get_json_date "data/latest_1535.json")

          SESSION=""
          RUN_NOW="false"

          if [[ "$NOW_JST" > "05:59" && "$NOW_JST" < "06:10" && "$D600" != "$TODAY_JST" ]]; then
            SESSION="600"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "09:04" && "$NOW_JST" < "09:15" && "$D905" != "$TODAY_JST" ]]; then
            SESSION="905"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "11:59" && "$NOW_JST" < "12:10" && "$D1200" != "$TODAY_JST" ]]; then
            SESSION="1200"
            RUN_NOW="true"
          elif [[ "$NOW_JST" > "15:34" && "$NOW_JST" < "15:45" && "$D1535" != "$TODAY_JST" ]]; then
            SESSION="1535"
            RUN_NOW="true"
          fi

          echo "now_jst=$NOW_JST" >> "$GITHUB_OUTPUT"
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "run_now=$RUN_NOW" >> "$GITHUB_OUTPUT"

      - name: Stop when no session is due
        if: steps.session.outputs.run_now != 'true'
        run: |
          echo "No session due now."
          echo "JST now: ${{ steps.session.outputs.now_jst }}"
          exit 0

      - name: Run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python main.py

      - name: Inspect generated files
        shell: bash
        run: |
          echo "=== data files ==="
          ls -la data || true

          echo "=== latest_600.json ==="
          test -f data/latest_600.json && head -40 data/latest_600.json || true

          echo "=== latest_905.json ==="
          test -f data/latest_905.json && head -40 data/latest_905.json || true

          echo "=== latest_1200.json ==="
          test -f data/latest_1200.json && head -40 data/latest_1200.json || true

          echo "=== latest_1535.json ==="
          test -f data/latest_1535.json && head -40 data/latest_1535.json || true

          echo "=== review_log.json ==="
          test -f data/review_log.json && head -40 data/review_log.json || true

      - name: Copy publish files
        shell: bash
        run: |
          rm -rf publish/*
          cp index.html publish/index.html
          mkdir -p publish/data
          cp -r data/. publish/data/
          touch publish/.nojekyll

      - name: Commit and push gh-pages
        shell: bash
        run: |
          cd publish
          git add index.html data .nojekyll
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update site data: ${{ steps.session.outputs.session }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages