name: stock-analysis-scheduled

on:
  workflow_dispatch:
  schedule:
    # JST 06:00
    - cron: '0 21 * * 0-4'
    # JST 09:10
    - cron: '10 0 * * 1-5'
    # JST 12:00
    - cron: '0 3 * * 1-5'
    # JST 15:35
    - cron: '35 6 * * 1-5'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jpholiday anthropic

      - name: Resolve session from JST time
        id: session
        shell: bash
        run: |
          NOW_JST=$(TZ=Asia/Tokyo date '+%H:%M')
          HOUR=$(TZ=Asia/Tokyo date '+%H')
          MIN=$(TZ=Asia/Tokyo date '+%M')

          if [ "$HOUR" = "06" ]; then
            SESSION="600"
          elif [ "$HOUR" = "09" ] && [ "$MIN" = "10" ]; then
            SESSION="905"
          elif [ "$HOUR" = "12" ] && [ "$MIN" = "00" ]; then
            SESSION="1200"
          elif [ "$HOUR" = "15" ] && [ "$MIN" = "35" ]; then
            SESSION="1535"
          else
            echo "Unexpected JST time: $NOW_JST"
            exit 1
          fi

          echo "now_jst=$NOW_JST" >> "$GITHUB_OUTPUT"
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: |
          echo "JST: ${{ steps.session.outputs.now_jst }}"
          echo "SESSION: ${{ steps.session.outputs.session }}"
          python main.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update analysis data (${{ steps.session.outputs.session }})"
          git push
