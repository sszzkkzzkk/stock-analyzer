name: 株式AI自動分析

on:
  schedule:
    - cron: "0 21 * * 0-4"
    - cron: "5 0 * * 1-5"
    - cron: "5 6 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "600 or 905 or 1535"
        required: true
        default: "600"
        type: choice
        options: ["600", "905", "1535"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Git設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 過去データを復元
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p data
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- data/ 2>/dev/null || true
          fi

      - name: 分析実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ github.event.inputs.session }}
        run: python main.py

      - name: GitHub Pagesに公開
        run: |
          TEMP=$(mktemp -d)
          cp index.html "$TEMP/"
          mkdir -p "$TEMP/data"
          for f in latest_600.json latest_905.json latest_1535.json accuracy_log.json; do
            if [ -f "data/$f" ]; then
              cp "data/$f" "$TEMP/data/$f"
            elif [ -f "$f" ]; then
              cp "$f" "$TEMP/data/$f"
            fi
          done
          cd "$TEMP"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git add .
          git commit -m "deploy: $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages --force
