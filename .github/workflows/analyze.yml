name: 株式AI自動分析

on:
  schedule:
    - cron: "0 21 * * 0-4"
    - cron: "2 21 * * 0-4"
    - cron: "4 21 * * 0-4"
    - cron: "5 0 * * 1-5"
    - cron: "7 0 * * 1-5"
    - cron: "9 0 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "2 3 * * 1-5"
    - cron: "4 3 * * 1-5"
    - cron: "35 6 * * 1-5"
    - cron: "37 6 * * 1-5"
    - cron: "39 6 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "600 / 905 / 1200 / 1535"
        required: false
        default: "600"

permissions:
  contents: write

concurrency:
  group: stock-analyzer
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish
        continue-on-error: true

      - name: Prepare publish dir
        shell: bash
        run: |
          if [ ! -d publish/.git ]; then
            rm -rf publish
            mkdir -p publish/data
            cd publish
            git init
            git checkout -b gh-pages
            touch .nojekyll
            cd ..
          fi

      - name: Restore previous data
        shell: bash
        run: |
          mkdir -p data
          if [ -d publish/data ]; then
            cp -r publish/data/. data/ 2>/dev/null || true
          fi

      - name: Decide session
        id: session
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          INPUT="${{ github.event.inputs.session }}"
          SCHED="${{ github.event.schedule }}"
          TODAY=$(TZ='Asia/Tokyo' date '+%F')

          echo "today_jst=$TODAY" >> "$GITHUB_OUTPUT"

          get_date() {
            [ -f "$1" ] && python3 -c "import json; d=json.load(open('$1',encoding='utf-8')); print(d.get('date',''))" 2>/dev/null || echo ""
          }

          SESSION=""
          RUN_NOW="false"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            case "$INPUT" in
              600|905|1200|1535)
                SESSION="$INPUT"
                RUN_NOW="true"
                ;;
              *)
                echo "Invalid session: $INPUT"
                exit 1
                ;;
            esac
          else
            case "$SCHED" in
              "0 21 * * 0-4"|"2 21 * * 0-4"|"4 21 * * 0-4")
                SESSION="600"
                LAST=$(get_date "data/latest_600.json")
                ;;
              "5 0 * * 1-5"|"7 0 * * 1-5"|"9 0 * * 1-5")
                SESSION="905"
                LAST=$(get_date "data/latest_905.json")
                ;;
              "0 3 * * 1-5"|"2 3 * * 1-5"|"4 3 * * 1-5")
                SESSION="1200"
                LAST=$(get_date "data/latest_1200.json")
                ;;
              "35 6 * * 1-5"|"37 6 * * 1-5"|"39 6 * * 1-5")
                SESSION="1535"
                LAST=$(get_date "data/latest_1535.json")
                ;;
              *)
                echo "Unknown schedule: $SCHED"
                exit 1
                ;;
            esac
            [ "$LAST" != "$TODAY" ] && RUN_NOW="true"
          fi

          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "run_now=$RUN_NOW" >> "$GITHUB_OUTPUT"

      - name: Stop when no session is due
        if: steps.session.outputs.run_now != 'true'
        run: echo "No session due today." && exit 0

      - name: Run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python main.py

      - name: Generate market_live.json
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          out = Path("data/market_live.json")
          out.parent.mkdir(parents=True, exist_ok=True)

          symbols = {
              "日経平均": "^N225",
              "日経先物": "NK=F",
              "ドル円": "JPY=X",
              "NYダウ": "^DJI",
          }

          def fetch_quote(symbol: str):
              url = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=" + urllib.parse.quote(symbol)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0",
                      "Accept": "application/json",
                  },
              )

              with urllib.request.urlopen(req, timeout=15) as res:
                  data = json.load(res)

              results = data.get("quoteResponse", {}).get("result", [])
              if not results:
                  return None

              q = results[0]
              price = q.get("regularMarketPrice")
              change = q.get("regularMarketChange")
              change_pct = q.get("regularMarketChangePercent")
              market_time = q.get("regularMarketTime")

              def fmt_num(v):
                  if v is None:
                      return "—"
                  return f"{v:,.2f}"

              def fmt_signed(v):
                  if v is None:
                      return "—"
                  return f"{v:+,.2f}"

              def fmt_signed_pct(v):
                  if v is None:
                      return "—"
                  return f"{v:+.2f}%"

              time_str = "-"
              if market_time:
                  time_str = time.strftime("%H:%M", time.gmtime(market_time + 9 * 3600))

              return {
                  "value": fmt_num(price),
                  "change": fmt_signed(change),
                  "percent": fmt_signed_pct(change_pct),
                  "time": time_str,
              }

          items = []
          errors = []

          for name, symbol in symbols.items():
              try:
                  q = fetch_quote(symbol)
                  if q:
                      items.append({"name": name, **q})
                  else:
                      errors.append(f"{name}: no result")
              except Exception as e:
                  errors.append(f"{name}: {e}")

          payload = {
              "generated_at": time.strftime("%Y-%m-%d %H:%M:%S", time.gmtime(time.time() + 9 * 3600)),
              "items": items,
              "errors": errors,
          }

          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY

      - name: Copy publish files
        shell: bash
        run: |
          rm -rf publish/*
          cp index.html publish/index.html
          mkdir -p publish/data
          cp -r data/. publish/data/
          touch publish/.nojekyll

      - name: Push gh-pages
        shell: bash
        run: |
          cd publish
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update: ${{ steps.session.outputs.session }} ${{ steps.session.outputs.today_jst }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages