<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>株式AI分析</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#111627;--bg3:#1a2035;--border:#1f2d4a;
  --dim:#3a4f72;--muted:#6b82a8;--text:#c8d8f0;--bright:#e8f2ff;
  --accent:#3b82f6;--accent2:#06b6d4;--green:#22d3a0;--red:#f87171;--amber:#fbbf24;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-text-size-adjust:100%}
body{min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:13px;color:var(--accent2);letter-spacing:.12em}
.logo span{color:var(--muted)}
.hright{display:flex;align-items:center;gap:10px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,211,160,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(34,211,160,0)}}
.tstamp{font-family:var(--mono);font-size:11px;color:var(--muted)}
.rbtn{background:none;border:1px solid var(--border);color:var(--muted);font-size:16px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.rbtn:active{background:var(--bg3)}
.tabs{display:flex;background:rgba(10,14,26,.92);border-bottom:1px solid var(--border);padding:0 4px;position:sticky;top:53px;z-index:90;backdrop-filter:blur(12px)}
.tab{flex:1;padding:10px 2px;font-size:11px;color:var(--muted);border:none;background:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.page{display:none;padding:12px 12px 24px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.slabel{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin:16px 0 8px}
.slabel:first-child{margin-top:4px}
.mstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px}
.mc-l{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px}
.mc-v{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--bright)}
.mc-v.up{color:var(--green)}.mc-v.dn{color:var(--red)}
.mstrip2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:4px}
.news-list{display:flex;flex-direction:column;gap:6px}
.news-item{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--accent);border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.6}
.news-item.high{border-left-color:var(--red)}
.news-item.medium{border-left-color:var(--amber)}
.theme-list{display:flex;flex-direction:column;gap:8px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.tc.r1::before{background:var(--amber)}.tc.r2::before{background:var(--accent2)}.tc.r3::before{background:var(--green)}.tc.r4::before,.tc.r5::before,.tc.r6::before,.tc.r7::before,.tc.r8::before{background:var(--dim)}
.ttop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.tname{font-size:15px;font-weight:500;color:var(--bright)}
.trnk{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}
.sbadge{font-family:var(--mono);font-size:12px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.sh{background:rgba(251,191,36,.15);color:var(--amber)}.sm{background:rgba(59,130,246,.15);color:var(--accent)}.sl{background:rgba(107,130,168,.1);color:var(--muted)}
.sbar{height:2px;background:var(--bg3);border-radius:2px;margin-bottom:8px}
.sbf{height:100%;border-radius:2px;background:var(--accent);transition:width .6s ease}
.trat{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.stocks-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.spill{font-family:var(--mono);font-size:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:2px 7px;border-radius:5px}
.risk{font-size:10px;color:var(--red);margin-top:4px}
.usc{font-size:10px;color:var(--accent2);margin-top:2px}
.sumbox{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--accent2);border-radius:12px;padding:14px;font-size:13px;line-height:1.75}
.bigpic{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;font-size:13px;line-height:1.7;margin-bottom:4px}
.eval-list{display:flex;flex-direction:column;gap:6px}
.eval-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:flex-start;gap:10px}
.eval-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.eval-theme{font-size:13px;font-weight:500;color:var(--bright);margin-bottom:2px}
.eval-detail{font-size:11px;color:var(--muted);line-height:1.5}
.score-section{display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:4px}
.score-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--mono);font-size:17px;font-weight:500;color:var(--bright)}
.score-info{flex:1}
.score-title{font-size:13px;font-weight:500;color:var(--bright);margin-bottom:4px}
.score-sub{font-size:11px;color:var(--muted);line-height:1.6}
.actual-list{display:flex;flex-direction:column;gap:6px}
.actual-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sh-dot{background:var(--red)}.sm-dot{background:var(--amber)}.sl-dot{background:var(--dim)}
.actual-name{font-size:13px;font-weight:500;color:var(--bright);margin-bottom:2px}
.actual-ev{font-size:11px;color:var(--muted)}
.hint-list{display:flex;flex-direction:column;gap:6px}
.hint-card{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.6}
.hint-card::before{content:'💡 '}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:6px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bar-date{font-family:var(--mono);font-size:9px;color:var(--dim);white-space:nowrap}
.bar-score{font-family:var(--mono);font-size:9px;color:var(--muted)}
.avg-line{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
.avg-val{color:var(--accent2)}
.no-data{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px 16px;text-align:center;color:var(--muted);font-size:13px}
.no-data .icon{font-size:32px;margin-bottom:12px;display:block}
.loading{padding:48px 16px;text-align:center;color:var(--muted);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.settings-form{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em}
.field input{background:var(--bg2);border:1px solid var(--border);color:var(--bright);border-radius:8px;padding:10px 12px;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.save-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-family:var(--sans);font-weight:500;cursor:pointer;margin-top:4px}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--border);color:var(--muted)}
.sector-list{display:flex;flex-direction:column;gap:4px}
.sector-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg2);border-radius:8px;font-size:12px}
.tomorrow-box{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:12px;font-size:13px;line-height:1.7}
</style>
</head>
<body>
<div class="header">
  <div class="logo">AI<span>/</span>MARKET</div>
  <div class="hright">
    <div class="dot"></div>
    <span class="tstamp" id="update-time">—</span>
    <button class="rbtn" onclick="loadAll()">↻</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('t600')">6:00 予測</button>
  <button class="tab" onclick="switchTab('t905')">9:05 確認</button>
  <button class="tab" onclick="switchTab('t1535')">15:35 総括</button>
  <button class="tab" onclick="switchTab('history')">精度履歴</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>
<div id="page-t600" class="page active"><div id="c600"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-t905" class="page"><div id="c905"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-t1535" class="page"><div id="c1535"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-history" class="page"><div id="chistory"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-settings" class="page">
  <div class="slabel">データソース設定</div>
  <div class="settings-form">
    <div class="field"><label>GitHub ユーザー名</label><input type="text" id="gh-user" placeholder="yourusername"></div>
    <div class="field"><label>リポジトリ名</label><input type="text" id="gh-repo" placeholder="stock-analyzer"></div>
    <button class="save-btn" onclick="saveSettings()">保存して接続</button>
  </div>
  <div class="info-box">
    GitHub Pages が有効なリポジトリの data/ フォルダを参照します。<br>
    Settings → Pages → Source: gh-pages branch → Save
  </div>
</div>
<script>
let d600=null,d905=null,d1535=null,dHist=null;
const GHU='stock_gh_user',GHR='stock_gh_repo';
function base(){
  const u=localStorage.getItem(GHU)||'',r=localStorage.getItem(GHR)||'';
  return u&&r?`https://${u}.github.io/${r}`:'./data';
}
function switchTab(n){
  ['t600','t905','t1535','history','settings'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===n);
    document.getElementById('page-'+t).classList.toggle('active',t===n);
    document.getElementById('page-'+t).style.display=t===n?'block':'none';
  });
}
document.querySelectorAll('.page').forEach(p=>{if(!p.classList.contains('active'))p.style.display='none'});
async function fetchJ(url){
  try{const r=await fetch(url+'?t='+Date.now());if(!r.ok)throw new Error(r.status);return await r.json();}
  catch(e){return null;}
}
async function loadAll(){
  document.getElementById('update-time').textContent='更新中...';
  const b=base();
  await Promise.all([
    fetchJ(`${b}/data/latest_600.json`).then(d=>{d600=d;render600();}),
    fetchJ(`${b}/data/latest_905.json`).then(d=>{d905=d;render905();}),
    fetchJ(`${b}/data/latest_1535.json`).then(d=>{d1535=d;render1535();}),
    fetchJ(`${b}/data/accuracy_log.json`).then(d=>{dHist=d;renderHistory();}),
  ]);
  document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function noData(msg,sub){return `<div class="no-data"><span class="icon">📭</span>${esc(msg)}<br><span style="font-size:11px">${esc(sub)}</span></div>`;}
function scoreColor(s){return s>=70?'#22d3a0':s>=50?'#fbbf24':'#f87171';}

function render600(){
  const el=document.getElementById('c600');
  const d=d600;
  if(!d||Object.keys(d).length===0){el.innerHTML=noData('まだ本日の6:00分析がありません','毎朝6:00に自動更新されます');return;}
  const md=d.market_data||{};
  const us=md.us_stocks||{};
  const fu=md.futures||{};
  const fx=md.forex||{};
  const cm=md.commodities||{};
  const bn=md.bonds||{};
  const spC=((us.sp500||'').startsWith('+')?'up':(us.sp500||'').startsWith('-')?'dn':'');
  const news=(md.key_news||[]).map(n=>`<div class="news-item ${esc(n.impact||'')}"><strong>${esc(n.title||'')}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(n.detail||'')}</span></div>`).join('');
  const cal=(md.economic_calendar||[]).map(e=>`<div class="news-item">${esc(e.time||'')} ${esc(e.event||'')} <span style="color:var(--accent2)">${esc(e.forecast||'')}</span></div>`).join('');
  const sectors=(md.us_sector_moves||[]).slice(0,5).map(s=>`<div class="sector-row"><span>${esc(s.sector||'')}</span><span class="${(s.change||'').startsWith('+')?'mc-v up':'mc-v dn'}">${esc(s.change||'')}</span></div>`).join('');
  const hotStocks=(md.us_hot_stocks||[]).slice(0,5).map(s=>`<div class="news-item">${esc(s.name||'')} <strong>${esc(s.change||'')}</strong> — ${esc(s.reason||'')}</div>`).join('');
  const themes=(d.themes||[]).map(t=>{
    const sc=t.confidence_score||0;
    const rc=`rank-${Math.min(t.rank||1,8)}`;
    const bc=sc>=80?'sh':sc>=60?'sm':'sl';
    const stocks=(t.key_stocks||[]).map(s=>`<span class="spill">${esc(s.name||'')}(${esc(s.code||'')})</span>`).join('');
    return `<div class="tc ${rc}">
      <div class="ttop"><div><div class="tname">${esc(t.name||'')}</div><div class="trnk">#${t.rank||''}</div></div><div class="sbadge ${bc}">${sc}点</div></div>
      <div class="sbar"><div class="sbf" data-sc="${sc}" style="width:0%"></div></div>
      <div class="trat">${esc(t.rationale||'')}</div>
      <div class="stocks-row">${stocks}</div>
      ${t.us_connection?`<div class="usc">🇺🇸 ${esc(t.us_connection)}</div>`:''}
      ${t.risk_factors?`<div class="risk">⚠ ${esc(t.risk_factors)}</div>`:''}
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="slabel">マーケットデータ — ${esc(d.date||'')} ${esc(d.generated_at||'')}</div>
    <div class="mstrip">
      <div class="mc"><div class="mc-l">S&P500</div><div class="mc-v ${spC}">${esc(us.sp500||'—')}</div></div>
      <div class="mc"><div class="mc-l">NASDAQ</div><div class="mc-v">${esc(us.nasdaq||'—')}</div></div>
      <div class="mc"><div class="mc-l">日経先物</div><div class="mc-v">${esc(fu.nikkei225||'—')}</div></div>
    </div>
    <div class="mstrip">
      <div class="mc"><div class="mc-l">USD/JPY</div><div class="mc-v">${esc(fx.usdjpy||'—')}</div></div>
      <div class="mc"><div class="mc-l">原油WTI</div><div class="mc-v">${esc(cm.oil_wti||'—')}</div></div>
      <div class="mc"><div class="mc-l">VIX</div><div class="mc-v">${esc(bn.vix||'—')}</div></div>
    </div>
    <div class="mstrip">
      <div class="mc"><div class="mc-l">金</div><div class="mc-v">${esc(cm.gold||'—')}</div></div>
      <div class="mc"><div class="mc-l">米10年債</div><div class="mc-v">${esc(bn.us10y||'—')}</div></div>
      <div class="mc"><div class="mc-l">SGX先物</div><div class="mc-v">${esc(fu.sgx||'—')}</div></div>
    </div>
    ${d.big_picture?`<div class="bigpic">🎯 ${esc(d.big_picture)}</div>`:''}
    ${sectors?`<div class="slabel">米国セクター動向</div><div class="sector-list">${sectors}</div>`:''}
    ${hotStocks?`<div class="slabel">米国注目銘柄</div><div class="news-list">${hotStocks}</div>`:''}
    ${news?`<div class="slabel">重要ニュース</div><div class="news-list">${news}</div>`:''}
    ${cal?`<div class="slabel">本日の経済指標</div><div class="news-list">${cal}</div>`:''}
    <div class="slabel">本日のテーマ予測</div>
    <div class="theme-list">${themes}</div>
    <div class="slabel">相場展望</div>
    <div class="sumbox">${esc(d.summary||'—')}</div>
  `;
  requestAnimationFrame(()=>{
    document.querySelectorAll('.sbf').forEach(el=>{
      const s=el.dataset.sc||0;
      setTimeout(()=>{el.style.width=s+'%';},100);
    });
  });
}

function render905(){
  const el=document.getElementById('c905');
  const d=d905;
  if(!d||Object.keys(d).length===0){el.innerHTML=noData('まだ本日の9:05確認がありません','9:05以降に自動更新されます');return;}
  const op=d.opening||{};
  const sc=d.morning_accuracy_score||0;
  const circ=2*Math.PI*24;
  const offset=circ*(1-sc/100);
  const col=scoreColor(sc);
  const flow=(d.actual_flow||[]).map(a=>`<div class="actual-card">
    <div class="sdot ${a.strength==='high'?'sh-dot':a.strength==='medium'?'sm-dot':'sl-dot'}"></div>
    <div><div class="actual-name">${esc(a.theme||'')}</div><div class="actual-ev">${esc(a.evidence||'')}</div></div>
  </div>`).join('');
  const gaps=(d.prediction_gap||[]).map(g=>{
    const icon=g.actual_result==='的中'?'✅':g.actual_result==='外れ'?'❌':'🔶';
    return `<div class="eval-card"><div class="eval-icon">${icon}</div>
      <div><div class="eval-theme">${esc(g.predicted_theme||'')} <span style="font-size:10px;color:var(--muted)">${esc(g.actual_result||'')}</span></div>
      <div class="eval-detail">${esc(g.gap_reason||'')}${g.missed_factor?` / 見落とし: ${esc(g.missed_factor)}`:''}
      </div></div></div>`;
  }).join('');
  const cor=d.intraday_correction||{};
  const watch=(cor.themes_to_watch||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const faded=(cor.themes_faded||[]).map(t=>`<span class="tag" style="opacity:.5">${esc(t)}</span>`).join('');
  const hints=(cor.correction_hints||[]).map(h=>`<div class="hint-card">${esc(h)}</div>`).join('');
  el.innerHTML=`
    <div class="slabel">寄り付きスコア — ${esc(d.date||'')} ${esc(d.generated_at||'')}</div>
    <div class="score-section">
      <div class="score-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="24" fill="none" stroke="#1a2035" stroke-width="5"/>
          <circle cx="32" cy="32" r="24" fill="none" stroke-width="5" stroke="${col}"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"
            stroke-linecap="round" id="ring905"/>
        </svg>
        <div class="score-num">${sc}</div>
      </div>
      <div class="score-info">
        <div class="score-title">寄り付き精度</div>
        <div class="score-sub">
          日経: ${esc(op.nikkei_open||'—')} (${esc(op.nikkei_change||'—')})<br>
          市場: ${esc(op.market_tone||'—')}<br>
          主役: ${esc(op.dominant_theme||'—')}
        </div>
      </div>
    </div>
    <div class="slabel">実際の資金の流れ</div>
    <div class="actual-list">${flow||noData('データなし','')}</div>
    <div class="slabel">予測との差分</div>
    <div class="eval-list">${gaps||noData('データなし','')}</div>
    ${watch?`<div class="slabel">午後も注目</div><div class="tag-row">${watch}</div>`:''}
    ${faded?`<div class="slabel">朝だけのテーマ</div><div class="tag-row">${faded}</div>`:''}
    ${hints?`<div class="slabel">15:35への修正ヒント</div><div class="hint-list">${hints}</div>`:''}
    <div class="slabel">寄り付き総評</div>
    <div class="sumbox">${esc(d.summary||'—')}</div>
  `;
  requestAnimationFrame(()=>{
    const r=document.getElementById('ring905');
    if(r)setTimeout(()=>{r.style.transition='stroke-dashoffset .9s ease';r.setAttribute('stroke-dashoffset',offset.toFixed(1));},150);
  });
}

function render1535(){
  const el=document.getElementById('c1535');
  const d=d1535;
  if(!d||Object.keys(d).length===0){el.innerHTML=noData('まだ本日の15:35総括がありません','15:35以降に自動更新されます');return;}
  const sc=d.final_accuracy_score||0;
  const circ=2*Math.PI*24;
  const offset=circ*(1-sc/100);
  const col=scoreColor(sc);
  const cl=d.closing||{};
  const themes=(d.theme_results||[]).map(t=>{
    const icon=t.final_result==='的中'?'✅':t.final_result==='外れ'?'❌':'🔶';
    return `<div class="eval-card"><div class="eval-icon">${icon}</div>
      <div><div class="eval-theme">${esc(t.name||'')} <span style="font-size:10px;color:var(--muted)">${esc(t.final_result||'')}</span></div>
      <div class="eval-detail">${esc(t.detail||'')}</div></div></div>`;
  }).join('');
  const stocks=(d.stock_results||[]).map(s=>{
    const up=(s.change||'').startsWith('+');
    const dn=(s.change||'').startsWith('-');
    return `<div class="actual-card">
      <div class="sdot" style="background:${up?'#22d3a0':dn?'#f87171':'#3a4f72'}"></div>
      <div style="flex:1"><div class="actual-name">${esc(s.name||'')} <span style="font-size:10px;color:var(--muted)">${esc(s.code||'')}</span></div>
      <div class="actual-ev">${esc(s.close||'—')} (${esc(s.change||'—')}) ${esc(s.comment||'')}</div></div>
    </div>`;
  }).join('');
  const news=(d.news_impact||[]).map(n=>`<div class="news-item">${esc(n.news||'')} — ${esc(n.impact||'')}</div>`).join('');
  const learning=(d.learning_points||[]).map(h=>`<div class="hint-card">${esc(h)}</div>`).join('');
  const tw=d.tomorrow_outlook||{};
  const tevents=(tw.key_events||[]).map(e=>`<span class="tag">${esc(e)}</span>`).join('');
  const tthemes=(tw.watch_themes||[]).map(t=>`<span class="tag" style="color:var(--accent2)">${esc(t)}</span>`).join('');
  el.innerHTML=`
    <div class="slabel">最終精度スコア — ${esc(d.date||'')} ${esc(d.generated_at||'')}</div>
    <div class="score-section">
      <div class="score-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="24" fill="none" stroke="#1a2035" stroke-width="5"/>
          <circle cx="32" cy="32" r="24" fill="none" stroke-width="5" stroke="${col}"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"
            stroke-linecap="round" id="ring1535"/>
        </svg>
        <div class="score-num">${sc}</div>
      </div>
      <div class="score-info">
        <div class="score-title">本日の最終精度</div>
        <div class="score-sub">
          日経: ${esc(cl.nikkei||'—')}<br>
          TOPIX: ${esc(cl.topix||'—')}<br>
          ${esc(cl.total_assessment||'')}
        </div>
      </div>
    </div>
    <div class="slabel">テーマ最終結果</div>
    <div class="eval-list">${themes||noData('データなし','')}</div>
    <div class="slabel">注目銘柄の動き</div>
    <div class="actual-list">${stocks||noData('データなし','')}</div>
    ${news?`<div class="slabel">場中ニュースの影響</div><div class="news-list">${news}</div>`:''}
    ${d.correction_evaluation?`<div class="slabel">9:05修正の評価</div><div class="bigpic">${esc(d.correction_evaluation)}</div>`:''}
    ${learning?`<div class="slabel">明日への学習ポイント</div><div class="hint-list">${learning}</div>`:''}
    ${tevents||tthemes?`<div class="slabel">明日の注目</div><div class="tag-row">${tevents}${tthemes}</div>`:''}
    ${tw.hint?`<div class="slabel">明日の相場ヒント</div><div class="tomorrow-box">${esc(tw.hint)}</div>`:''}
    <div class="slabel">本日の総括</div>
    <div class="sumbox">${esc(d.summary||'—')}</div>
  `;
  requestAnimationFrame(()=>{
    const r=document.getElementById('ring1535');
    if(r)setTimeout(()=>{r.style.transition='stroke-dashoffset .9s ease';r.setAttribute('stroke-dashoffset',offset.toFixed(1));},150);
  });
}

function renderHistory(){
  const el=document.getElementById('chistory');
  const logs=dHist;
  if(!logs||!logs.length){el.innerHTML=noData('精度履歴がまだありません','15:35評価が蓄積されると表示されます');return;}
  const recent=logs.slice(-12);
  const avg=Math.round(recent.reduce((s,r)=>s+r.accuracy_score,0)/recent.length);
  const bars=recent.map(r=>{
    const h=Math.round((r.accuracy_score/100)*68)+4;
    const col=r.accuracy_score>=70?'#3b82f6':r.accuracy_score>=50?'#fbbf24':'#f87171';
    const dt=(r.date||'').slice(5);
    return `<div class="bar-col"><div class="bar-score">${r.accuracy_score}</div><div class="bar" style="height:${h}px;background:${col}"></div><div class="bar-date">${dt}</div></div>`;
  }).join('');
  const tc={};
  logs.forEach(r=>{if(r.strongest_theme)tc[r.strongest_theme]=(tc[r.strongest_theme]||0)+1;});
  const tops=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([n,c])=>`<div class="actual-card"><div class="sdot sh-dot"></div><div><div class="actual-name">${esc(n)}</div><div class="actual-ev">${c}回 首位</div></div></div>`).join('');
  el.innerHTML=`
    <div class="slabel">精度トレンド（直近${recent.length}営業日）</div>
    <div class="chart-wrap"><div class="chart-bars">${bars}</div><div class="avg-line">平均精度: <span class="avg-val">${avg}/100</span></div></div>
    <div class="slabel">的中しやすいテーマ TOP5</div>
    <div class="actual-list">${tops||noData('データ蓄積中','')}</div>
  `;
}

function saveSettings(){
  const u=document.getElementById('gh-user').value.trim();
  const r=document.getElementById('gh-repo').value.trim();
  if(!u||!r){alert('入力してください');return;}
  localStorage.setItem(GHU,u);localStorage.setItem(GHR,r);
  switchTab('t600');loadAll();
}

window.addEventListener('DOMContentLoaded',()=>{
  const u=localStorage.getItem(GHU)||'',r=localStorage.getItem(GHR)||'';
  if(u)document.getElementById('gh-user').value=u;
  if(r)document.getElementById('gh-repo').value=r;
  loadAll();
});
</script>
