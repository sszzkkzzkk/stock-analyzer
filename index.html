<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>株式AI分析</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#111627;--bg3:#1a2035;--border:#1f2d4a;
  --dim:#3a4f72;--muted:#6b82a8;--text:#c8d8f0;--bright:#e8f2ff;
  --accent:#3b82f6;--accent2:#06b6d4;--green:#22d3a0;--red:#f87171;--amber:#fbbf24;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-text-size-adjust:100%}
body{min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:13px;color:var(--accent2);letter-spacing:.12em}
.logo span{color:var(--muted)}
.hright{display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,211,160,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(34,211,160,0)}}
.tstamp{font-family:var(--mono);font-size:10px;color:var(--muted)}
.rbtn{background:none;border:1px solid var(--border);color:var(--muted);font-size:16px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.rbtn:active{background:var(--bg3)}

/* リアルタイムティッカー */
.ticker-bar{background:var(–bg2);border-bottom:1px solid var(–border);padding:8px 12px;overflow:hidden;position:sticky;top:49px;z-index:95}
.ticker-scroll{display:flex;gap:20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ticker-scroll::-webkit-scrollbar{display:none}
.ticker-item{display:flex;flex-direction:column;align-items:center;min-width:72px;flex-shrink:0}
.ticker-name{font-family:var(–mono);font-size:9px;color:var(–muted);margin-bottom:2px}
.ticker-val{font-family:var(–mono);font-size:12px;font-weight:500;color:var(–bright)}
.ticker-chg{font-family:var(–mono);font-size:9px}
.ticker-chg.up{color:var(–green)}.ticker-chg.dn{color:var(–red)}.ticker-chg.flat{color:var(–muted)}
.ticker-sep{width:1px;background:var(–border);flex-shrink:0;align-self:stretch;margin:0 4px}

.tabs{display:flex;background:rgba(10,14,26,.92);border-bottom:1px solid var(–border);padding:0 4px;position:sticky;top:105px;z-index:90;backdrop-filter:blur(12px)}
.tab{flex:1;padding:9px 2px;font-size:10px;color:var(–muted);border:none;background:none;cursor:pointer;font-family:var(–sans);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(–accent2);border-bottom-color:var(–accent2)}
.page{display:none;padding:10px 12px 24px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.slabel{font-family:var(–mono);font-size:10px;color:var(–dim);letter-spacing:.15em;text-transform:uppercase;margin:14px 0 7px}
.slabel:first-child{margin-top:4px}
.mstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:4px}
.mc{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:9px}
.mc-l{font-family:var(–mono);font-size:9px;color:var(–muted);margin-bottom:3px}
.mc-v{font-family:var(–mono);font-size:13px;font-weight:500;color:var(–bright)}
.mc-v.up{color:var(–green)}.mc-v.dn{color:var(–red)}
.mc-rt{font-family:var(–mono);font-size:9px;margin-top:2px}
.mc-rt.up{color:var(–green)}.mc-rt.dn{color:var(–red)}.mc-rt.flat{color:var(–muted)}
.rt-badge{font-family:var(–mono);font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(34,211,160,.1);color:var(–green);border:1px solid rgba(34,211,160,.2);margin-left:4px}
.news-list{display:flex;flex-direction:column;gap:5px}
.news-item{background:var(–bg2);border:1px solid var(–border);border-left:2px solid var(–accent);border-radius:8px;padding:7px 10px;font-size:12px;line-height:1.6}
.news-item.high{border-left-color:var(–red)}
.news-item.medium{border-left-color:var(–amber)}
.theme-list{display:flex;flex-direction:column;gap:7px}
.tc{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.tc::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.tc.r1::before{background:var(–amber)}.tc.r2::before{background:var(–accent2)}.tc.r3::before{background:var(–green)}.tc.r4::before,.tc.r5::before,.tc.r6::before,.tc.r7::before,.tc.r8::before{background:var(–dim)}
.ttop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.tname{font-size:14px;font-weight:500;color:var(–bright)}
.trnk{font-family:var(–mono);font-size:9px;color:var(–muted);margin-top:2px}
.sbadge{font-family:var(–mono);font-size:11px;font-weight:500;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.sh{background:rgba(251,191,36,.15);color:var(–amber)}.sm{background:rgba(59,130,246,.15);color:var(–accent)}.sl{background:rgba(107,130,168,.1);color:var(–muted)}
.sbar{height:2px;background:var(–bg3);border-radius:2px;margin-bottom:7px}
.sbf{height:100%;border-radius:2px;background:var(–accent);transition:width .6s ease}
.trat{font-size:12px;color:var(–muted);line-height:1.6;margin-bottom:7px}
.stocks-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.spill{font-family:var(–mono);font-size:10px;background:var(–bg3);border:1px solid var(–border);color:var(–text);padding:2px 6px;border-radius:5px}
.risk{font-size:10px;color:var(–red);margin-top:3px}
.usc{font-size:10px;color:var(–accent2);margin-top:2px}
.sumbox{background:var(–bg2);border:1px solid var(–border);border-top:2px solid var(–accent2);border-radius:12px;padding:12px;font-size:13px;line-height:1.75}
.bigpic{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:10px;font-size:13px;line-height:1.7;margin-bottom:4px}
.eval-list{display:flex;flex-direction:column;gap:5px}
.eval-card{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:10px;display:flex;align-items:flex-start;gap:8px}
.eval-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.eval-theme{font-size:13px;font-weight:500;color:var(–bright);margin-bottom:2px}
.eval-detail{font-size:11px;color:var(–muted);line-height:1.5}
.score-section{display:flex;align-items:center;gap:14px;background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:14px;margin-bottom:4px}
.score-ring{position:relative;width:60px;height:60px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(–mono);font-size:16px;font-weight:500;color:var(–bright)}
.score-info{flex:1}
.score-title{font-size:13px;font-weight:500;color:var(–bright);margin-bottom:3px}
.score-sub{font-size:11px;color:var(–muted);line-height:1.6}
.actual-list{display:flex;flex-direction:column;gap:5px}
.actual-card{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sh-dot{background:var(–red)}.sm-dot{background:var(–amber)}.sl-dot{background:var(–dim)}
.actual-name{font-size:13px;font-weight:500;color:var(–bright);margin-bottom:2px}
.actual-ev{font-size:11px;color:var(–muted)}
.hint-list{display:flex;flex-direction:column;gap:5px}
.hint-card{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:9px 11px;font-size:12px;line-height:1.6}
.hint-card::before{content:’💡 ’}
.chart-wrap{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:12px}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:70px;margin-bottom:5px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bar-date{font-family:var(–mono);font-size:9px;color:var(–dim);white-space:nowrap}
.bar-score{font-family:var(–mono);font-size:9px;color:var(–muted)}
.avg-line{font-family:var(–mono);font-size:11px;color:var(–muted);margin-top:4px}
.avg-val{color:var(–accent2)}
.no-data{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:28px 16px;text-align:center;color:var(–muted);font-size:13px}
.no-data .icon{font-size:28px;margin-bottom:10px;display:block}
.loading{padding:40px 16px;text-align:center;color:var(–muted);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid var(–border);border-top-color:var(–accent2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.settings-form{display:flex;flex-direction:column;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(–muted);font-family:var(–mono);letter-spacing:.08em}
.field input{background:var(–bg2);border:1px solid var(–border);color:var(–bright);border-radius:8px;padding:9px 11px;font-size:13px;font-family:var(–sans);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(–accent)}
.save-btn{background:var(–accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-family:var(–sans);font-weight:500;cursor:pointer;margin-top:4px}
.info-box{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:11px 13px;font-size:12px;color:var(–muted);line-height:1.7;margin-top:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-family:var(–mono);font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(–border);color:var(–muted)}
.sector-list{display:flex;flex-direction:column;gap:3px}
.sector-row{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;background:var(–bg2);border-radius:8px;font-size:12px}
.tomorrow-box{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:11px;font-size:13px;line-height:1.7}
.source-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.source-badge{font-family:var(–mono);font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);color:var(–accent2)}
</style>

</head>
<body>
<div class="header">
  <div class="logo">AI<span>/</span>MARKET</div>
  <div class="hright">
    <div class="dot"></div>
    <span class="tstamp" id="update-time">—</span>
    <button class="rbtn" onclick="loadAll()">↻</button>
  </div>
</div>

<!-- リアルタイムティッカー -->

<div class="ticker-bar">
  <div class="ticker-scroll" id="ticker-scroll">
    <div class="ticker-item"><div class="ticker-name">読込中</div><div class="ticker-val">—</div><div class="ticker-chg flat">—</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('t600')">6:00</button>
  <button class="tab" onclick="switchTab('t905')">9:05</button>
  <button class="tab" onclick="switchTab('t1535')">15:35</button>
  <button class="tab" onclick="switchTab('history')">履歴</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>
<div id="page-t600" class="page active"><div id="c600"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-t905" class="page"><div id="c905"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-t1535" class="page"><div id="c1535"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-history" class="page"><div id="chistory"><div class="loading"><div class="spinner"></div>読み込み中...</div></div></div>
<div id="page-settings" class="page">
  <div class="slabel">データソース設定</div>
  <div class="settings-form">
    <div class="field"><label>GitHub ユーザー名</label><input type="text" id="gh-user" placeholder="yourusername"></div>
    <div class="field"><label>リポジトリ名</label><input type="text" id="gh-repo" placeholder="stock-analyzer"></div>
    <button class="save-btn" onclick="saveSettings()">保存して接続</button>
  </div>
  <div class="info-box">GitHub Pages が有効なリポジトリの data/ フォルダを参照します。</div>
</div>

<script>
// ========== 設定 ==========
let d600=null,d905=null,d1535=null,dHist=null;
const GHU='stock_gh_user',GHR='stock_gh_repo';
function base(){return 'https://sszzkkzzkk.github.io/stock-analyzer';}

// ========== リアルタイム株価 ==========
const SYMBOLS = [
  {id:'^N225',  name:'日経225', type:'index'},
  {id:'^TOPX',  name:'TOPIX',   type:'index'},
  {id:'^DJI',   name:'DOW',     type:'index'},
  {id:'^IXIC',  name:'NASDAQ',  type:'index'},
  {id:'^GSPC',  name:'S&P500',  type:'index'},
  {id:'USDJPY=X',name:'USD/JPY',type:'forex'},
  {id:'CL=F',   name:'WTI原油', type:'commodity'},
  {id:'GC=F',   name:'金',      type:'commodity'},
  {id:'^VIX',   name:'VIX',     type:'index'},
];

let rtData = {};

async function fetchRealtime(){
  const ids = SYMBOLS.map(s=>s.id).join(',');
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ids)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketTime`;
  try {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    if(!res.ok) throw new Error(res.status);
    const json = await res.json();
    const quotes = json?.quoteResponse?.result || [];
    quotes.forEach(q => {
      rtData[q.symbol] = {
        price: q.regularMarketPrice,
        change: q.regularMarketChange,
        changePct: q.regularMarketChangePercent,
      };
    });
    renderTicker();
    renderRtMarket();
  } catch(e) {
    console.warn('リアルタイム取得失敗:', e);
    // フォールバック: 別のCORSプロキシ試行
    try {
      const res2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      const wrapper = await res2.json();
      const json2 = JSON.parse(wrapper.contents);
      const quotes2 = json2?.quoteResponse?.result || [];
      quotes2.forEach(q => {
        rtData[q.symbol] = {
          price: q.regularMarketPrice,
          change: q.regularMarketChange,
          changePct: q.regularMarketChangePercent,
        };
      });
      renderTicker();
      renderRtMarket();
    } catch(e2) {
      console.warn('フォールバックも失敗:', e2);
    }
  }
}

function fmtPrice(sym, price){
  if(price==null) return '—';
  if(sym==='USDJPY=X') return price.toFixed(2);
  if(sym==='^VIX') return price.toFixed(2);
  if(price > 1000) return price.toLocaleString('ja-JP',{maximumFractionDigits:2});
  return price.toFixed(2);
}

function fmtPct(pct){
  if(pct==null) return '—';
  const sign = pct>=0?'+':'';
  return `${sign}${pct.toFixed(2)}%`;
}

function renderTicker(){
  const el = document.getElementById('ticker-scroll');
  if(!el) return;
  let html = '';
  SYMBOLS.forEach((s,i) => {
    const d = rtData[s.id];
    if(!d) return;
    const cls = d.changePct>0?'up':d.changePct<0?'dn':'flat';
    if(i>0) html += '<div class="ticker-sep"></div>';
    html += `<div class="ticker-item">
      <div class="ticker-name">${s.name}</div>
      <div class="ticker-val">${fmtPrice(s.id, d.price)}</div>
      <div class="ticker-chg ${cls}">${fmtPct(d.changePct)}</div>
    </div>`;
  });
  if(html) el.innerHTML = html;
}

function renderRtMarket(){
  // 6:00タブのマーケットカードをリアルタイムデータで更新
  const maps = [
    {id:'rt-nikkei', sym:'^N225', label:'日経225'},
    {id:'rt-topix',  sym:'^TOPX', label:'TOPIX'},
    {id:'rt-dow',    sym:'^DJI',  label:'DOW'},
    {id:'rt-nasdaq', sym:'^IXIC', label:'NASDAQ'},
    {id:'rt-sp500',  sym:'^GSPC', label:'S&P500'},
    {id:'rt-usdjpy', sym:'USDJPY=X', label:'USD/JPY'},
    {id:'rt-oil',    sym:'CL=F',  label:'WTI原油'},
    {id:'rt-gold',   sym:'GC=F',  label:'金'},
    {id:'rt-vix',    sym:'^VIX',  label:'VIX'},
  ];
  maps.forEach(m => {
    const el = document.getElementById(m.id);
    if(!el) return;
    const d = rtData[m.sym];
    if(!d) return;
    const cls = d.changePct>0?'up':d.changePct<0?'dn':'flat';
    el.innerHTML = `
      <div class="mc-l">${m.label} <span class="rt-badge">LIVE</span></div>
      <div class="mc-v ${d.changePct>0?'up':d.changePct<0?'dn':''}">${fmtPrice(m.sym,d.price)}</div>
      <div class="mc-rt ${cls}">${fmtPct(d.changePct)}</div>
    `;
  });
}

// 5分ごとに自動更新
setInterval(fetchRealtime, 5*60*1000);

// ========== タブ切替 ==========
function switchTab(n){
  ['t600','t905','t1535','history','settings'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===n);
    const p=document.getElementById('page-'+t);
    p.classList.toggle('active',t===n);
    p.style.display=t===n?'block':'none';
  });
}
document.querySelectorAll('.page').forEach(p=>{if(!p.classList.contains('active'))p.style.display='none'});

// ========== データ取得 ==========
async function fetchJ(url){
  try{const r=await fetch(url+'?t='+Date.now());if(!r.ok)throw new Error(r.status);return await r.json();}
  catch(e){return null;}
}
async function loadAll(){
  document.getElementById('update-time').textContent='更新中...';
  const b=base();
  await Promise.all([
    fetchJ(`${b}/data/latest_600.json`).then(d=>{d600=d;render600();}),
    fetchJ(`${b}/data/latest_905.json`).then(d=>{d905=d;render905();}),
    fetchJ(`${b}/data/latest_1535.json`).then(d=>{d1535=d;render1535();}),
    fetchJ(`${b}/data/accuracy_log.json`).then(d=>{dHist=d;renderHistory();}),
  ]);
  document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  fetchRealtime();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function noData(msg,sub){return `<div class="no-data"><span class="icon">📭</span>${esc(msg)}<br><span style="font-size:11px">${esc(sub)}</span></div>`;}
function scoreColor(s){return s>=70?'#22d3a0':s>=50?'#fbbf24':'#f87171';}

// ========== 6:00タブ ==========
function render600(){
  const el=document.getElementById('c600');
  const d=d600;
  if(!d||Object.keys(d).length===0){el.innerHTML=noData('まだ本日の6:00分析がありません','毎朝6:00に自動更新されます');return;}

  const sources=(d.data_sources||[]).map(s=>`<span class="source-badge">${esc(s)}</span>`).join('');
  const news=(d.market_data?.key_news||[]).map(n=>`<div class="news-item ${esc(n.impact||'')}"><strong>${esc(n.title||n)}</strong></div>`).join('');

  const themes=(d.themes||[]).map(t=>{
    const sc=t.confidence_score||0;
    const r=Math.min(t.rank||1,8);
    const bc=sc>=80?'sh':sc>=60?'sm':'sl';
    const stocks=(t.key_stocks||[]).map(s=>`<span class="spill">${esc(s.name)}(${esc(s.code)})</span>`).join('');
    const basis=(t.data_basis||[]).map(b=>`<span class="tag">${esc(b)}</span>`).join('');
    return `<div class="tc r${r}">
      <div class="ttop"><div><div class="tname">${esc(t.name||'')}</div><div class="trnk">#${t.rank||''}</div></div><div class="sbadge ${bc}">${sc}点</div></div>

  const op=d.opening||{};
  const sc=d.morning_accuracy_score||0;
  const circ=2*Math.PI*22;

  const flow=(d.actual_flow||[]).map(a=>`<div class="actual-card">

  </div>`).join('');
  const gaps=(d.prediction_gap||[]).map(g=>{

  const hints=(cor.correction_hints||[]).map(h=>`<div class="hint-card">${esc(h)}</div>`).join('');

        <svg width="60" height="60" viewBox="0 0 60 60">

            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"
            stroke-linecap="round" id="ring905"/>
        </svg>
        <div class="score-num">${sc}</div>
      </div>
      <div class="score-info">
        <div class="score-title">寄り付き精度</div>
        <div class="score-sub">日経: ${esc(op.nikkei_open||'—')} (${esc(op.nikkei_change||'—')})<br>市場: ${esc(op.market_tone||'—')}<br>主役: ${esc(op.dominant_theme||'—')}</div>
      </div>
    </div>
    <div class="slabel">実際の資金の流れ</div>
    <div class="actual-list">${flow||noData('データなし','')}</div>
    <div class="slabel">予測との差分</div>
    <div class="eval-list">${gaps||noData('データなし','')}</div>
    ${watch?`<div class="slabel">午後も注目</div><div class="tag-row">${watch}</div>`:''}
    ${hints?`<div class="slabel">15:35への修正ヒント</div><div class="hint-list">${hints}</div>`:''}
    <div class="slabel">寄り付き総評</div>
    <div class="sumbox">${esc(d.summary||'—')}</div>
  `;
  requestAnimationFrame(()=>{
    const r=document.getElementById('ring905');
    if(r)setTimeout(()=>{r.style.transition='stroke-dashoffset .9s ease';r.setAttribute('stroke-dashoffset',offset.toFixed(1));},150);

        <div class="score-num">${sc}</div>

      <div class="score-info">
        <div class="score-title">本日の最終精度</div>
        <div class="score-sub">日経: ${esc(cl.nikkei||'—')}<br>TOPIX: ${esc(cl.topix||'—')}<br>${esc(cl.total_assessment||'')}</div>
      </div>
    </div>
    <div class="slabel">テーマ最終結果</div>
    <div class="eval-list">${themes||noData('データなし','')}</div>

    <div class="actual-list">${stocks||noData('データなし','')}</div>

    ${tevents||tthemes?`<div class="slabel">明日の注目</div><div class="tag-row">${tevents}${tthemes}</div>`:''}

  requestAnimationFrame(()=>{
    const r=document.getElementById('ring1535');

// ========== 精度履歴 ==========
function renderHistory(){
  const el=document.getElementById('chistory');
  const logs=dHist;
  if(!logs||!logs.length){el.innerHTML=noData('精度履歴がまだありません','15:35評価が蓄積されると表示されます');return;}
  const recent=logs.slice(-12);
  const avg=Math.round(recent.reduce((s,r)=>s+r.accuracy_score,0)/recent.length);
  const bars=recent.map(r=>{
    const h=Math.round((r.accuracy_score/100)*58)+4;
    const col=r.accuracy_score>=70?'#3b82f6':r.accuracy_score>=50?'#fbbf24':'#f87171';
    const dt=(r.date||'').slice(5);
    return `<div class="bar-col"><div class="bar-score">${r.accuracy_score}</div><div class="bar" style="height:${h}px;background:${col}"></div><div class="bar-date">${dt}</div></div>`;
  }).join('');
  el.innerHTML=`
    <div class="slabel">精度トレンド（直近${recent.length}営業日）</div>
    <div class="chart-wrap"><div class="chart-bars">${bars}</div><div class="avg-line">平均精度: <span class="avg-val">${avg}/100</span></div></div>
  `;
}

// ========== 設定 ==========
function saveSettings(){
  const u=document.getElementById('gh-user').value.trim();
  const r=document.getElementById('gh-repo').value.trim();
  if(!u||!r){alert('入力してください');return;}
  localStorage.setItem(GHU,u);localStorage.setItem(GHR,r);
  switchTab('t600');loadAll();
}

// ========== 初期化 ==========
window.addEventListener('DOMContentLoaded',()=>{
  const u=localStorage.getItem(GHU)||'',r=localStorage.getItem(GHR)||'';
  if(u)document.getElementById('gh-user').value=u;
  if(r)document.getElementById('gh-repo').value=r;
  loadAll();
});
</script>
