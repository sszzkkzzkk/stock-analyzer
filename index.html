/* ヘッダー */
.header {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
}
.brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
.logo {
  width: 40px; height: 40px; border-radius: 11px;
  display: grid; place-items: center; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); flex: 0 0 auto;
}
.title { font-size: 22px; font-weight: 800; line-height: 1.05; }
.subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.22; }
.header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.header-meta {
  font-size: 11px; color: var(--muted); padding: 7px 10px;
  border: 1px solid var(--line); border-radius: 999px;
  background: rgba(255,255,255,0.03);
}
.btn {
  border: 1px solid var(--line); background: var(--panel); color: var(--text);
  border-radius: 12px; padding: 10px 14px; cursor: pointer; font: inherit; flex: 0 0 auto;
}
.btn:hover { background: var(--panel2); }

/* リアルタイムティッカー */
.rt-ticker {
  background: rgba(17,26,52,0.95);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 8px 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.rt-ticker-label {
  font-size: 9px; color: var(--muted); letter-spacing: .1em;
  text-transform: uppercase; margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--good); animation: blink 2s infinite; flex-shrink: 0;
}
@keyframes blink {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(49,209,88,.5)}
  60%{opacity:.6;box-shadow:0 0 0 5px rgba(49,209,88,0)}
}
.rt-scroll {
  display: flex; gap: 0; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.rt-scroll::-webkit-scrollbar { display: none; }
.rt-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 12px; min-width: 72px; flex-shrink: 0;
  border-right: 1px solid var(--line); gap: 2px;
}
.rt-item:last-child { border-right: none; }
.rt-name { font-size: 9px; color: var(--muted); white-space: nowrap; }
.rt-val { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1; }
.rt-val.good { color: var(--good); }
.rt-val.bad { color: var(--bad); }
.rt-chg { font-size: 9px; font-weight: 700; }
.good { color: var(--good); }
.bad { color: var(--bad); }
.warn { color: var(--warn); }

/* マーケットバー */
.market-bar {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px; margin-bottom: 8px;
}
.market-chip {
  display: grid; gap: 2px; padding: 7px 9px;
  border-radius: 11px; border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03); min-width: 0; position: relative;
}
.market-chip.live { border-color: rgba(49,209,88,0.25); }
.live-badge {
  position: absolute; top: 5px; right: 6px;
  font-size: 8px; padding: 1px 4px; border-radius: 4px;
  background: rgba(49,209,88,0.15); color: var(--good);
  border: 1px solid rgba(49,209,88,0.3);
}
.market-chip-top {
  display: flex; align-items: baseline; justify-content: space-between; gap: 6px;
}
.market-chip-name, .market-chip-time { font-size: 10px; color: var(--muted); white-space: nowrap; }
.market-chip-value {
  font-size: 15px; font-weight: 900; line-height: 1.1; color: var(--text);
}
.market-chip-value.good { color: var(--good); }
.market-chip-value.bad { color: var(--bad); }
.market-chip-change { font-size: 11px; font-weight: 700; line-height: 1.1; }

/* タブ */
.tabs {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px; margin-bottom: 10px;
}
.tab {
  width: 100%; border: 1px solid var(--line); background: var(--panel);
  color: var(--text); border-radius: 999px; padding: 10px 14px;
  cursor: pointer; font: inherit; text-align: center; min-width: 0;
}
.tab.active {
  border-color: transparent;
  background: linear-gradient(135deg, #2457f5, #6f3ff5);
}

/* パネル */
.panel {
  display: none; background: rgba(17,26,52,.96);
  border: 1px solid var(--line); border-radius: 18px;
  padding: 12px; margin-bottom: 12px;
}
.panel.active { display: block; }

/* サマリーカード */
.summary-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 12px; margin-bottom: 10px;
}
.summary-top {
  display: flex; justify-content: space-between; gap: 10px;
  align-items: flex-start; flex-wrap: wrap; margin-bottom: 8px;
}
.summary-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; line-height: 1.2; }
.summary-title { font-size: 24px; font-weight: 900; line-height: 1.08; word-break: break-word; }
.summary-text { font-size: 13px; color: var(--muted); line-height: 1.42; word-break: break-word; }

.pills, .chips { display: flex; gap: 6px; flex-wrap: wrap; }
.pill, .chip {
  background: var(--chip); border: 1px solid var(--line); border-radius: 999px;
  padding: 5px 9px; font-size: 11px; line-height: 1.2; display: inline-flex; align-items: center;
}

.grid { display: grid; gap: 10px; }
.grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

.card {
  background: var(--panel3); border: 1px solid var(--line);
  border-radius: 15px; padding: 12px; min-width: 0;
}
.card h3 { margin: 0 0 8px; font-size: 15px; }

.list { display: grid; gap: 8px; }
.item {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 10px;
}
.item.tight { padding: 9px 10px; }
.item.danger {
  background: var(--danger-bg); border-color: var(--danger-line); color: var(--danger-text);
}
.item-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
.item-sub { color: var(--muted); line-height: 1.46; font-size: 13px; word-break: break-word; }
.item.danger .item-sub { color: var(--danger-text); }

.watch-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 13px; padding: 10px; min-width: 0; display: grid; gap: 6px;
}
.watch-top { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.watch-title { font-size: 14px; font-weight: 900; line-height: 1.2; word-break: break-word; }
.watch-meta { font-size: 12px; color: var(--muted); line-height: 1.35; word-break: break-word; }
.watch-row {
  display: grid; grid-template-columns: 66px 1fr;
  gap: 8px; font-size: 12px; line-height: 1.35;
}
.watch-key { color: var(--muted); }

.empty {
  border: 1px dashed var(--line); border-radius: 12px;
  padding: 14px; text-align: center; color: var(--muted); font-size: 13px;
}
.table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
table { width: 100%; min-width: 640px; border-collapse: collapse; }
th, td {
  padding: 10px 9px; text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 13px; vertical-align: top;
}
th { color: var(--muted); background: rgba(255,255,255,0.03); }

.notice {
  background: rgba(110,168,254,.10); border: 1px solid rgba(110,168,254,.30);
  color: #dce7ff; border-radius: 12px; padding: 12px; line-height: 1.6; font-size: 13px;
}
.field { display: grid; gap: 6px; margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--muted); }
.field input {
  width: 100%; padding: 11px 12px; border-radius: 12px;
  border: 1px solid var(--line); background: var(--panel); color: var(--text); font: inherit;
}

@media (max-width: 900px) {
  .grid.two, .grid.three { grid-template-columns: 1fr; }
  .market-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .summary-title { font-size: 22px; }
}

<body>
<div class="wrap">

  <!-- ヘッダー -->

  <div class="header">
    <div class="brand">
      <div class="logo">株</div>
      <div>
        <div class="title">株式AI分析</div>
        <div class="subtitle">日本株短期トレード用・個人向け売買判断補助</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-meta" id="globalMeta">更新 -</div>
      <button class="btn" id="refreshBtn">↻ 再読込</button>
    </div>
  </div>

  <!-- リアルタイムティッカー -->

  <div class="rt-ticker">
    <div class="rt-ticker-label"><div class="live-dot"></div>リアルタイム市場（5分更新）</div>
    <div class="rt-scroll" id="rtScroll">
      <div class="rt-item"><div class="rt-name">読込中</div><div class="rt-val">—</div><div class="rt-chg warn">—</div></div>
    </div>
  </div>

  <!-- マーケットバー -->

  <section class="market-bar" id="marketBar"></section>

  <!-- タブ -->

  <div class="tabs">
    <button class="tab active" data-tab="tab600">6:00 戦略会議</button>
    <button class="tab" data-tab="tab905">9:10 行動修正</button>
    <button class="tab" data-tab="tab1200">12:00 後場戦略</button>
    <button class="tab" data-tab="tab1535">15:35 実戦学習</button>
    <button class="tab" data-tab="tabLog">振り返りログ</button>
    <button class="tab" data-tab="tabSettings">設定</button>
  </div>

  <section class="panel active" id="tab600"></section>
  <section class="panel" id="tab905"></section>
  <section class="panel" id="tab1200"></section>
  <section class="panel" id="tab1535"></section>
  <section class="panel" id="tabLog"></section>
  <section class="panel" id="tabSettings"></section>

</div>

<script>
const STORAGE_USER = "stock-ai-user";
const STORAGE_REPO = "stock-ai-repo";

const els = {
  globalMeta: document.getElementById("globalMeta"),
  marketBar: document.getElementById("marketBar"),
  rtScroll: document.getElementById("rtScroll"),
  tab600: document.getElementById("tab600"),
  tab905: document.getElementById("tab905"),
  tab1200: document.getElementById("tab1200"),
  tab1535: document.getElementById("tab1535"),
  tabLog: document.getElementById("tabLog"),
  tabSettings: document.getElementById("tabSettings"),
  refreshBtn: document.getElementById("refreshBtn"),
};

// ===== ユーティリティ =====
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function nl2br(v){return esc(v??"").replace(/\n/g,"<br>");}
function arr(v){return Array.isArray(v)?v:[];}
function compactJoin(list,emptyText="なし"){const f=arr(list).filter(Boolean);return f.length?f.join(" / "):emptyText;}

function baseUrl(){
  const user=localStorage.getItem(STORAGE_USER)||"sszzkkzzkk";
  const repo=localStorage.getItem(STORAGE_REPO)||"stock-analyzer";
  return`https://${user}.github.io/${repo}`;
}

async function fetchJson(path){
  const url=`${baseUrl()}/data/${path}?t=${Date.now()}`;
  const res=await fetch(url,{cache:"no-store"});
  if(!res.ok)throw new Error(`${path}: ${res.status}`);
  return await res.json();
}

function quoteClass(change){
  const s=String(change||"");
  if(s.startsWith("+"))return"good";
  if(s.startsWith("-"))return"bad";
  return"warn";
}

// ===== リアルタイム株価 =====
const RT_SYMS=[
  {id:"^N225",n:"日経225"},
  {id:"NIY=F",n:"日経先物"},
  {id:"^DJI",n:"NYダウ"},
  {id:"^IXIC",n:"NASDAQ"},
  {id:"^GSPC",n:"S&P500"},
  {id:"^SOX",n:"SOX"},
  {id:"USDJPY=X",n:"ドル円"},
  {id:"CL=F",n:"原油WTI"},
  {id:"GC=F",n:"金"},
  {id:"^VIX",n:"VIX"},
];

let rtCache={};

function fpNum(sym,p){
  if(p==null)return"—";
  if(["USDJPY=X","^VIX"].includes(sym))return p.toFixed(2);
  if(p>1000)return p.toLocaleString("ja-JP",{maximumFractionDigits:0});
  return p.toFixed(2);
}
function fpPct(pct){
  if(pct==null)return"—";
  return(pct>=0?"+":"")+pct.toFixed(2)+"%";
}
function rtCls(pct){return pct==null?"warn":pct>0?"good":pct<0?"bad":"warn";}

async function fetchRealtime(){
  const ids=RT_SYMS.map(s=>s.id).join(",");
  const api=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ids)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent`;
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ];
  for(const px of proxies){
    try{
      const res=await fetch(px(api),{signal:AbortSignal.timeout(8000)});
      if(!res.ok)continue;
      let json=await res.json();
      if(json.contents)json=JSON.parse(json.contents);
      const quotes=json?.quoteResponse?.result||[];
      if(!quotes.length)continue;
      quotes.forEach(q=>{rtCache[q.symbol]={p:q.regularMarketPrice,pct:q.regularMarketChangePercent};});
      renderTicker();
      updateMarketBarLive();
      return;
    }catch(e){continue;}
  }
}

function renderTicker(){
  const el=els.rtScroll;
  let h="";
  RT_SYMS.forEach(s=>{
    const d=rtCache[s.id];
    if(!d)return;
    const cls=rtCls(d.pct);
    h+=`<div class="rt-item">
      <div class="rt-name">${s.n}</div>
      <div class="rt-val ${cls}">${fpNum(s.id,d.p)}</div>
      <div class="rt-chg ${cls}">${fpPct(d.pct)}</div>
    </div>`;
  });
  if(h)el.innerHTML=h;
}

function updateMarketBarLive(){
  // マーケットバーのカードをリアルタイムで更新
  const map={"rt-nikkei":"^N225","rt-futures":"NIY=F","rt-dow":"^DJI","rt-usdjpy":"USDJPY=X"};
  Object.entries(map).forEach(([eid,sym])=>{
    const el=document.getElementById(eid);
    if(!el)return;
    const d=rtCache[sym];
    if(!d)return;
    const cls=rtCls(d.pct);
    const labels={"rt-nikkei":"日経平均","rt-futures":"日経先物","rt-dow":"NYダウ","rt-usdjpy":"ドル円"};
    el.innerHTML=`
      <div class="market-chip-top"><div class="market-chip-name">${labels[eid]}</div><div class="market-chip-time">LIVE</div></div>
      <div class="market-chip-value ${cls}">${fpNum(sym,d.p)}</div>
      <div class="market-chip-change ${cls}">${fpPct(d.pct)}</div>
    `;
  });
}

setInterval(fetchRealtime,5*60*1000);

// ===== マーケットバー =====
function firstMatch(data,names,buckets){
  const md=data?.market_data||{};
  const merged=[];
  (buckets||["indices","futures","forex","world_indices","sox","oil"]).forEach(b=>merged.push(...arr(md[b])));
  return merged.find(x=>names.includes(x.name))||null;
}

function renderMarketBar(d600){
  if(!d600){els.marketBar.innerHTML=`<div class="empty" style="grid-column:1/-1">市況データなし</div>`;return;}
  const picks=[
    firstMatch(d600,["日経平均"],["indices"]),
    firstMatch(d600,["日経先物","日経225先物"],["futures"]),
    firstMatch(d600,["ドル円","米ドル円"],["forex"]),
    firstMatch(d600,["NYダウ","ＮＹダウ"],["world_indices"]),
  ].filter(Boolean);
  els.marketBar.innerHTML=picks.length?picks.map((item,i)=>{
    const klass=quoteClass(item.change);
    const ids=["rt-nikkei","rt-futures","rt-usdjpy","rt-dow"];
    return`<div class="market-chip live" id="${ids[i]||''}">
      <span class="live-badge">LIVE</span>
      <div class="market-chip-top"><div class="market-chip-name">${esc(item.name||"-")}</div><div class="market-chip-time">${esc(item.time||"")}</div></div>
      <div class="market-chip-value ${klass}">${esc(item.value||"—")}</div>
      <div class="market-chip-change ${klass}">${esc(item.change||"—")} ${esc(item.percent||"")}</div>
    </div>`;
  }).join(""):`<div class="empty" style="grid-column:1/-1">市況データなし</div>`;
}

// ===== 各タブレンダリング =====
function renderThemeList(items,emptyText="データなし"){
  const list=arr(items).filter(Boolean);
  if(!list.length)return`<div class="empty">${esc(emptyText)}</div>`;
  return`<div class="list">${list.map(x=>`
    <div class="item tight">
      <div class="item-title">${esc(x.name||"-")} ${x.priority?`<span class="chip">${esc(x.priority)}</span>`:""}</div>
      <div class="item-sub">${esc(x.reason||"-")}</div>
    </div>`).join("")}</div>`;
}

function renderThemeStatus(items,emptyText="データなし"){
  const list=arr(items).filter(Boolean);
  if(!list.length)return`<div class="empty">${esc(emptyText)}</div>`;
  return`<div class="list">${list.map(x=>`
    <div class="item tight">
      <div class="item-title">${esc(x.name||"-")} / ${esc(x.type||"-")}</div>
      <div class="item-sub">${esc(x.comment||"-")}</div>
    </div>`).join("")}</div>`;
}

function renderWatchCards(items){
  const list=arr(items).filter(Boolean);
  if(!list.length)return`<div class="empty">監視銘柄なし</div>`;
  return`<div class="grid two">${list.map((x,i)=>`
    <div class="watch-card">
      <div class="watch-top"><span class="pill">優先 ${i+1}</span><div class="watch-title">${esc(x.name||"-")} ${x.code?`(${esc(x.code)})`:""}</div></div>
      <div class="watch-meta">${esc(x.bucket||"-")} / ${esc(x.reason||"-")}</div>
      <div class="watch-row"><div class="watch-key">仕掛け</div><div>${esc(x.trigger||"-")}</div></div>
      <div class="watch-row"><div class="watch-key">失効</div><div>${esc(x.invalidation||"-")}</div></div>
      <div class="watch-row"><div class="watch-key">時間帯</div><div>${esc(x.time_window||"-")}</div></div>
    </div>`).join("")}</div>`;
}

function renderReviewLogs(logs){
  const list=arr(logs).slice().reverse();
  if(!list.length)return`<div class="empty">ログがまだありません</div>`;
  return`<div class="table-wrap"><table>
    <thead><tr><th>日付</th><th>使えた判断</th><th>良かった点</th><th>禁止事項</th><th>次の注目</th><th>テーマ</th><th>執行</th><th>見送り</th></tr></thead>
    <tbody>${list.map(x=>`<tr>
      <td>${esc(x.date||"-")}</td><td>${esc(x.usefulness||"-")}</td><td>${esc(x.easy_pattern||"-")}</td>
      <td>${esc(x.danger_pattern||"-")}</td><td>${esc(x.next_note||"-")}</td>
      <td>${esc(x.theme_score??"-")}</td><td>${esc(x.execution_score??"-")}</td><td>${esc(x.skip_score??"-")}</td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

function setGlobalMeta(...datasets){
  const times=datasets.map(x=>x?.generated_at).filter(Boolean);
  els.globalMeta.textContent=`更新 ${times.length?times.join(" / "):"-"}`;
}

function render600(data){
  if(!data){els.tab600.innerHTML=`<div class="empty">6:00データがありません</div>`;return;}
  const st=data.strategy||{};
  els.tab600.innerHTML=`
    <div class="summary-card">
      <div class="summary-top">
        <div>
          <div class="summary-label">6:00 サマリー</div>
          <div class="summary-title">${esc(st.market_regime_label||"未判定")}</div>
        </div>
        <div class="pills">
          ${st.entry_style_label?`<span class="pill">${esc(st.entry_style_label)}</span>`:""}
          ${st.danger_level?`<span class="pill">危険度 ${esc(st.danger_level)}</span>`:""}
        </div>
      </div>
      <div class="summary-text">${esc(st.conclusion||data.summary||"サマリーなし")}</div>
    </div>

    <div class="card">
      <h3>本命テーマ・本命監視銘柄</h3>
      <div class="grid two">
        <div class="item tight">
          <div class="item-title">本命テーマ</div>

function renderSettings(){
  const user=localStorage.getItem(STORAGE_USER)||"sszzkkzzkk";
  const repo=localStorage.getItem(STORAGE_REPO)||"stock-analyzer";
  els.tabSettings.innerHTML=`
    <div class="notice">接続先や設定はここで管理します。</div>
    <div style="height:12px;"></div>
    <div class="field"><label>GitHub ユーザー名</label><input id="ghUser" value="${esc(user)}" placeholder="例: sszzkkzzkk"></div>
    <div class="field"><label>リポジトリ名</label><input id="ghRepo" value="${esc(repo)}" placeholder="例: stock-analyzer"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" id="saveBtn">保存して接続</button>
      <button class="btn" id="clearBtn">設定クリア</button>
    </div>
  `;
  document.getElementById("saveBtn").addEventListener("click",async()=>{
    localStorage.setItem(STORAGE_USER,document.getElementById("ghUser").value.trim());
    localStorage.setItem(STORAGE_REPO,document.getElementById("ghRepo").value.trim());
    await loadAll();
  });
  document.getElementById("clearBtn").addEventListener("click",()=>{
    localStorage.removeItem(STORAGE_USER);localStorage.removeItem(STORAGE_REPO);
    renderSettings();
  });
}

async function safeLoad(path){try{return await fetchJson(path);}catch{return null;}}

async function loadAll(){
  ["tab600","tab905","tab1200","tab1535","tabLog"].forEach(id=>{
    document.getElementById(id).innerHTML=`<div class="empty">読み込み中...</div>`;
  });
  const[d600,d905,d1200,d1535,logs]=await Promise.all([
    safeLoad("latest_600.json"),safeLoad("latest_905.json"),
    safeLoad("latest_1200.json"),safeLoad("latest_1535.json"),
    safeLoad("review_log.json"),
  ]);
  setGlobalMeta(d600,d905,d1200,d1535);
  renderMarketBar(d600);
  render600(d600);render905(d905);render1200(d1200);render1535(d1535);
  renderLog(logs);renderSettings();
  fetchRealtime();
}

// タブ切替
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

document.getElementById("refreshBtn").addEventListener("click",loadAll);
loadAll();
