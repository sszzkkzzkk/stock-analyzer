<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式AI分析</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel2: #182145;
      --text: #eef2ff;
      --muted: #9aa6c7;
      --line: #2c396b;
      --accent: #6ea8fe;
      --accent2: #8b5cf6;
      --chip: #23305e;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #07101d 0%, #0d1630 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .title {
      font-size: 24px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .btn:hover {
      background: var(--panel2);
    }

    .btn.primary {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .statusbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(18,25,51,.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .tab.active {
      border-color: transparent;
      background: linear-gradient(135deg, #2457f5, #6f3ff5);
    }

    .panel {
      display: none;
      background: rgba(18,25,51,.95);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
    }

    .item-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      font-size: 14px;
      align-items: start;
    }

    .kv div:nth-child(odd) {
      color: var(--muted);
    }

    .theme-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .rank {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #3650a8;
      background: #21316b;
      color: #dfe7ff;
      font-size: 12px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .notice {
      background: rgba(110,168,254,.10);
      border: 1px solid rgba(110,168,254,.30);
      color: #dce7ff;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.7;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    .big {
      font-size: 24px;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .statusbar,
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }

      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <div class="logo">株</div>
        <div>
          <div class="title">株式AI分析</div>
          <div class="subtitle">6:00予測 / 9:05確認 / 15:35総括</div>
        </div>
      </div>
      <button class="btn" id="refreshBtn">↻ 再読込</button>
    </div>

    <div class="statusbar">
      <div class="stat">
        <div class="label">接続先</div>
        <div class="value" id="repoStatus">未設定</div>
      </div>
      <div class="stat">
        <div class="label">最新6:00</div>
        <div class="value" id="status600">-</div>
      </div>
      <div class="stat">
        <div class="label">最新9:05</div>
        <div class="value" id="status905">-</div>
      </div>
      <div class="stat">
        <div class="label">最新15:35</div>
        <div class="value" id="status1535">-</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="tab600">6:00 予測</button>
      <button class="tab" data-tab="tab905">9:05 確認</button>
      <button class="tab" data-tab="tab1535">15:35 総括</button>
      <button class="tab" data-tab="tabAcc">精度履歴</button>
      <button class="tab" data-tab="tabSettings">設定</button>
    </div>

    <section class="panel active" id="tab600"></section>
    <section class="panel" id="tab905"></section>
    <section class="panel" id="tab1535"></section>
    <section class="panel" id="tabAcc"></section>
    <section class="panel" id="tabSettings"></section>
  </div>

  <script>
    const STORAGE_USER = "stock-ai-user";
    const STORAGE_REPO = "stock-ai-repo";

    const els = {
      repoStatus: document.getElementById("repoStatus"),
      status600: document.getElementById("status600"),
      status905: document.getElementById("status905"),
      status1535: document.getElementById("status1535"),
      tab600: document.getElementById("tab600"),
      tab905: document.getElementById("tab905"),
      tab1535: document.getElementById("tab1535"),
      tabAcc: document.getElementById("tabAcc"),
      tabSettings: document.getElementById("tabSettings"),
      refreshBtn: document.getElementById("refreshBtn"),
    };

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl2br(v) {
      return esc(v ?? "").replace(/\n/g, "<br>");
    }

    function arr(v) {
      return Array.isArray(v) ? v : [];
    }

    function formatValue(x) {
      if (x == null) return "-";

      if (typeof x === "string" || typeof x === "number" || typeof x === "boolean") {
        return esc(String(x));
      }

      if (Array.isArray(x)) {
        return x.map(formatValue).join("<br>");
      }

      if (typeof x === "object") {
        const labels = {
          name: "名称",
          value: "値",
          change: "変化",
          percent: "変化率",
          time: "時刻",
          code: "コード",
          price: "価格",
          volume: "出来高",
        };

        const order = ["name", "value", "change", "percent", "time", "code", "price", "volume"];
        const keys = [...order.filter(k => k in x), ...Object.keys(x).filter(k => !order.includes(k))];

        return keys
          .filter(k => x[k] !== "" && x[k] !== null && x[k] !== undefined)
          .map(k => `<strong>${esc(labels[k] || k)}</strong>: ${esc(String(x[k]))}`)
          .join("<br>");
      }

      return esc(String(x));
    }

    function chipList(items) {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">データなし</div>`;
      return `<div class="chips">${list.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</div>`;
    }

    function renderSimpleList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-sub">${formatValue(x)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderThemeCards(themes) {
      const list = arr(themes);
      if (!list.length) return `<div class="empty">テーマ予測がまだありません</div>`;

      return `
        <div class="list">
          ${list.map(t => `
            <div class="item">
              <div class="theme-head">
                <span class="rank">${esc(t.rank ?? "-")}</span>
                <div class="item-title">${esc(t.name || "テーマ名なし")}</div>
                <span class="badge">信頼度 ${esc(t.confidence_score ?? "-")}</span>
              </div>
              <div class="kv">
                <div>根拠</div><div>${nl2br(t.rationale || "-")}</div>
                <div>データ根拠</div><div>${arr(t.data_basis).map(esc).join(" / ") || "-"}</div>
                <div>関連銘柄</div>
                <div>
                  ${arr(t.key_stocks).length
                    ? arr(t.key_stocks).map(s => `${esc(s.name || "-")} (${esc(s.code || "-")})：${esc(s.reason || "-")}`).join("<br>")
                    : "-"}
                </div>
                <div>リスク</div><div>${nl2br(t.risk_factors || "-")}</div>
                <div>米国連動</div><div>${nl2br(t.us_connection || "-")}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderActualFlow(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">実際の資金フローなし</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.theme || "-")} <span class="badge">${esc(x.strength || "-")}</span></div>
              <div class="item-sub">${nl2br(x.evidence || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderGap(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">比較データなし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>予測テーマ</th>
                <th>予測スコア</th>
                <th>結果</th>
                <th>ズレた理由</th>
                <th>見落とし</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.predicted_theme || "-")}</td>
                  <td>${esc(x.predicted_score ?? "-")}</td>
                  <td>${esc(x.actual_result || "-")}</td>
                  <td>${esc(x.gap_reason || "-")}</td>
                  <td>${esc(x.missed_factor || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderThemeResults(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">テーマ結果なし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>テーマ</th>
                <th>朝スコア</th>
                <th>最終判定</th>
                <th>詳細</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.name || "-")}</td>
                  <td>${esc(x.morning_score ?? "-")}</td>
                  <td>${esc(x.final_result || "-")}</td>
                  <td>${esc(x.detail || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderStockResults(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">銘柄結果なし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>銘柄</th>
                <th>コード</th>
                <th>終値</th>
                <th>変化率</th>
                <th>コメント</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.name || "-")}</td>
                  <td>${esc(x.code || "-")}</td>
                  <td>${esc(x.close || "-")}</td>
                  <td>${esc(x.change || "-")}</td>
                  <td>${esc(x.comment || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderNewsImpact(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">ニュース影響なし</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.news || "-")}</div>
              <div class="item-sub">${nl2br(x.impact || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderAccuracyTable(logs) {
      const list = arr(logs).slice().reverse();
      if (!list.length) return `<div class="empty">精度履歴がまだありません</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>精度</th>
                <th>強かったテーマ</th>
                <th>弱かったテーマ</th>
                <th>改善ヒント</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.date || "-")}</td>
                  <td>${esc(x.accuracy_score ?? "-")}</td>
                  <td>${esc(x.strongest_theme || "-")}</td>
                  <td>${esc(x.weakest_theme || "-")}</td>
                  <td>${arr(x.improvement_hints).map(esc).join(" / ") || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function baseUrl() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";
      if (!user || !repo) return "";
      return `https://${user}.github.io/${repo}`;
    }

    async function fetchJson(path) {
      const base = baseUrl();
      if (!base) throw new Error("GitHub設定が未入力");
      const url = `${base}/data/${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`${path} の取得失敗: ${res.status}`);
      }
      return await res.json();
    }

    function updateRepoStatus() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";
      els.repoStatus.textContent = user && repo ? `${user}/${repo}` : "未設定";
    }

    function setStatus(el, data) {
      if (!data) {
        el.textContent = "未取得";
        return;
      }
      el.textContent = `${data.date || "-"} ${data.generated_at || "-"}`;
    }

    function render600(data) {
      if (!data) {
        els.tab600.innerHTML = `<div class="empty">6:00データがありません</div>`;
        return;
      }

      const market = data.market_data || {};
      els.tab600.innerHTML = `
        <div class="grid two">
          <div class="card">
            <h3>6:00予測サマリー</h3>
            <div class="kv">
              <div>日付</div><div>${esc(data.date || "-")}</div>
              <div>生成時刻</div><div>${esc(data.generated_at || "-")}</div>
              <div>最重要ファクター</div><div>${nl2br(data.big_picture || "-")}</div>
              <div>相場展望</div><div>${nl2br(data.summary || "-")}</div>
            </div>
          </div>
          <div class="card">
            <h3>データソース</h3>
            ${chipList(data.data_sources)}
          </div>
        </div>

        <div class="grid three" style="margin-top:14px;">
          <div class="card">
            <h3>国内指数</h3>
            ${renderSimpleList(market.indices, "国内指数データなし")}
          </div>
          <div class="card">
            <h3>海外指数</h3>
            ${renderSimpleList(market.world_indices, "海外指数データなし")}
          </div>
          <div class="card">
            <h3>為替 / 主要ニュース</h3>
            <div class="list">
              <div class="item">
                <div class="item-title">為替</div>
                <div class="item-sub">${arr(market.forex).length ? arr(market.forex).map(formatValue).join("<br><br>") : "データなし"}</div>
              </div>
              <div class="item">
                <div class="item-title">主要ニュース</div>
                <div class="item-sub">${arr(market.key_news).map(esc).join("<br>") || "データなし"}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>予測テーマ</h3>
          ${renderThemeCards(data.themes)}
        </div>
      `;
    }

    function render905(data) {
      if (!data) {
        els.tab905.innerHTML = `<div class="empty">9:05データがありません</div>`;
        return;
      }

      const opening = data.opening || {};
      const corr = data.intraday_correction || {};

      els.tab905.innerHTML = `
        <div class="grid two">
          <div class="card">
            <h3>寄り付き総評</h3>
            <div class="kv">
              <div>日付</div><div>${esc(data.date || "-")}</div>
              <div>生成時刻</div><div>${esc(data.generated_at || "-")}</div>
              <div>日経始値</div><div>${esc(opening.nikkei_open || "-")}</div>
              <div>日経変化率</div><div>${esc(opening.nikkei_change || "-")}</div>
              <div>市場トーン</div><div>${esc(opening.market_tone || "-")}</div>
              <div>主役テーマ</div><div>${esc(opening.dominant_theme || "-")}</div>
              <div>朝の精度</div><div class="big">${esc(data.morning_accuracy_score ?? "-")}</div>
              <div>要約</div><div>${nl2br(data.summary || "-")}</div>
            </div>
          </div>
          <div class="card">
            <h3>場中修正</h3>
            <div class="kv">
              <div>継続監視</div><div>${arr(corr.themes_to_watch).map(esc).join(" / ") || "-"}</div>
              <div>失速テーマ</div><div>${arr(corr.themes_faded).map(esc).join(" / ") || "-"}</div>
              <div>修正ヒント</div><div>${arr(corr.correction_hints).map(esc).join("<br>") || "-"}</div>
              <div>データソース</div><div>${arr(data.data_sources).map(esc).join(" / ") || "-"}</div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>実際の資金フロー</h3>
          ${renderActualFlow(data.actual_flow)}
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>6:00予測との差分</h3>
          ${renderGap(data.prediction_gap)}
        </div>
      `;
    }

    function render1535(data) {
      if (!data) {
        els.tab1535.innerHTML = `<div class="empty">15:35データがありません</div>`;
        return;
      }

      const closing = data.closing || {};
      const tomorrow = data.tomorrow_outlook || {};

      els.tab1535.innerHTML = `
        <div class="grid two">
          <div class="card">
            <h3>大引け総括</h3>
            <div class="kv">
              <div>日付</div><div>${esc(data.date || "-")}</div>
              <div>生成時刻</div><div>${esc(data.generated_at || "-")}</div>
              <div>日経平均</div><div>${esc(closing.nikkei || "-")}</div>
              <div>TOPIX</div><div>${esc(closing.topix || "-")}</div>
              <div>総評</div><div>${nl2br(closing.total_assessment || "-")}</div>
              <div>最終精度</div><div class="big">${esc(data.final_accuracy_score ?? "-")}</div>
              <div>最も当たったテーマ</div><div>${esc(data.strongest_theme || "-")}</div>
              <div>最も外れたテーマ</div><div>${esc(data.weakest_theme || "-")}</div>
              <div>総括</div><div>${nl2br(data.summary || "-")}</div>
            </div>
          </div>
          <div class="card">
            <h3>明日への視点</h3>
            <div class="kv">
              <div>重要イベント</div><div>${arr(tomorrow.key_events).map(esc).join("<br>") || "-"}</div>
              <div>注目テーマ</div><div>${arr(tomorrow.watch_themes).map(esc).join(" / ") || "-"}</div>
              <div>ヒント</div><div>${nl2br(tomorrow.hint || "-")}</div>
              <div>9:05修正評価</div><div>${nl2br(data.correction_evaluation || "-")}</div>
              <div>学習ポイント</div><div>${arr(data.learning_points).map(esc).join("<br>") || "-"}</div>
              <div>データソース</div><div>${arr(data.data_sources).map(esc).join(" / ") || "-"}</div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>テーマ別結果</h3>
          ${renderThemeResults(data.theme_results)}
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>銘柄別結果</h3>
          ${renderStockResults(data.stock_results)}
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>ニュース影響</h3>
          ${renderNewsImpact(data.news_impact)}
        </div>
      `;
    }

    function renderAccuracy(logs) {
      els.tabAcc.innerHTML = `
        <div class="card">
          <h3>精度履歴</h3>
          ${renderAccuracyTable(logs)}
        </div>
      `;
    }

    function renderSettings() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";

      els.tabSettings.innerHTML = `
        <div class="notice">
          GitHub Pages 上の <code>data/latest_600.json</code> などを読み込みます。
        </div>
        <div style="height:12px;"></div>
        <div class="field">
          <label for="ghUser">GitHub ユーザー名</label>
          <input id="ghUser" value="${esc(user)}" placeholder="例: sszzkkzzkk">
        </div>
        <div class="field">
          <label for="ghRepo">リポジトリ名</label>
          <input id="ghRepo" value="${esc(repo)}" placeholder="例: stock-analyzer">
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn primary" id="saveSettingsBtn">保存して接続</button>
          <button class="btn" id="clearSettingsBtn">設定クリア</button>
        </div>
      `;

      document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const userVal = document.getElementById("ghUser").value.trim();
        const repoVal = document.getElementById("ghRepo").value.trim();
        localStorage.setItem(STORAGE_USER, userVal);
        localStorage.setItem(STORAGE_REPO, repoVal);
        updateRepoStatus();
        await loadAll();
      });

      document.getElementById("clearSettingsBtn").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_USER);
        localStorage.removeItem(STORAGE_REPO);
        updateRepoStatus();
        render600(null);
        render905(null);
        render1535(null);
        renderAccuracy(null);
        renderSettings();
      });
    }

    async function safeLoad(path) {
      try {
        return await fetchJson(path);
      } catch (e) {
        return null;
      }
    }

    async function loadAll() {
      updateRepoStatus();

      if (!baseUrl()) {
        render600(null);
        render905(null);
        render1535(null);
        renderAccuracy(null);
        renderSettings();
        return;
      }

      els.tab600.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab905.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab1535.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tabAcc.innerHTML = `<div class="empty">読み込み中...</div>`;

      const [d600, d905, d1535, logs] = await Promise.all([
        safeLoad("latest_600.json"),
        safeLoad("latest_905.json"),
        safeLoad("latest_1535.json"),
        safeLoad("accuracy_log.json"),
      ]);

      setStatus(els.status600, d600);
      setStatus(els.status905, d905);
      setStatus(els.status1535, d1535);

      render600(d600);
      render905(d905);
      render1535(d1535);
      renderAccuracy(logs);
      renderSettings();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    els.refreshBtn.addEventListener("click", loadAll);

    updateRepoStatus();
    loadAll();
  </script>
</body>
</html>
