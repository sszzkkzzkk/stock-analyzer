<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式AI分析</title>
  <style>
    :root {
      --bg: #09101f;
      --panel: #111a34;
      --panel2: #182145;
      --text: #eef2ff;
      --muted: #9aa6c7;
      --line: #2d3968;
      --accent: #6ea8fe;
      --accent2: #8b5cf6;
      --chip: #23305e;
      --good: #31d158;
      --bad: #ff6b6b;
      --warn: #f7b731;
      --danger-bg: rgba(255, 107, 107, 0.12);
      --danger-line: rgba(255, 107, 107, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #07101d 0%, #0c1530 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .btn:hover {
      background: var(--panel2);
    }

    .status-banner {
      margin-bottom: 12px;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .status-banner.failed {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: #ffd7d7;
    }

    .hero {
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .quote-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .quote {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      min-width: 0;
    }

    .quote-name {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .quote-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
    }

    .quote-change {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .quote-time {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }

    .top-decision-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 12px;
    }

    .decision-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
    }

    .decision-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .decision-main {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.4;
    }

    .decision-sub {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .stance-chip {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--chip);
      font-size: 12px;
      margin-right: 8px;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .tab.active {
      border-color: transparent;
      background: linear-gradient(135deg, #2457f5, #6f3ff5);
    }

    .panel {
      display: none;
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
    }

    .item-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .search-box {
      margin-bottom: 14px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      font: inherit;
    }

    .mini-info {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mini-pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .notice {
      background: rgba(110,168,254,.10);
      border: 1px solid rgba(110,168,254,.30);
      color: #dce7ff;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.7;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    @media (max-width: 900px) {
      .quote-grid,
      .top-decision-grid,
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }

      .quote-value {
        font-size: 24px;
      }

      .decision-main {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <div class="logo">株</div>
        <div>
          <div class="title">株式AI分析</div>
          <div class="subtitle">毎朝の日本株トレード判断補助</div>
        </div>
      </div>
      <button class="btn" id="refreshBtn">↻ 再読込</button>
    </div>

    <section class="hero" id="heroPanel"></section>

    <div class="tabs">
      <button class="tab active" data-tab="tab600">6:00 朝の予測</button>
      <button class="tab" data-tab="tab905">9:05 寄り後確認</button>
      <button class="tab" data-tab="tab1535">15:35 引け後総括</button>
      <button class="tab" data-tab="tabLog">振り返りログ</button>
      <button class="tab" data-tab="tabSettings">設定</button>
    </div>

    <section class="panel active" id="tab600"></section>
    <section class="panel" id="tab905"></section>
    <section class="panel" id="tab1535"></section>
    <section class="panel" id="tabLog"></section>
    <section class="panel" id="tabSettings"></section>
  </div>

  <script>
    const STORAGE_USER = "stock-ai-user";
    const STORAGE_REPO = "stock-ai-repo";

    const els = {
      heroPanel: document.getElementById("heroPanel"),
      tab600: document.getElementById("tab600"),
      tab905: document.getElementById("tab905"),
      tab1535: document.getElementById("tab1535"),
      tabLog: document.getElementById("tabLog"),
      tabSettings: document.getElementById("tabSettings"),
      refreshBtn: document.getElementById("refreshBtn"),
    };

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl2br(v) {
      return esc(v ?? "").replace(/\n/g, "<br>");
    }

    function arr(v) {
      return Array.isArray(v) ? v : [];
    }

    function chipList(items) {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">データなし</div>`;
      return `<div class="chips">${list.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</div>`;
    }

    function renderSimpleList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.name || x.role || "")}</div>
              <div class="item-sub">${Object.entries(x)
                .filter(([k, v]) => !["name"].includes(k) && v !== "" && v != null)
                .map(([k, v]) => `${esc(k)}: ${esc(String(v))}`)
                .join("<br>")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTextList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-sub">${typeof x === "string" ? esc(x) : esc(JSON.stringify(x))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderThemeList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.name || "-")}</div>
              <div class="item-sub">${esc(x.reason || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderWatchlist(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.role || "-")} / ${esc(x.name || "-")} ${x.code ? `(${esc(x.code)})` : ""}</div>
              <div class="item-sub">${esc(x.reason || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderReviewLogs(logs) {
      const list = arr(logs).slice().reverse();
      if (!list.length) return `<div class="empty">ログがまだありません</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>使えた判断</th>
                <th>取りやすかった型</th>
                <th>危険だった型</th>
                <th>次の注意点</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.date || "-")}</td>
                  <td>${esc(x.usefulness || "-")}</td>
                  <td>${esc(x.easy_pattern || "-")}</td>
                  <td>${esc(x.danger_pattern || "-")}</td>
                  <td>${esc(x.next_note || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function baseUrl() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";
      if (!user || !repo) return "";
      return `https://${user}.github.io/${repo}`;
    }

    async function fetchJson(path) {
      const base = baseUrl();
      if (!base) throw new Error("GitHub設定が未入力");
      const url = `${base}/data/${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`${path} の取得失敗: ${res.status}`);
      }
      return await res.json();
    }

    function quoteClass(change) {
      const s = String(change || "");
      if (s.startsWith("+")) return "good";
      if (s.startsWith("-")) return "bad";
      return "warn";
    }

    function firstMatchItem(data, names, buckets = []) {
      const market = data?.market_data || {};
      const merged = [];
      const useBuckets = buckets.length ? buckets : ["indices", "futures", "forex", "world_indices"];
      useBuckets.forEach(b => merged.push(...arr(market[b])));
      return merged.find(x => names.includes(x.name)) || null;
    }

    function renderHero(d600) {
      if (!d600) {
        els.heroPanel.innerHTML = `<div class="empty">データがありません</div>`;
        return;
      }

      const decision = d600.decision || {};
      const nikkei = firstMatchItem(d600, ["日経平均"], ["indices"]);
      const futures = firstMatchItem(d600, ["日経先物", "日経225先物"], ["futures"]);
      const usdjpy = firstMatchItem(d600, ["ドル円", "米ドル円"], ["forex"]);
      const nydow = firstMatchItem(d600, ["NYダウ", "ＮＹダウ"], ["world_indices"]);
      const quotes = [nikkei, futures, usdjpy, nydow].filter(x => x && x.value && x.change && x.time);

      const failedBanner = d600.analysis_status === "failed"
        ? `
          <div class="status-banner failed">
            AI分析は失敗しました。主要指標は取得済みデータです。分析部分は再実行またはプロンプト調整が必要です。
          </div>
        `
        : "";

      els.heroPanel.innerHTML = `
        ${failedBanner}

        <div class="quote-grid">
          ${quotes.length ? quotes.map(item => `
            <div class="quote">
              <div class="quote-name">${esc(item.name || "-")}</div>
              <div class="quote-value">${esc(item.value || "—")}</div>
              <div class="quote-change ${quoteClass(item.change)}">${esc(item.change || "—")}</div>
              <div class="quote-time">${esc(item.time || "")}</div>
            </div>
          `).join("") : `
            <div class="quote">
              <div class="quote-name">主要指標</div>
              <div class="quote-value">—</div>
              <div class="quote-change warn">未取得</div>
            </div>
          `}
        </div>

        <div class="top-decision-grid">
          <div class="decision-card">
            <div class="decision-label">今日の結論</div>
            <div class="decision-main">${esc(decision.conclusion || d600.summary || "結論なし")}</div>
            <div class="decision-sub">
              ${decision.stance ? `<span class="stance-chip">${esc(decision.stance)}</span>` : ""}
              ${decision.market_tone ? `<span class="stance-chip">${esc(decision.market_tone)}</span>` : ""}
              ${decision.trading_style ? `<span class="stance-chip">${esc(decision.trading_style)}</span>` : ""}
            </div>
          </div>

          <div class="decision-card">
            <div class="decision-label">地合い</div>
            <div class="decision-main">${esc(decision.market_tone || "未判定")}</div>
            <div class="decision-sub">${esc(decision.trading_style || "")}</div>
          </div>

          <div class="decision-card">
            <div class="decision-label">今日の行動案</div>
            <div class="decision-main">${arr(d600.action_plan).length ? esc(d600.action_plan[0]) : "未設定"}</div>
            <div class="decision-sub">${arr(d600.action_plan).slice(1).map(esc).join(" / ")}</div>
          </div>
        </div>
      `;
    }

    function render600(data) {
      if (!data) {
        els.tab600.innerHTML = `<div class="empty">6:00データがありません</div>`;
        return;
      }

      els.tab600.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid three">
          <div class="card">
            <h3>強いテーマ</h3>
            ${renderThemeList(data.strong_themes, "強いテーマなし")}
          </div>
          <div class="card">
            <h3>弱いテーマ</h3>
            ${renderThemeList(data.weak_themes, "弱いテーマなし")}
          </div>
          <div class="card">
            <h3>監視銘柄</h3>
            ${renderWatchlist(data.watchlist, "監視銘柄なし")}
          </div>
        </div>

        <div class="grid two" style="margin-top:14px;">
          <div class="card">
            <h3>今日の行動案</h3>
            ${renderTextList(data.action_plan, "行動案なし")}
          </div>
          <div class="card">
            <h3>注意点</h3>
            ${renderTextList(data.risk_notes, "注意点なし")}
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>参考データ</h3>
          ${chipList(data.data_sources)}
        </div>
      `;
    }

    function render905(data) {
      if (!data) {
        els.tab905.innerHTML = `<div class="empty">9:05データがありません</div>`;
        return;
      }

      const memo = data.correction_memo || {};

      els.tab905.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid two">
          <div class="card">
            <h3>寄り後確認</h3>
            <div class="list">
              <div class="item"><div class="item-title">実際に何が強いか</div><div class="item-sub">${esc(memo.actual_leader || "-")}</div></div>
              <div class="item"><div class="item-title">朝予測とのズレ</div><div class="item-sub">${esc(memo.gap_from_morning || "-")}</div></div>
              <div class="item"><div class="item-title">今から触れるか</div><div class="item-sub">${esc(memo.tradable_now || "-")}</div></div>
              <div class="item"><div class="item-title">見送りか</div><div class="item-sub">${esc(memo.skip_or_not || "-")}</div></div>
            </div>
          </div>

          <div class="card">
            <h3>行動修正メモ</h3>
            <div class="item">
              <div class="item-sub">${nl2br(data.summary || "-")}</div>
            </div>
          </div>
        </div>
      `;
    }

    function render1535(data) {
      if (!data) {
        els.tab1535.innerHTML = `<div class="empty">15:35データがありません</div>`;
        return;
      }

      const review = data.review || {};

      els.tab1535.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid two">
          <div class="card">
            <h3>翌日に活かす反省メモ</h3>
            <div class="list">
              <div class="item"><div class="item-title">実際に強かったテーマ</div><div class="item-sub">${arr(review.actually_strong).map(esc).join(" / ") || "-"}</div></div>
              <div class="item"><div class="item-title">朝予測とのズレ</div><div class="item-sub">${esc(review.morning_gap || "-")}</div></div>
              <div class="item"><div class="item-title">取りやすかった型</div><div class="item-sub">${esc(review.easy_pattern || "-")}</div></div>
              <div class="item"><div class="item-title">危なかった型</div><div class="item-sub">${esc(review.danger_pattern || "-")}</div></div>
              <div class="item"><div class="item-title">明日以降の注意点</div><div class="item-sub">${esc(review.next_note || "-")}</div></div>
            </div>
          </div>

          <div class="card">
            <h3>引け後総括</h3>
            <div class="item">
              <div class="item-sub">${nl2br(data.summary || "-")}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderLog(logs) {
      els.tabLog.innerHTML = `
        <div class="card">
          <h3>振り返りログ</h3>
          ${renderReviewLogs(logs)}
        </div>
      `;
    }

    function renderSettings() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";

      els.tabSettings.innerHTML = `
        <div class="notice">
          接続先や設定はここで管理します。
        </div>
        <div style="height:12px;"></div>

        <div class="field">
          <label for="ghUser">GitHub ユーザー名</label>
          <input id="ghUser" value="${esc(user)}" placeholder="例: sszzkkzzkk">
        </div>

        <div class="field">
          <label for="ghRepo">リポジトリ名</label>
          <input id="ghRepo" value="${esc(repo)}" placeholder="例: stock-analyzer">
        </div>

        <div class="field">
          <label>現在の接続先</label>
          <div>${esc(user && repo ? `${user}/${repo}` : "未設定")}</div>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn" id="saveSettingsBtn">保存して接続</button>
          <button class="btn" id="clearSettingsBtn">設定クリア</button>
        </div>
      `;

      document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const userVal = document.getElementById("ghUser").value.trim();
        const repoVal = document.getElementById("ghRepo").value.trim();
        localStorage.setItem(STORAGE_USER, userVal);
        localStorage.setItem(STORAGE_REPO, repoVal);
        await loadAll();
      });

      document.getElementById("clearSettingsBtn").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_USER);
        localStorage.removeItem(STORAGE_REPO);
        renderHero(null);
        render600(null);
        render905(null);
        render1535(null);
        renderLog(null);
        renderSettings();
      });
    }

    async function safeLoad(path) {
      try {
        return await fetchJson(path);
      } catch (e) {
        return null;
      }
    }

    async function loadAll() {
      if (!baseUrl()) {
        renderHero(null);
        render600(null);
        render905(null);
        render1535(null);
        renderLog(null);
        renderSettings();
        return;
      }

      els.heroPanel.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab600.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab905.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab1535.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tabLog.innerHTML = `<div class="empty">読み込み中...</div>`;

      const [d600, d905, d1535, logs] = await Promise.all([
        safeLoad("latest_600.json"),
        safeLoad("latest_905.json"),
        safeLoad("latest_1535.json"),
        safeLoad("review_log.json"),
      ]);

      renderHero(d600);
      render600(d600);
      render905(d905);
      render1535(d1535);
      renderLog(logs);
      renderSettings();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    els.refreshBtn.addEventListener("click", loadAll);

    loadAll();
  </script>
</body>
</html>
