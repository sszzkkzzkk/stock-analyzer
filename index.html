<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式AI分析</title>
  <style>
    :root{--bg:#07101d;--bg2:#0c1530;--panel:#111a34;--panel2:#182145;--panel3:#0f1730;--text:#eef2ff;--muted:#9aa6c7;--line:#2d3968;--accent:#6ea8fe;--accent2:#8b5cf6;--chip:#23305e;--good:#31d158;--bad:#ff6b6b;--warn:#f7b731;--danger-bg:rgba(255,107,107,.16);--danger-line:rgba(255,107,107,.42);--danger-text:#ffd6d6;--gold:#ffcc66;--gold-bg:rgba(255,204,102,.12);--gold-line:rgba(255,204,102,.35);--silver:#9fd6ff;--silver-bg:rgba(159,214,255,.10);--silver-line:rgba(159,214,255,.28);--hdr-h:0px;--market-h:0px;--tabs-h:0px}
    *{box-sizing:border-box}html,body{margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    .wrap{max-width:1180px;margin:0 auto;padding:12px}
    .hdr{position:sticky;top:0;z-index:300;background:rgba(6,13,26,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04);box-shadow:0 6px 18px rgba(0,0,0,.16)}
    .hdr-inner{max-width:1180px;margin:0 auto;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));flex:0 0 auto}
    .title{font-size:22px;font-weight:800;line-height:1.05}.subtitle{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.2}
    .header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.header-meta{font-size:11px;color:var(--muted);padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.03)}
    .btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer;font:inherit}
    .btn:hover{background:var(--panel2)}
    .market-strip{position:sticky;top:var(--hdr-h);z-index:290;background:rgba(6,13,26,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04)}
    .market-strip-inner{max-width:1180px;margin:0 auto;padding:8px 12px 10px}
    .market-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .market-chip{display:grid;gap:2px;padding:8px 10px;border-radius:11px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);min-width:0;cursor:pointer;appearance:none;color:inherit}
    .market-chip.active{border-color:rgba(110,168,254,.55);box-shadow:0 0 0 1px rgba(110,168,254,.18) inset;background:rgba(110,168,254,.08)}
    .market-chip-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px}.market-chip-name,.market-chip-time{font-size:10px;color:var(--muted);white-space:nowrap}
    .market-chip-value{font-size:15px;font-weight:900;line-height:1.08;color:var(--text)}.market-chip-change{font-size:11px;font-weight:700;line-height:1.08}
    .good,.market-chip-value.good{color:var(--good)}.bad,.market-chip-value.bad{color:var(--bad)}.warn,.market-chip-value.warn{color:var(--warn)}
    .focus-mini{margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(17,26,52,.92)}
    .focus-left{min-width:0}.focus-kicker{font-size:11px;color:var(--muted);margin-bottom:3px}.focus-main{font-size:16px;font-weight:900;line-height:1.1}.focus-main.good{color:var(--good)}.focus-main.bad{color:var(--bad)}.focus-main.warn{color:var(--warn)}.focus-sub{font-size:12px;color:var(--muted);line-height:1.35}
    .pills,.chips{display:flex;gap:6px;flex-wrap:wrap}.pill,.chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:11px;line-height:1.2;display:inline-flex;align-items:center}
    .tabs-wrap{position:sticky;top:calc(var(--hdr-h) + var(--market-h));z-index:280;background:rgba(6,13,26,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04)}
    .tabs-inner{max-width:1180px;margin:0 auto;padding:8px 12px 10px}.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .tab{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:11px 14px;cursor:pointer;font:inherit;text-align:center;min-width:0;font-weight:700}
    .tab.active{border-color:transparent;background:linear-gradient(135deg,#2457f5,#6f3ff5)}
    .content{padding-top:12px}.panel{display:none;background:rgba(17,26,52,.96);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px;scroll-margin-top:calc(var(--hdr-h) + var(--market-h) + var(--tabs-h) + 12px)}.panel.active{display:block}
    .summary-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;margin-bottom:10px}
    .summary-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
    .summary-label{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.2}.summary-title{font-size:24px;font-weight:900;line-height:1.08;word-break:break-word}.summary-text{font-size:13px;color:var(--muted);line-height:1.42;word-break:break-word}
    .grid{display:grid;gap:10px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:var(--panel3);border:1px solid var(--line);border-radius:15px;padding:12px;min-width:0}.card h3{margin:0 0 8px;font-size:15px}
    .list{display:grid;gap:8px}.item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}.item.tight{padding:9px 10px}.item.danger{background:var(--danger-bg);border-color:var(--danger-line);color:var(--danger-text)}
    .item-title{font-weight:700;margin-bottom:4px;font-size:14px}.item-sub{color:var(--muted);line-height:1.46;font-size:13px;word-break:break-word}.item.danger .item-sub{color:var(--danger-text)}
    .priority-card{border-radius:14px;padding:12px;border:1px solid var(--line);background:rgba(255,255,255,.03)} .priority-card.a{background:var(--gold-bg);border-color:var(--gold-line)} .priority-card.b{background:var(--silver-bg);border-color:var(--silver-line)}
    .priority-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}.priority-badge{min-width:26px;height:26px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
    .priority-card.a .priority-badge{background:rgba(255,204,102,.18);color:var(--gold);border:1px solid var(--gold-line)} .priority-card.b .priority-badge{background:rgba(159,214,255,.16);color:var(--silver);border:1px solid var(--silver-line)}
    .priority-title{font-size:18px;font-weight:900;line-height:1.15}.priority-text{font-size:13px;line-height:1.46;color:var(--muted)}
    .watch-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:10px;min-width:0;display:grid;gap:6px}
    .watch-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.watch-title{font-size:14px;font-weight:900;line-height:1.2;word-break:break-word}.watch-meta{font-size:12px;color:var(--muted);line-height:1.35;word-break:break-word}.watch-row{display:grid;grid-template-columns:66px 1fr;gap:8px;font-size:12px;line-height:1.35}.watch-key{color:var(--muted)}
    .empty{border:1px dashed var(--line);border-radius:12px;padding:14px;text-align:center;color:var(--muted);font-size:13px}
    .news-collapsible{display:grid;gap:8px}.news-preview{color:var(--muted);font-size:13px;line-height:1.5}.news-toggle{width:fit-content}.news-list{display:none;gap:8px}.news-list.open{display:grid}
    .news-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px;color:var(--muted);line-height:1.5;font-size:13px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px} table{width:100%;min-width:640px;border-collapse:collapse}
    th,td{padding:10px 9px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;vertical-align:top}th{color:var(--muted);background:rgba(255,255,255,.03)}
    .notice{background:rgba(110,168,254,.10);border:1px solid rgba(110,168,254,.30);color:#dce7ff;border-radius:12px;padding:12px;line-height:1.6;font-size:13px}
    .field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;color:var(--muted)}.field input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font:inherit}
    @media (max-width:900px){.grid.two,.grid.three{grid-template-columns:1fr}.market-bar{grid-template-columns:repeat(2,minmax(0,1fr))}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-title{font-size:22px}.focus-main{font-size:15px}}
  </style>
</head>
<body>
<header class="hdr"><div class="hdr-inner"><div class="brand"><div class="logo">株</div><div><div class="title">株式AI分析</div><div class="subtitle">日本株短期トレード用・個人向け売買判断補助</div></div></div><div class="header-actions"><div class="header-meta" id="globalMeta">更新 -</div><button class="btn" id="refreshBtn">↻ 再読込</button></div></div></header>
<div class="market-strip"><div class="market-strip-inner"><section class="market-bar" id="marketBar"></section><section class="focus-mini" id="marketFocus"></section></div></div>
<div class="tabs-wrap"><div class="tabs-inner"><div class="tabs">
<button class="tab active" data-tab="tab600">6:00 戦略会議</button>
<button class="tab" data-tab="tab905">9:10 行動修正</button>
<button class="tab" data-tab="tab1200">12:00 後場戦略</button>
<button class="tab" data-tab="tab1535">15:35 総括と学習</button>
<button class="tab" data-tab="tabLog">振り返りログ</button>
<button class="tab" data-tab="tabSettings">設定</button>
</div></div></div>
<main class="wrap content">
<section class="panel active" id="tab600"></section>
<section class="panel" id="tab905"></section>
<section class="panel" id="tab1200"></section>
<section class="panel" id="tab1535"></section>
<section class="panel" id="tabLog"></section>
<section class="panel" id="tabSettings"></section>
</main>
<script>
const STORAGE_USER="stock-ai-user",STORAGE_REPO="stock-ai-repo"; let selectedMarketName="日経平均";
const els={globalMeta:document.getElementById("globalMeta"),marketBar:document.getElementById("marketBar"),marketFocus:document.getElementById("marketFocus"),tab600:document.getElementById("tab600"),tab905:document.getElementById("tab905"),tab1200:document.getElementById("tab1200"),tab1535:document.getElementById("tab1535"),tabLog:document.getElementById("tabLog"),tabSettings:document.getElementById("tabSettings"),refreshBtn:document.getElementById("refreshBtn")};
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const nl2br=v=>esc(v??"").replace(/\n/g,"<br>");
const arr=v=>Array.isArray(v)?v:[];
const compactJoin=(list,e="なし")=>{const f=arr(list).filter(Boolean); return f.length?f.join(" / "):e;};
function baseUrl(){const user=localStorage.getItem(STORAGE_USER)||"",repo=localStorage.getItem(STORAGE_REPO)||""; return user&&repo?`https://${user}.github.io/${repo}`:"";}
async function fetchJson(path){const base=baseUrl(); if(!base) throw new Error("GitHub設定が未入力"); const res=await fetch(`${base}/data/${path}?t=${Date.now()}`,{cache:"no-store"}); if(!res.ok) throw new Error(`${path} の取得失敗: ${res.status}`); return await res.json();}
function quoteClass(change){const s=String(change||""); if(s.startsWith("+")) return "good"; if(s.startsWith("-")) return "bad"; return "warn";}
function firstMatchItem(data,names,buckets=[]){const market=data?.market_data||{}; const merged=[]; (buckets.length?buckets:["indices","futures","forex","world_indices","sox","oil"]).forEach(b=>merged.push(...arr(market[b]))); return merged.find(x=>names.includes(x.name))||null;}
function renderThemeList(items,emptyText="データなし"){const list=arr(items).filter(Boolean); if(!list.length) return `<div class="empty">${esc(emptyText)}</div>`; return `<div class="list">${list.map(x=>`<div class="item tight"><div class="item-title">${esc(x.name||"-")} ${x.priority?`<span class="chip">${esc(x.priority)}</span>`:""}</div><div class="item-sub">${esc(x.reason||"-")}</div></div>`).join("")}</div>`;}
function renderThemeStatus(items,emptyText="データなし"){const list=arr(items).filter(Boolean); if(!list.length) return `<div class="empty">${esc(emptyText)}</div>`; return `<div class="list">${list.map(x=>`<div class="item tight"><div class="item-title">${esc(x.name||"-")} / ${esc(x.type||"-")}</div><div class="item-sub">${esc(x.comment||"-")}</div></div>`).join("")}</div>`;}
function renderReviewLogs(logs){const list=arr(logs).slice().reverse(); if(!list.length) return `<div class="empty">ログがまだありません</div>`; return `<div class="table-wrap"><table><thead><tr><th>日付</th><th>総評</th><th>良かった点</th><th>危険だった点</th><th>次の注目</th><th>テーマ精度</th><th>執行精度</th><th>見送り精度</th></tr></thead><tbody>${list.map(x=>`<tr><td>${esc(x.date||"-")}</td><td>${esc(x.usefulness||"-")}</td><td>${esc(x.easy_pattern||"-")}</td><td>${esc(x.danger_pattern||"-")}</td><td>${esc(x.next_note||"-")}</td><td>${esc(x.theme_score??"-")}</td><td>${esc(x.execution_score??"-")}</td><td>${esc(x.skip_score??"-")}</td></tr>`).join("")}</tbody></table></div>`;}
function renderWatchExecutionCards(items){const list=arr(items).filter(Boolean); if(!list.length) return `<div class="empty">監視銘柄なし</div>`; return `<div class="grid two">${list.map((x,idx)=>`<div class="watch-card"><div class="watch-top"><span class="pill">優先 ${idx+1}</span><div class="watch-title">${esc(x.name||"-")} ${x.code?`(${esc(x.code)})`:""}</div></div><div class="watch-meta">${esc(x.bucket||"-")} / ${esc(x.reason||"-")}</div><div class="watch-row"><div class="watch-key">仕掛け</div><div>${esc(x.trigger||"-")}</div></div><div class="watch-row"><div class="watch-key">失効</div><div>${esc(x.invalidation||"-")}</div></div><div class="watch-row"><div class="watch-key">時間帯</div><div>${esc(x.time_window||"-")}</div></div></div>`).join("")}</div>`;}
function renderPriorityThemes(items){const list=arr(items).filter(Boolean); if(!list.length) return `<div class="empty">本命テーマなし</div>`; return `<div class="grid two">${list.slice(0,4).map((x,i)=>{const cls=i===0?"a":"b"; const badge=i===0?"A本命":"B候補"; return `<div class="priority-card ${cls}"><div class="priority-head"><span class="priority-badge">${badge}</span><div class="priority-title">${esc(x.name||"-")}</div></div><div class="priority-text">${esc(x.reason||"-")}</div></div>`}).join("")}</div>`;}
function setGlobalMeta(...datasets){const times=datasets.map(x=>x?.generated_at).filter(Boolean); els.globalMeta.textContent=`更新 ${times.length?times.join(" / "):"-"}`;}
function getMarketPicks(d600){return [firstMatchItem(d600,["日経平均"],["indices"]),firstMatchItem(d600,["日経先物","日経225先物"],["futures"]),firstMatchItem(d600,["ドル円","米ドル円"],["forex"]),firstMatchItem(d600,["NYダウ","ＮＹダウ"],["world_indices"])].filter(Boolean);}
function renderMarketFocus(item){if(!item){els.marketFocus.innerHTML=`<div class="empty">主要指標データなし</div>`; return;} const klass=quoteClass(item.change); els.marketFocus.innerHTML=`<div class="focus-left"><div class="focus-kicker">選択中の主要指標</div><div class="focus-main ${klass}">${esc(item.name||"-")} ${esc(item.value||"—")}</div><div class="focus-sub">${esc(item.change||"—")} ${esc(item.percent||"")} / 最終更新 ${esc(item.time||"-")} / 60秒ごと再取得</div></div><div class="pills"><span class="pill">コンパクト表示</span><span class="pill">静的JSON再取得</span></div>`;}
function renderMarketBar(d600){const picks=getMarketPicks(d600); if(!picks.length){els.marketBar.innerHTML=`<div class="empty" style="grid-column:1/-1;">主要指標データなし</div>`; renderMarketFocus(null); return;} if(!picks.some(x=>x.name===selectedMarketName)) selectedMarketName=picks[0].name; els.marketBar.innerHTML=picks.map(item=>{const klass=quoteClass(item.change),active=item.name===selectedMarketName?"active":""; return `<button class="market-chip ${active}" data-market="${esc(item.name)}"><div class="market-chip-top"><div class="market-chip-name">${esc(item.name||"-")}</div><div class="market-chip-time">${esc(item.time||"")}</div></div><div class="market-chip-value ${klass}">${esc(item.value||"—")}</div><div class="market-chip-change ${klass}">${esc(item.change||"—")} ${esc(item.percent||"")}</div></button>`;}).join(""); els.marketBar.querySelectorAll("[data-market]").forEach(btn=>btn.addEventListener("click",()=>{selectedMarketName=btn.getAttribute("data-market"); renderMarketBar(d600); syncStickyHeights();})); renderMarketFocus(picks.find(x=>x.name===selectedMarketName));}
function renderNewsCollapsible(items,id){const list=arr(items).filter(Boolean); if(!list.length) return `<div class="empty">ニュースなし</div>`; const preview=esc(list[0].title||list[0].headline||list[0].text||list[0]); return `<div class="news-collapsible"><div class="news-preview">${preview}</div><button class="btn news-toggle" data-news-toggle="${id}">ニュースを開く</button><div class="news-list" id="${id}">${list.slice(0,5).map(x=>`<div class="news-item">${esc(x.title||x.headline||x.text||x)}</div>`).join("")}</div></div>`;}
function bindNewsToggles(){document.querySelectorAll("[data-news-toggle]").forEach(btn=>{btn.onclick=()=>{const id=btn.getAttribute("data-news-toggle"),box=document.getElementById(id); if(!box) return; const open=box.classList.toggle("open"); btn.textContent=open?"ニュースを閉じる":"ニュースを開く"; syncStickyHeights();};});}
function render600(data){if(!data){els.tab600.innerHTML=`<div class="empty">6:00データがありません</div>`; return;} const strategy=data.strategy||{},market=data.market_data||{},news=arr(data.major_news||market.news||data.news); els.tab600.innerHTML=`<div class="summary-card"><div class="summary-top"><div><div class="summary-label">6:00 サマリー</div><div class="summary-title">${esc(strategy.market_regime_label||"未判定")}</div></div><div class="pills">${strategy.entry_style_label?`<span class="pill">${esc(strategy.entry_style_label)}</span>`:""}${strategy.danger_level?`<span class="pill">危険度 ${esc(strategy.danger_level)}</span>`:""}</div></div><div class="summary-text">${esc(strategy.conclusion||data.summary||"サマリーなし")}</div></div><div class="card"><h3>本命テーマの本命感</h3>${renderPriorityThemes(data.priority_themes)}</div><div class="card" style="margin-top:10px;"><h3>本命テーマ・本命監視銘柄</h3><div class="grid two"><div class="item tight"><div class="item-title">本命テーマ</div><div class="item-sub">${esc(compactJoin(arr(data.priority_themes).map(x=>x.name)))}</div></div><div class="item tight"><div class="item-title">本命監視銘柄</div><div class="item-sub">${esc(compactJoin(arr(data.watchlist).filter(x=>["先導株","連想1軍"].includes(x.bucket)).slice(0,3).map(x=>x.name)))}</div></div></div></div><div class="grid two" style="margin-top:10px;"><div class="card"><h3>やらないこと</h3><div class="item danger"><div class="item-sub">${arr(data.skip_conditions).map(esc).join("<br>")||"なし"}</div></div></div><div class="card"><h3>仕掛け条件</h3><div class="item tight"><div class="item-sub">${arr(data.entry_conditions).map(esc).join("<br>")||"なし"}</div></div></div></div><div class="card" style="margin-top:10px;"><h3>監視銘柄一覧</h3>${renderWatchExecutionCards(data.watchlist)}</div><div class="grid two" style="margin-top:10px;"><div class="card"><h3>本日ニュース</h3>${renderNewsCollapsible(news,"news600")}</div><div class="card"><h3>危険パターン / 見ないテーマ</h3><div class="list">${arr(data.danger_patterns).length?arr(data.danger_patterns).map(x=>`<div class="item tight"><div class="item-sub">${esc(x)}</div></div>`).join(""):`<div class="empty">危険パターンなし</div>`}</div><div style="height:8px;"></div>${renderThemeList(data.avoid_themes,"見ないテーマなし")}</div></div><div class="card" style="margin-top:10px;"><h3>強いテーマ</h3>${renderThemeList(data.priority_themes,"強いテーマなし")}</div>`; bindNewsToggles();}
function render905(data){if(!data){els.tab905.innerHTML=`<div class="empty">9:10データがありません</div>`; return;} const j=data.action_judgement||{}; els.tab905.innerHTML=`<div class="summary-card"><div class="summary-top"><div><div class="summary-label">9:10 サマリー</div><div class="summary-title">${esc(j.opening_state||"未判定")}</div></div><div class="pills">${j.best_current_theme?`<span class="pill">${esc(j.best_current_theme)}</span>`:""}${j.best_current_stock?`<span class="pill">${esc(j.best_current_stock)}</span>`:""}</div></div><div class="summary-text">${esc(j.action_now||data.summary||"サマリーなし")}</div></div><div class="grid two"><div class="card"><h3>今から何をするか</h3><div class="list"><div class="item tight"><div class="item-title">行動判断</div><div class="item-sub">${esc(j.action_now||"-")}</div></div><div class="item tight"><div class="item-title">追わないもの</div><div class="item-sub">${esc(j.do_not_chase||"-")}</div></div><div class="item tight"><div class="item-title">主役テーマ / 銘柄</div><div class="item-sub">${esc(j.best_current_theme||"-")} / ${esc(j.best_current_stock||"-")}</div></div></div></div><div class="card"><h3>テーマ状態</h3>${renderThemeStatus(data.theme_status,"テーマ状態なし")}</div></div><div class="card" style="margin-top:10px;"><h3>寄り後メモ</h3><div class="item tight"><div class="item-sub">${nl2br(data.summary||"-")}</div></div></div>`;}
function render1200(data){if(!data){els.tab1200.innerHTML=`<div class="empty">12:00データがありません</div>`; return;} const plan=data.afternoon_plan||{}; els.tab1200.innerHTML=`<div class="summary-card"><div class="summary-top"><div><div class="summary-label">12:00 サマリー</div><div class="summary-title">${esc(plan.status_label||"後場戦略")}</div></div><div class="pills">${plan.pm_regime_label?`<span class="pill">${esc(plan.pm_regime_label)}</span>`:""}${plan.status?`<span class="pill">${esc(plan.status)}</span>`:""}</div></div><div class="summary-text">${esc(plan.summary||data.summary||"サマリーなし")}</div></div><div class="grid two"><div class="card"><h3>後場の方針</h3><div class="list"><div class="item tight"><div class="item-title">前場で強かったテーマ</div><div class="item-sub">${esc(compactJoin(data.strong_themes_am))}</div></div><div class="item tight"><div class="item-title">後場の本命テーマ</div><div class="item-sub">${esc(compactJoin(data.pm_core_themes))}</div></div><div class="item tight"><div class="item-title">捨てるテーマ</div><div class="item-sub">${esc(compactJoin(data.drop_themes))}</div></div></div></div><div class="card"><h3>後場でやること / やらないこと</h3><div class="item tight"><div class="item-title">仕掛け条件</div><div class="item-sub">${arr(data.entry_conditions_pm).map(esc).join("<br>")||"なし"}</div></div><div class="item danger" style="margin-top:8px;"><div class="item-title">やらないこと</div><div class="item-sub">${arr(data.do_not_do_pm).map(esc).join("<br>")||"なし"}</div></div><div class="item tight" style="margin-top:8px;"><div class="item-title">見送り条件</div><div class="item-sub">${arr(data.skip_conditions_pm).map(esc).join("<br>")||"なし"}</div></div></div></div><div class="card" style="margin-top:10px;"><h3>新規監視銘柄</h3>${renderWatchExecutionCards(data.new_watchlist)}</div>`;}
function render1535(data,d600,d905,d1200){if(!data){els.tab1535.innerHTML=`<div class="empty">15:35データがありません</div>`; return;} const r=data.review||{},s600=d600?.strategy||{},s905=d905?.action_judgement||{},s1200=d1200?.afternoon_plan||{}; els.tab1535.innerHTML=`<div class="summary-card"><div class="summary-top"><div><div class="summary-label">15:35 1日の総括</div><div class="summary-title">${esc(data.summary||"総評なし")}</div></div><div class="pills"><span class="pill">テーマ ${esc(r.theme_score??"-")}</span><span class="pill">執行 ${esc(r.execution_score??"-")}</span><span class="pill">見送り ${esc(r.skip_score??"-")}</span></div></div><div class="summary-text">その日の締めと、分析の答え合わせと、次回への学習材料を残すためのタブです。</div></div><div class="grid two"><div class="card"><h3>今日の総評</h3><div class="list"><div class="item tight"><div class="item-title">一言総評</div><div class="item-sub">${esc(data.summary||"-")}</div></div><div class="item tight"><div class="item-title">本当に取るべきだったテーマ</div><div class="item-sub">${esc(r.actually_best_theme||"-")}</div></div><div class="item tight"><div class="item-title">危険だったテーマ</div><div class="item-sub">${esc(r.danger_theme_in_morning||"-")}</div></div><div class="item tight"><div class="item-title">次の注目</div><div class="item-sub">${esc(r.next_focus||"-")}</div></div></div></div><div class="card"><h3>分析の答え合わせ</h3><div class="list"><div class="item tight"><div class="item-title">6:00見立て</div><div class="item-sub">${esc(s600.market_regime_label||"-")} / ${esc(s600.entry_style_label||"-")}</div></div><div class="item tight"><div class="item-title">9:10修正</div><div class="item-sub">${esc(s905.opening_state||"-")} / ${esc(s905.action_now||"-")}</div></div><div class="item tight"><div class="item-title">12:00後場戦略</div><div class="item-sub">${esc(s1200.status_label||"-")} / ${esc(s1200.pm_regime_label||"-")}</div></div><div class="item tight"><div class="item-title">外れた仮説</div><div class="item-sub">${esc(r.wrong_hypothesis||"-")}</div></div></div></div></div><div class="grid two" style="margin-top:10px;"><div class="card"><h3>実際の相場</h3><div class="list"><div class="item tight"><div class="item-title">伸びた先導株</div><div class="item-sub">${esc(r.best_leader_stock||"-")}</div></div><div class="item tight"><div class="item-title">伸びなかった連想株</div><div class="item-sub">${esc(r.weak_secondary_stock||"-")}</div></div><div class="item tight"><div class="item-title">相場の難易度感</div><div class="item-sub">テーマ精度 ${esc(r.theme_score??"-")} / 執行精度 ${esc(r.execution_score??"-")} / 見送り精度 ${esc(r.skip_score??"-")}</div></div></div></div><div class="card"><h3>自分用メモ / 次回学習</h3><div class="list"><div class="item tight"><div class="item-title">今日の学び</div><div class="item-sub">${esc(data.summary||"-")}</div></div><div class="item tight"><div class="item-title">次回の注意</div><div class="item-sub">${esc(r.next_ban_rule||"-")}</div></div><div class="item tight"><div class="item-title">明日への持ち越し視点</div><div class="item-sub">${esc(r.next_focus||"-")}</div></div></div></div></div>`;}
function renderLog(logs){els.tabLog.innerHTML=`<div class="card"><h3>振り返りログ</h3>${renderReviewLogs(logs)}</div>`;}
function renderSettings(){const user=localStorage.getItem(STORAGE_USER)||"",repo=localStorage.getItem(STORAGE_REPO)||""; els.tabSettings.innerHTML=`<div class="notice">接続先や設定はここで管理します。いまのUIは data/*.json を60秒ごとに再取得する方式です。真のティック更新ではありません。</div><div style="height:12px;"></div><div class="field"><label for="ghUser">GitHub ユーザー名</label><input id="ghUser" value="${esc(user)}" placeholder="例: sszzkkzzkk"></div><div class="field"><label for="ghRepo">リポジトリ名</label><input id="ghRepo" value="${esc(repo)}" placeholder="例: stock-analyzer"></div><div class="field"><label>現在の接続先</label><div>${esc(user&&repo?`${user}/${repo}`:"未設定")}</div></div><div style="display:flex; gap:10px; flex-wrap:wrap;"><button class="btn" id="saveSettingsBtn">保存して接続</button><button class="btn" id="clearSettingsBtn">設定クリア</button></div>`; document.getElementById("saveSettingsBtn").addEventListener("click",async()=>{localStorage.setItem(STORAGE_USER,document.getElementById("ghUser").value.trim()); localStorage.setItem(STORAGE_REPO,document.getElementById("ghRepo").value.trim()); await loadAll();}); document.getElementById("clearSettingsBtn").addEventListener("click",()=>{localStorage.removeItem(STORAGE_USER); localStorage.removeItem(STORAGE_REPO); renderMarketBar(null); render600(null); render905(null); render1200(null); render1535(null,null,null,null); renderLog(null); renderSettings(); setGlobalMeta(null,null,null,null); syncStickyHeights();});}
function syncStickyHeights(){const hdr=document.querySelector(".hdr"),marketStrip=document.querySelector(".market-strip"),tabsWrap=document.querySelector(".tabs-wrap"); const hdrH=hdr?Math.ceil(hdr.getBoundingClientRect().height):0,marketH=marketStrip?Math.ceil(marketStrip.getBoundingClientRect().height):0,tabsH=tabsWrap?Math.ceil(tabsWrap.getBoundingClientRect().height):0; document.documentElement.style.setProperty("--hdr-h",`${hdrH}px`); document.documentElement.style.setProperty("--market-h",`${marketH}px`); document.documentElement.style.setProperty("--tabs-h",`${tabsH}px`);}
async function safeLoad(path){try{return await fetchJson(path)}catch(e){return null}}
async function loadAll(){if(!baseUrl()){renderMarketBar(null); render600(null); render905(null); render1200(null); render1535(null,null,null,null); renderLog(null); renderSettings(); setGlobalMeta(null,null,null,null); syncStickyHeights(); return;}
  els.tab600.innerHTML=`<div class="empty">読み込み中...</div>`; els.tab905.innerHTML=`<div class="empty">読み込み中...</div>`; els.tab1200.innerHTML=`<div class="empty">読み込み中...</div>`; els.tab1535.innerHTML=`<div class="empty">読み込み中...</div>`; els.tabLog.innerHTML=`<div class="empty">読み込み中...</div>`;
  const [d600,d905,d1200,d1535,logs]=await Promise.all([safeLoad("latest_600.json"),safeLoad("latest_905.json"),safeLoad("latest_1200.json"),safeLoad("latest_1535.json"),safeLoad("review_log.json")]);
  setGlobalMeta(d600,d905,d1200,d1535); renderMarketBar(d600); render600(d600); render905(d905); render1200(d1200); render1535(d1535,d600,d905,d1200); renderLog(logs); renderSettings(); syncStickyHeights();}
document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active")); document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active")); btn.classList.add("active"); document.getElementById(btn.dataset.tab).classList.add("active"); syncStickyHeights();}));
window.addEventListener("load",syncStickyHeights); window.addEventListener("resize",syncStickyHeights);
if("ResizeObserver" in window){const ro=new ResizeObserver(syncStickyHeights); ["hdr","market-strip","tabs-wrap"].forEach(cls=>{const el=document.querySelector("."+cls); if(el) ro.observe(el);});}
document.getElementById("refreshBtn").addEventListener("click",loadAll);
loadAll();
setInterval(loadAll, 60 * 1000);
</script>
</body>
