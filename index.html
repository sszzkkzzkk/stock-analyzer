<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式AI分析</title>
  <style>
    :root {
      --bg: #09101f;
      --panel: #111a34;
      --panel2: #182145;
      --text: #eef2ff;
      --muted: #9aa6c7;
      --line: #2d3968;
      --accent: #6ea8fe;
      --accent2: #8b5cf6;
      --chip: #23305e;
      --good: #31d158;
      --bad: #ff6b6b;
      --warn: #f7b731;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #07101d 0%, #0c1530 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .btn:hover {
      background: var(--panel2);
    }

    .hero {
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .hero-main {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
    }

    .hero-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .hero-headline {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.5;
    }

    .hero-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .hero-tag {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .quote {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      min-width: 0;
    }

    .quote-name {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .quote-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
    }

    .quote-change {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .quote-time {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .tab.active {
      border-color: transparent;
      background: linear-gradient(135deg, #2457f5, #6f3ff5);
    }

    .panel {
      display: none;
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
    }

    .item-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      font-size: 14px;
      align-items: start;
    }

    .kv div:nth-child(odd) {
      color: var(--muted);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .rank {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .theme-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #3650a8;
      background: #21316b;
      color: #dfe7ff;
      font-size: 12px;
    }

    .search-box {
      margin-bottom: 14px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      font: inherit;
    }

    .mini-info {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mini-pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .notice {
      background: rgba(110,168,254,.10);
      border: 1px solid rgba(110,168,254,.30);
      color: #dce7ff;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.7;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    .big {
      font-size: 24px;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .hero-grid,
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }

      .kv {
        grid-template-columns: 1fr;
      }

      .quote-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <div class="logo">株</div>
        <div>
          <div class="title">株式AI分析</div>
          <div class="subtitle">寄り前予測 / 寄り確認 / 引け総括</div>
        </div>
      </div>
      <button class="btn" id="refreshBtn">↻ 再読込</button>
    </div>

    <section class="hero" id="heroPanel"></section>

    <div class="tabs">
      <button class="tab active" data-tab="tab600">6:00 予測</button>
      <button class="tab" data-tab="tab905">9:05 確認</button>
      <button class="tab" data-tab="tab1535">15:35 総括</button>
      <button class="tab" data-tab="tabAcc">精度履歴</button>
      <button class="tab" data-tab="tabSettings">設定</button>
    </div>

    <section class="panel active" id="tab600"></section>
    <section class="panel" id="tab905"></section>
    <section class="panel" id="tab1535"></section>
    <section class="panel" id="tabAcc"></section>
    <section class="panel" id="tabSettings"></section>
  </div>

  <script>
    const STORAGE_USER = "stock-ai-user";
    const STORAGE_REPO = "stock-ai-repo";

    const els = {
      heroPanel: document.getElementById("heroPanel"),
      tab600: document.getElementById("tab600"),
      tab905: document.getElementById("tab905"),
      tab1535: document.getElementById("tab1535"),
      tabAcc: document.getElementById("tabAcc"),
      tabSettings: document.getElementById("tabSettings"),
      refreshBtn: document.getElementById("refreshBtn"),
    };

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl2br(v) {
      return esc(v ?? "").replace(/\n/g, "<br>");
    }

    function arr(v) {
      return Array.isArray(v) ? v : [];
    }

    function formatValue(x) {
      if (x == null) return "-";

      if (typeof x === "string" || typeof x === "number" || typeof x === "boolean") {
        return esc(String(x));
      }

      if (Array.isArray(x)) {
        return x.map(formatValue).join("<br>");
      }

      if (typeof x === "object") {
        const labels = {
          name: "名称",
          value: "値",
          change: "変化",
          percent: "変化率",
          time: "時刻",
          code: "コード",
          price: "価格",
          volume: "出来高",
        };

        const order = ["name", "value", "change", "percent", "time", "code", "price", "volume"];
        const keys = [...order.filter(k => k in x), ...Object.keys(x).filter(k => !order.includes(k))];

        return keys
          .filter(k => x[k] !== "" && x[k] !== null && x[k] !== undefined)
          .map(k => `<strong>${esc(labels[k] || k)}</strong>: ${esc(String(x[k]))}`)
          .join("<br>");
      }

      return esc(String(x));
    }

    function renderSimpleList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-sub">${formatValue(x)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderNewsLines(items) {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">ニュースなし</div>`;
      return `
        <div class="list">
          ${list.map(x => `<div class="item"><div class="item-sub">${esc(x)}</div></div>`).join("")}
        </div>
      `;
    }

    function chipList(items) {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">データなし</div>`;
      return `<div class="chips">${list.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</div>`;
    }

    function renderThemeCards(themes, keyword = "") {
      let list = arr(themes);
      if (keyword) {
        list = list.filter(t =>
          JSON.stringify(t).toLowerCase().includes(keyword.toLowerCase())
        );
      }

      if (!list.length) return `<div class="empty">テーマ予測がまだありません</div>`;

      return `
        <div class="list">
          ${list.map(t => `
            <div class="item">
              <div class="theme-head">
                <span class="rank">${esc(t.rank ?? "-")}</span>
                <div class="item-title">${esc(t.name || "テーマ名なし")}</div>
                <span class="badge">信頼度 ${esc(t.confidence_score ?? "-")}</span>
              </div>
              <div class="kv">
                <div>根拠</div><div>${nl2br(t.rationale || "-")}</div>
                <div>データ根拠</div><div>${arr(t.data_basis).map(esc).join(" / ") || "-"}</div>
                <div>関連銘柄</div>
                <div>
                  ${arr(t.key_stocks).length
                    ? arr(t.key_stocks).map(s => `${esc(s.name || "-")} (${esc(s.code || "-")})：${esc(s.reason || "-")}`).join("<br>")
                    : "-"}
                </div>
                <div>リスク</div><div>${nl2br(t.risk_factors || "-")}</div>
                <div>米国連動</div><div>${nl2br(t.us_connection || "-")}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderActualFlow(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">実際の資金フローなし</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.theme || "-")} <span class="badge">${esc(x.strength || "-")}</span></div>
              <div class="item-sub">${nl2br(x.evidence || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderGap(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">比較データなし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>予測テーマ</th>
                <th>予測スコア</th>
                <th>結果</th>
                <th>ズレた理由</th>
                <th>見落とし</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.predicted_theme || "-")}</td>
                  <td>${esc(x.predicted_score ?? "-")}</td>
                  <td>${esc(x.actual_result || "-")}</td>
                  <td>${esc(x.gap_reason || "-")}</td>
                  <td>${esc(x.missed_factor || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderThemeResults(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">テーマ結果なし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>テーマ</th>
                <th>朝スコア</th>
                <th>最終判定</th>
                <th>詳細</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.name || "-")}</td>
                  <td>${esc(x.morning_score ?? "-")}</td>
                  <td>${esc(x.final_result || "-")}</td>
                  <td>${esc(x.detail || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderStockResults(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">銘柄結果なし</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>銘柄</th>
                <th>コード</th>
                <th>終値</th>
                <th>変化率</th>
                <th>コメント</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.name || "-")}</td>
                  <td>${esc(x.code || "-")}</td>
                  <td>${esc(x.close || "-")}</td>
                  <td>${esc(x.change || "-")}</td>
                  <td>${esc(x.comment || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderNewsImpact(items) {
      const list = arr(items);
      if (!list.length) return `<div class="empty">ニュース影響なし</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.news || "-")}</div>
              <div class="item-sub">${nl2br(x.impact || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderAccuracyTable(logs) {
      const list = arr(logs).slice().reverse();
      if (!list.length) return `<div class="empty">精度履歴がまだありません</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>精度</th>
                <th>強かったテーマ</th>
                <th>弱かったテーマ</th>
                <th>改善ヒント</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.date || "-")}</td>
                  <td>${esc(x.accuracy_score ?? "-")}</td>
                  <td>${esc(x.strongest_theme || "-")}</td>
                  <td>${esc(x.weakest_theme || "-")}</td>
                  <td>${arr(x.improvement_hints).map(esc).join(" / ") || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function baseUrl() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";
      if (!user || !repo) return "";
      return `https://${user}.github.io/${repo}`;
    }

    async function fetchJson(path) {
      const base = baseUrl();
      if (!base) throw new Error("GitHub設定が未入力");
      const url = `${base}/data/${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`${path} の取得失敗: ${res.status}`);
      }
      return await res.json();
    }

    function quoteClass(change) {
      const s = String(change || "");
      if (s.startsWith("+")) return "good";
      if (s.startsWith("-")) return "bad";
      return "warn";
    }

    function firstMatchItem(data, names) {
      const market = data?.market_data || {};
      const merged = [
        ...arr(market.indices),
        ...arr(market.world_indices),
        ...arr(market.forex),
      ];
      return merged.find(x => names.includes(x.name)) || null;
    }

    function renderHero(d600, d905, d1535) {
      const current = d600 || d905 || d1535;
      if (!current) {
        els.heroPanel.innerHTML = `<div class="empty">データがありません</
