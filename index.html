<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式AI分析</title>
  <style>
    :root {
      --bg: #09101f;
      --panel: #111a34;
      --panel2: #182145;
      --text: #eef2ff;
      --muted: #9aa6c7;
      --line: #2d3968;
      --accent: #6ea8fe;
      --accent2: #8b5cf6;
      --chip: #23305e;
      --good: #31d158;
      --bad: #ff6b6b;
      --warn: #f7b731;
      --danger-bg: rgba(255, 107, 107, 0.12);
      --danger-line: rgba(255, 107, 107, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #07101d 0%, #0c1530 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .btn:hover {
      background: var(--panel2);
    }

    .status-banner {
      margin-bottom: 10px;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .status-banner.failed {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: #ffd7d7;
    }

    .hero {
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .hero-main-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hero-mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .decision-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
      min-width: 0;
    }

    .decision-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .decision-main {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.35;
      word-break: break-word;
    }

    .decision-sub {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      word-break: break-word;
    }

    .stance-chip {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--chip);
      font-size: 12px;
      margin-right: 6px;
      margin-top: 6px;
    }

    .quote-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quote {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
      min-width: 0;
    }

    .quote-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .quote-name {
      font-size: 12px;
      color: var(--muted);
    }

    .quote-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .quote-value {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.15;
      word-break: break-word;
    }

    .quote-change {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    .tab.active {
      border-color: transparent;
      background: linear-gradient(135deg, #2457f5, #6f3ff5);
    }

    .panel {
      display: none;
      background: rgba(17,26,52,.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
    }

    .item-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .mini-info {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mini-pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .notice {
      background: rgba(110,168,254,.10);
      border: 1px solid rgba(110,168,254,.30);
      color: #dce7ff;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.7;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    @media (max-width: 900px) {
      .hero-main-grid,
      .hero-mini-grid,
      .quote-grid,
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }

      .decision-main {
        font-size: 18px;
      }

      .quote-value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <div class="logo">株</div>
        <div>
          <div class="title">株式AI分析</div>
          <div class="subtitle">日本株短期トレード用・個人向け売買判断補助</div>
        </div>
      </div>
      <button class="btn" id="refreshBtn">↻ 再読込</button>
    </div>

    <section class="hero" id="heroPanel"></section>

    <div class="tabs">
      <button class="tab active" data-tab="tab600">6:00 戦略会議</button>
      <button class="tab" data-tab="tab905">9:05 行動修正</button>
      <button class="tab" data-tab="tab1535">15:35 実戦学習</button>
      <button class="tab" data-tab="tabLog">振り返りログ</button>
      <button class="tab" data-tab="tabSettings">設定</button>
    </div>

    <section class="panel active" id="tab600"></section>
    <section class="panel" id="tab905"></section>
    <section class="panel" id="tab1535"></section>
    <section class="panel" id="tabLog"></section>
    <section class="panel" id="tabSettings"></section>
  </div>

  <script>
    const STORAGE_USER = "stock-ai-user";
    const STORAGE_REPO = "stock-ai-repo";

    const els = {
      heroPanel: document.getElementById("heroPanel"),
      tab600: document.getElementById("tab600"),
      tab905: document.getElementById("tab905"),
      tab1535: document.getElementById("tab1535"),
      tabLog: document.getElementById("tabLog"),
      tabSettings: document.getElementById("tabSettings"),
      refreshBtn: document.getElementById("refreshBtn"),
    };

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl2br(v) {
      return esc(v ?? "").replace(/\n/g, "<br>");
    }

    function arr(v) {
      return Array.isArray(v) ? v : [];
    }

    function chipList(items) {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">データなし</div>`;
      return `<div class="chips">${list.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</div>`;
    }

    function renderTextList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-sub">${esc(typeof x === "string" ? x : JSON.stringify(x))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderThemeList(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.name || "-")} ${x.priority ? `<span class="chip">${esc(x.priority)}</span>` : ""}</div>
              <div class="item-sub">${esc(x.reason || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderWatchlist(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.bucket || "-")} / ${esc(x.name || "-")} ${x.code ? `(${esc(x.code)})` : ""}</div>
              <div class="item-sub">
                監視理由: ${esc(x.reason || "-")}<br>
                仕掛け条件: ${esc(x.trigger || "-")}<br>
                失効条件: ${esc(x.invalidation || "-")}<br>
                注目時間帯: ${esc(x.time_window || "-")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderThemeStatus(items, emptyText = "データなし") {
      const list = arr(items).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `
        <div class="list">
          ${list.map(x => `
            <div class="item">
              <div class="item-title">${esc(x.name || "-")} / ${esc(x.type || "-")}</div>
              <div class="item-sub">${esc(x.comment || "-")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderReviewLogs(logs) {
      const list = arr(logs).slice().reverse();
      if (!list.length) return `<div class="empty">ログがまだありません</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>使えた判断</th>
                <th>良かった点</th>
                <th>禁止事項</th>
                <th>次の注目</th>
                <th>テーマ精度</th>
                <th>執行精度</th>
                <th>見送り精度</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(x => `
                <tr>
                  <td>${esc(x.date || "-")}</td>
                  <td>${esc(x.usefulness || "-")}</td>
                  <td>${esc(x.easy_pattern || "-")}</td>
                  <td>${esc(x.danger_pattern || "-")}</td>
                  <td>${esc(x.next_note || "-")}</td>
                  <td>${esc(x.theme_score ?? "-")}</td>
                  <td>${esc(x.execution_score ?? "-")}</td>
                  <td>${esc(x.skip_score ?? "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function baseUrl() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";
      if (!user || !repo) return "";
      return `https://${user}.github.io/${repo}`;
    }

    async function fetchJson(path) {
      const base = baseUrl();
      if (!base) throw new Error("GitHub設定が未入力");
      const url = `${base}/data/${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`${path} の取得失敗: ${res.status}`);
      }
      return await res.json();
    }

    function quoteClass(change) {
      const s = String(change || "");
      if (s.startsWith("+")) return "good";
      if (s.startsWith("-")) return "bad";
      return "warn";
    }

    function firstMatchItem(data, names, buckets = []) {
      const market = data?.market_data || {};
      const merged = [];
      const useBuckets = buckets.length ? buckets : ["indices", "futures", "forex", "world_indices", "sox", "oil"];
      useBuckets.forEach(b => merged.push(...arr(market[b])));
      return merged.find(x => names.includes(x.name)) || null;
    }

    function renderHero(d600) {
      if (!d600) {
        els.heroPanel.innerHTML = `<div class="empty">データがありません</div>`;
        return;
      }

      const strategy = d600.strategy || {};
      const nikkei = firstMatchItem(d600, ["日経平均"], ["indices"]);
      const futures = firstMatchItem(d600, ["日経先物", "日経225先物"], ["futures"]);
      const usdjpy = firstMatchItem(d600, ["ドル円", "米ドル円"], ["forex"]);
      const nydow = firstMatchItem(d600, ["NYダウ", "ＮＹダウ"], ["world_indices"]);
      const quotes = [nikkei, futures, usdjpy, nydow].filter(x => x && x.value && x.change && x.time);

      const topThemes = arr(d600.priority_themes).slice(0, 3).map(x => x.name).filter(Boolean);
      const topStocks = arr(d600.watchlist)
        .filter(x => ["先導株", "連想1軍"].includes(x.bucket))
        .slice(0, 3)
        .map(x => x.name)
        .filter(Boolean);

      const failedBanner = d600.analysis_status === "failed"
        ? `
          <div class="status-banner failed">
            AI分析は失敗しました。主要指標は取得済みデータです。分析部分は再実行またはプロンプト調整が必要です。
          </div>
        `
        : "";

      els.heroPanel.innerHTML = `
        ${failedBanner}

        <div class="hero-main-grid">
          <div class="decision-card">
            <div class="decision-label">今日の相場判定</div>
            <div class="decision-main">${esc(strategy.market_regime_label || "未判定")}</div>
            <div class="decision-sub">
              ${strategy.market_regime_label ? `<span class="stance-chip">${esc(strategy.market_regime_label)}</span>` : ""}
              ${strategy.entry_style_label ? `<span class="stance-chip">${esc(strategy.entry_style_label)}</span>` : ""}
              ${strategy.danger_level ? `<span class="stance-chip">危険度 ${esc(strategy.danger_level)}</span>` : ""}
            </div>
          </div>

          <div class="decision-card">
            <div class="decision-label">一番見たいテーマ</div>
            <div class="decision-main">${esc(topThemes.join(" / ") || "なし")}</div>
            <div class="decision-sub">${esc(strategy.conclusion || d600.summary || "")}</div>
          </div>

          <div class="decision-card">
            <div class="decision-label">本命監視銘柄</div>
            <div class="decision-main">${esc(topStocks.join(" / ") || "なし")}</div>
            <div class="decision-sub">先導株と連想1軍を優先</div>
          </div>
        </div>

        <div class="hero-mini-grid">
          <div class="decision-card">
            <div class="decision-label">今日はやらないこと</div>
            <div class="decision-sub">${arr(d600.skip_conditions).map(esc).join("<br>") || "なし"}</div>
          </div>

          <div class="decision-card">
            <div class="decision-label">危険パターン</div>
            <div class="decision-sub">${arr(d600.danger_patterns).map(esc).join("<br>") || "なし"}</div>
          </div>
        </div>

        <div class="quote-grid">
          ${quotes.length ? quotes.map(item => `
            <div class="quote">
              <div class="quote-head">
                <div class="quote-name">${esc(item.name || "-")}</div>
                <div class="quote-time">${esc(item.time || "")}</div>
              </div>
              <div class="quote-value">${esc(item.value || "—")}</div>
              <div class="quote-change ${quoteClass(item.change)}">${esc(item.change || "—")} ${esc(item.percent || "")}</div>
            </div>
          `).join("") : `
            <div class="quote">
              <div class="quote-head">
                <div class="quote-name">主要指標</div>
              </div>
              <div class="quote-value">—</div>
              <div class="quote-change warn">未取得</div>
            </div>
          `}
        </div>
      `;
    }

    function render600(data) {
      if (!data) {
        els.tab600.innerHTML = `<div class="empty">6:00データがありません</div>`;
        return;
      }

      const strategy = data.strategy || {};
      const classifiedNews = data.market_data?.classified_news || {};

      els.tab600.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid two">
          <div class="card">
            <h3>今日の戦略</h3>
            <div class="list">
              <div class="item">
                <div class="item-title">相場判定</div>
                <div class="item-sub">${esc(strategy.market_regime_label || "-")} / ${esc(strategy.market_regime || "-")}</div>
              </div>
              <div class="item">
                <div class="item-title">参加戦略</div>
                <div class="item-sub">${esc(strategy.entry_style_label || "-")} / ${esc(strategy.entry_style || "-")}</div>
              </div>
              <div class="item">
                <div class="item-title">危険度</div>
                <div class="item-sub">${esc(strategy.danger_level || "-")}</div>
              </div>
              <div class="item">
                <div class="item-title">結論</div>
                <div class="item-sub">${esc(strategy.conclusion || "-")}</div>
              </div>
            </div>
          </div>

          <div class="card">
            <h3>売買条件</h3>
            <div class="list">
              <div class="item">
                <div class="item-title">エントリー条件</div>
                <div class="item-sub">${arr(data.entry_conditions).map(esc).join("<br>") || "-"}</div>
              </div>
              <div class="item">
                <div class="item-title">見送り条件</div>
                <div class="item-sub">${arr(data.skip_conditions).map(esc).join("<br>") || "-"}</div>
              </div>
              <div class="item">
                <div class="item-title">危険パターン</div>
                <div class="item-sub">${arr(data.danger_patterns).map(esc).join("<br>") || "-"}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="grid three" style="margin-top:14px;">
          <div class="card">
            <h3>強いテーマ</h3>
            ${renderThemeList(data.priority_themes, "強いテーマなし")}
          </div>
          <div class="card">
            <h3>見ないテーマ</h3>
            ${renderThemeList(data.avoid_themes, "見ないテーマなし")}
          </div>
          <div class="card">
            <h3>監視銘柄</h3>
            ${renderWatchlist(data.watchlist, "監視銘柄なし")}
          </div>
        </div>

        <div class="grid two" style="margin-top:14px;">
          <div class="card">
            <h3>売買材料ニュース</h3>
            <div class="list">
              <div class="item"><div class="item-title">マクロ</div><div class="item-sub">${arr(classifiedNews.macro).map(esc).join("<br>") || "-"}</div></div>
              <div class="item"><div class="item-title">業界</div><div class="item-sub">${arr(classifiedNews.industry).map(esc).join("<br>") || "-"}</div></div>
              <div class="item"><div class="item-title">個別材料</div><div class="item-sub">${arr(classifiedNews.stock_specific).map(esc).join("<br>") || "-"}</div></div>
              <div class="item"><div class="item-title">需給イベント</div><div class="item-sub">${arr(classifiedNews.supply_demand).map(esc).join("<br>") || "-"}</div></div>
            </div>
          </div>

          <div class="card">
            <h3>参考データ</h3>
            ${chipList(data.data_sources)}
          </div>
        </div>
      `;
    }

    function render905(data) {
      if (!data) {
        els.tab905.innerHTML = `<div class="empty">9:05データがありません</div>`;
        return;
      }

      const j = data.action_judgement || {};

      els.tab905.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid two">
          <div class="card">
            <h3>今から何をするか</h3>
            <div class="list">
              <div class="item"><div class="item-title">寄りの状態</div><div class="item-sub">${esc(j.opening_state || "-")}</div></div>
              <div class="item"><div class="item-title">主役テーマ</div><div class="item-sub">${esc(j.best_current_theme || "-")}</div></div>
              <div class="item"><div class="item-title">主役銘柄</div><div class="item-sub">${esc(j.best_current_stock || "-")}</div></div>
              <div class="item"><div class="item-title">行動判断</div><div class="item-sub">${esc(j.action_now || "-")}</div></div>
              <div class="item"><div class="item-title">追わないもの</div><div class="item-sub">${esc(j.do_not_chase || "-")}</div></div>
            </div>
          </div>

          <div class="card">
            <h3>テーマ状態</h3>
            ${renderThemeStatus(data.theme_status, "テーマ状態なし")}
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>寄り後メモ</h3>
          <div class="item">
            <div class="item-sub">${nl2br(data.summary || "-")}</div>
          </div>
        </div>
      `;
    }

    function render1535(data) {
      if (!data) {
        els.tab1535.innerHTML = `<div class="empty">15:35データがありません</div>`;
        return;
      }

      const r = data.review || {};

      els.tab1535.innerHTML = `
        <div class="mini-info">
          <span class="mini-pill">更新 ${esc(data.date || "-")} ${esc(data.generated_at || "-")}</span>
          ${data.analysis_status === "failed" ? `<span class="mini-pill">分析失敗</span>` : ""}
        </div>

        <div class="grid two">
          <div class="card">
            <h3>実戦学習メモ</h3>
            <div class="list">
              <div class="item"><div class="item-title">本当に取るべきだったテーマ</div><div class="item-sub">${esc(r.actually_best_theme || "-")}</div></div>
              <div class="item"><div class="item-title">朝の時点で危険だったテーマ</div><div class="item-sub">${esc(r.danger_theme_in_morning || "-")}</div></div>
              <div class="item"><div class="item-title">実際に伸びた先導株</div><div class="item-sub">${esc(r.best_leader_stock || "-")}</div></div>
              <div class="item"><div class="item-title">伸びなかった連想株</div><div class="item-sub">${esc(r.weak_secondary_stock || "-")}</div></div>
              <div class="item"><div class="item-title">外れた仮説</div><div class="item-sub">${esc(r.wrong_hypothesis || "-")}</div></div>
              <div class="item"><div class="item-title">次回の禁止事項</div><div class="item-sub">${esc(r.next_ban_rule || "-")}</div></div>
              <div class="item"><div class="item-title">次の注目</div><div class="item-sub">${esc(r.next_focus || "-")}</div></div>
            </div>
          </div>

          <div class="card">
            <h3>精度の分解</h3>
            <div class="list">
              <div class="item"><div class="item-title">テーマ精度</div><div class="item-sub">${esc(r.theme_score ?? "-")}</div></div>
              <div class="item"><div class="item-title">執行精度</div><div class="item-sub">${esc(r.execution_score ?? "-")}</div></div>
              <div class="item"><div class="item-title">見送り精度</div><div class="item-sub">${esc(r.skip_score ?? "-")}</div></div>
              <div class="item"><div class="item-title">引け後総括</div><div class="item-sub">${nl2br(data.summary || "-")}</div></div>
            </div>
          </div>
        </div>
      `;
    }

    function renderLog(logs) {
      els.tabLog.innerHTML = `
        <div class="card">
          <h3>振り返りログ</h3>
          ${renderReviewLogs(logs)}
        </div>
      `;
    }

    function renderSettings() {
      const user = localStorage.getItem(STORAGE_USER) || "";
      const repo = localStorage.getItem(STORAGE_REPO) || "";

      els.tabSettings.innerHTML = `
        <div class="notice">
          接続先や設定はここで管理します。
        </div>
        <div style="height:12px;"></div>

        <div class="field">
          <label for="ghUser">GitHub ユーザー名</label>
          <input id="ghUser" value="${esc(user)}" placeholder="例: sszzkkzzkk">
        </div>

        <div class="field">
          <label for="ghRepo">リポジトリ名</label>
          <input id="ghRepo" value="${esc(repo)}" placeholder="例: stock-analyzer">
        </div>

        <div class="field">
          <label>現在の接続先</label>
          <div>${esc(user && repo ? `${user}/${repo}` : "未設定")}</div>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn" id="saveSettingsBtn">保存して接続</button>
          <button class="btn" id="clearSettingsBtn">設定クリア</button>
        </div>
      `;

      document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const userVal = document.getElementById("ghUser").value.trim();
        const repoVal = document.getElementById("ghRepo").value.trim();
        localStorage.setItem(STORAGE_USER, userVal);
        localStorage.setItem(STORAGE_REPO, repoVal);
        await loadAll();
      });

      document.getElementById("clearSettingsBtn").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_USER);
        localStorage.removeItem(STORAGE_REPO);
        renderHero(null);
        render600(null);
        render905(null);
        render1535(null);
        renderLog(null);
        renderSettings();
      });
    }

    async function safeLoad(path) {
      try {
        return await fetchJson(path);
      } catch (e) {
        return null;
      }
    }

    async function loadAll() {
      if (!baseUrl()) {
        renderHero(null);
        render600(null);
        render905(null);
        render1535(null);
        renderLog(null);
        renderSettings();
        return;
      }

      els.heroPanel.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab600.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab905.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tab1535.innerHTML = `<div class="empty">読み込み中...</div>`;
      els.tabLog.innerHTML = `<div class="empty">読み込み中...</div>`;

      const [d600, d905, d1535, logs] = await Promise.all([
        safeLoad("latest_600.json"),
        safeLoad("latest_905.json"),
        safeLoad("latest_1535.json"),
        safeLoad("review_log.json"),
      ]);

      renderHero(d600);
      render600(d600);
      render905(d905);
      render1535(d1535);
      renderLog(logs);
      renderSettings();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    els.refreshBtn.addEventListener("click", loadAll);

    loadAll();
  </script>
</body>
</html>
