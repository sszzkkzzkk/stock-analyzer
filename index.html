<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>株式AI分析</title>
<style>
:root{
  --bg:#07101d;--bg2:#0c1530;--panel:#111a34;--panel2:#182145;--panel3:#0f1730;
  --text:#eef2ff;--muted:#9aa6c7;--line:#2d3968;--accent:#6ea8fe;--accent2:#8b5cf6;
  --chip:#23305e;--good:#31d158;--bad:#ff6b6b;--warn:#f7b731;
  --danger-bg:rgba(255,107,107,.16);--danger-line:rgba(255,107,107,.42);--danger-text:#ffd6d6;
  --gold:#ffcc66;--gold-bg:rgba(255,204,102,.12);--gold-line:rgba(255,204,102,.35);
  --silver:#9fd6ff;--silver-bg:rgba(159,214,255,.10);--silver-line:rgba(159,214,255,.28);
  --bronze:#c6925b;--bronze-bg:rgba(198,146,91,.10);--bronze-line:rgba(198,146,91,.26);
  --tabs-h:0px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);-webkit-font-smoothing:antialiased}
.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}

/* ヘッダー */
.hdr{background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.hdr-inner{max-width:1180px;margin:0 auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0}
.title{font-size:20px;font-weight:900}
.subtitle{font-size:11px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.trading-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
.trading-badge.today{background:rgba(49,209,88,.15);border-color:rgba(49,209,88,.4);color:#31d158}
.trading-badge.old{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.4);color:#ff6b6b}
.trading-badge.nodata{background:rgba(155,155,155,.1);border-color:var(--line);color:var(--muted)}
.btn{border:1px solid var(--line);background:rgba(17,26,52,.8);color:var(--muted);border-radius:12px;padding:7px 12px;font:inherit;font-size:12px;cursor:pointer}
.hdr-meta{font-size:10px;color:var(--muted);line-height:1.5;word-break:break-all}

/* 指標エリア */
.top-wrap{background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.top-inner{max-width:1180px;margin:0 auto;padding:8px 12px}
.metrics-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.metric{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:8px 10px;cursor:pointer;transition:border-color .15s;min-width:0}
.metric.active{border-color:rgba(110,168,254,.5);background:rgba(110,168,254,.08)}
.metric-name{font-size:9px;color:var(--muted)}
.metric-time{font-size:9px;color:rgba(154,166,199,.0)}
.metric-top{display:flex;justify-content:space-between}
.metric-value{font-size:14px;font-weight:900;margin-top:2px}
.metric-change{font-size:10px;font-weight:700;margin-top:2px}
.focus-bar{margin-top:6px;border:1px solid var(--line);border-radius:12px;padding:8px 12px;background:rgba(17,26,52,.92);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.focus-left{}
.focus-label{font-size:10px;color:var(--muted)}
.focus-main{font-size:16px;font-weight:900;line-height:1.2}
.focus-change{font-size:14px;font-weight:900;margin-top:1px}
.focus-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:10px;display:inline-flex;align-items:center}
.pill.live{background:rgba(49,209,88,.12);border-color:rgba(49,209,88,.35);color:#31d158}
.session-badge{font-size:10px;padding:4px 8px;border-radius:999px;font-weight:700;border:1px solid var(--line)}
.session-badge.pre{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.35);color:#c4b5fd}
.session-badge.am{background:rgba(110,168,254,.12);border-color:rgba(110,168,254,.35);color:#93c5fd}
.session-badge.pm{background:rgba(49,209,88,.12);border-color:rgba(49,209,88,.35);color:#31d158}
.session-badge.after{background:rgba(155,155,155,.1);border-color:var(--line);color:var(--muted)}

/* タブ */
.tabs-wrap{position:sticky;top:0;z-index:280;background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.tabs{max-width:1180px;margin:0 auto;padding:8px 12px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
.tab{border:1px solid var(--line);background:rgba(11,18,40,.8);color:var(--muted);border-radius:999px;padding:9px 6px;font:inherit;font-size:11px;font-weight:800;cursor:pointer;text-align:center;position:relative}
.tab.main-tab{border-color:rgba(110,168,254,.3);color:var(--accent)}
.tab.active.main-tab{border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.tab.log-tab{font-size:10px}
.tab.active.log-tab{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.15);color:#c4b5fd}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--good);position:absolute;top:5px;right:6px;display:none}
.tab-dot.show{display:block}

/* コンテンツ */
.content{max-width:1180px;margin:0 auto;padding:10px 12px}
.panel{display:none;scroll-margin-top:calc(var(--tabs-h)+12px)}
.panel.active{display:block}
.stack{display:grid;gap:10px}

/* ═══════════════════════════════
   6:00 本番画面 専用スタイル
═══════════════════════════════ */

/* 主戦場ヒーロー */
.battlefield-hero{
  background:linear-gradient(135deg,rgba(110,168,254,.14),rgba(139,92,246,.10));
  border:1px solid rgba(110,168,254,.35);
  border-radius:16px;padding:14px;
}
.bf-label{font-size:10px;color:rgba(110,168,254,.7);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.bf-title{font-size:32px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.01em}
.bf-sub{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.bf-meta{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.bf-chip{background:rgba(110,168,254,.12);border:1px solid rgba(110,168,254,.3);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--accent);font-weight:700}
.bf-chip.danger{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3);color:var(--bad)}
/* テーマサマリー（主戦場カード直下） */
.theme-summary{display:grid;gap:6px;margin-top:0}
.theme-summary-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.02)}
.theme-summary-item.ts-a{background:rgba(255,204,102,.08);border-color:rgba(255,204,102,.3)}
.theme-summary-item.ts-b{background:rgba(159,214,255,.06);border-color:rgba(159,214,255,.2)}
.theme-summary-item.ts-c{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05)}
.ts-rank{font-size:10px;font-weight:900;padding:3px 7px;border-radius:999px;flex-shrink:0;white-space:nowrap}
.ts-a .ts-rank{background:rgba(255,204,102,.2);border:1px solid rgba(255,204,102,.4);color:var(--gold)}
.ts-b .ts-rank{background:rgba(159,214,255,.12);border:1px solid rgba(159,214,255,.3);color:var(--silver)}
.ts-c .ts-rank{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted)}
.ts-name{font-size:16px;font-weight:900;flex:1}
.ts-a .ts-name{color:var(--gold)}
.ts-b .ts-name{color:var(--silver)}
.ts-c .ts-name{color:var(--muted)}
.ts-score{font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0}
.ts-bar{width:48px;height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;flex-shrink:0}
.ts-bar-fill{height:100%;border-radius:999px}
.ts-a .ts-bar-fill{background:var(--gold)}
.ts-b .ts-bar-fill{background:var(--silver)}
.ts-c .ts-bar-fill{background:var(--muted)}

/* テーマカード */
.themes-section{display:grid;gap:8px}
.theme-card{border-radius:14px;padding:12px;border:1px solid var(--line)}
.theme-card.rank-a{background:linear-gradient(135deg,rgba(255,204,102,.1),rgba(255,204,102,.05));border-color:rgba(255,204,102,.4)}
.theme-card.rank-b{background:rgba(159,214,255,.06);border-color:rgba(159,214,255,.25)}
.theme-card.rank-c{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06)}
.theme-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.theme-rank-badge{font-size:10px;font-weight:900;padding:3px 8px;border-radius:999px;flex-shrink:0}
.rank-a .theme-rank-badge{background:rgba(255,204,102,.2);border:1px solid rgba(255,204,102,.5);color:var(--gold)}
.rank-b .theme-rank-badge{background:rgba(159,214,255,.12);border:1px solid rgba(159,214,255,.3);color:var(--silver)}
.rank-c .theme-rank-badge{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted)}
.theme-name{font-size:20px;font-weight:900}
.rank-a .theme-name{color:var(--gold)}
.rank-b .theme-name{color:var(--silver)}
.theme-score-bar{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;min-width:40px}
.theme-score-fill{height:100%;border-radius:999px;transition:width .4s}
.rank-a .theme-score-fill{background:linear-gradient(90deg,var(--gold),#ff9900)}
.rank-b .theme-score-fill{background:linear-gradient(90deg,var(--silver),var(--accent))}
.rank-c .theme-score-fill{background:var(--muted)}
.theme-score-num{font-size:11px;font-weight:900;color:var(--muted)}
.theme-reason{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.theme-tags{display:flex;gap:6px;flex-wrap:wrap}
.theme-tag{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.theme-tag.strong{border-color:rgba(49,209,88,.3);color:#31d158}
.theme-tag.warn{border-color:rgba(247,183,49,.3);color:var(--warn)}
.theme-leader{font-size:12px;color:var(--accent);margin-top:6px;font-weight:700}
.theme-entry{font-size:12px;color:var(--muted);margin-top:4px}

/* 監視銘柄 */
.watch-grid{display:grid;gap:8px}
.watch-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
.watch-card.primary{background:rgba(255,204,102,.05);border-color:rgba(255,204,102,.2)}
.watch-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.watch-bucket{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);flex-shrink:0}
.watch-name{font-size:15px;font-weight:900}
.watch-name a{color:inherit;text-decoration:none;border-bottom:1px dashed rgba(110,168,254,.3)}
.watch-theme{font-size:11px;color:var(--accent);margin-bottom:4px}
.watch-rows{display:grid;gap:3px}
.watch-row{display:grid;grid-template-columns:52px 1fr;gap:6px;font-size:11px;line-height:1.4}
.watch-key{color:var(--muted)}

/* スキップルール */
.skip-rule{background:var(--danger-bg);border:1px solid var(--danger-line);border-radius:12px;padding:10px 12px}
.skip-rule-label{font-size:10px;color:var(--bad);font-weight:700;margin-bottom:4px}
.skip-rule-text{font-size:13px;color:var(--danger-text);line-height:1.5}

/* ═══════════════════════════════
   学習ログ 共通スタイル
═══════════════════════════════ */
.log-panel{background:rgba(11,18,40,.6);border:1px solid rgba(139,92,246,.15);border-radius:16px;padding:12px}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.log-icon{font-size:16px}
.log-title{font-size:14px;font-weight:900;color:#c4b5fd}
.log-freshness{margin-left:auto}
.log-grid{display:grid;gap:8px}
.log-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:9px}
.log-item.hit{border-color:rgba(49,209,88,.3);background:rgba(49,209,88,.05)}
.log-item.miss{border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.05)}
.log-item.key{border-color:rgba(247,183,49,.3);background:rgba(247,183,49,.05)}
.log-key{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px}
.log-val{font-size:13px;line-height:1.5;color:var(--text)}
.log-val.good{color:var(--good)}
.log-val.bad{color:var(--bad)}
.log-val.warn{color:var(--warn)}
.tomorrow-hint{background:linear-gradient(135deg,rgba(110,168,254,.1),rgba(139,92,246,.1));border:1px solid rgba(110,168,254,.3);border-radius:14px;padding:12px}
.tomorrow-hint-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.05em;margin-bottom:6px}
.tomorrow-hint-text{font-size:14px;font-weight:700;color:#fff;line-height:1.5}
.score-row{display:flex;gap:8px;flex-wrap:wrap}
.score-chip{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:6px 10px;text-align:center;flex:1;min-width:60px}
.score-chip-label{font-size:9px;color:var(--muted);margin-bottom:2px}
.score-chip-val{font-size:18px;font-weight:900}

/* 鮮度バッジ */
.freshness{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);font-weight:700}
.freshness.today{background:rgba(49,209,88,.12);border-color:rgba(49,209,88,.35);color:#31d158}
.freshness.yesterday{background:rgba(247,183,49,.12);border-color:rgba(247,183,49,.35);color:var(--warn)}
.freshness.old{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.35);color:var(--bad)}

.notice{background:rgba(93,124,255,.10);border:1px solid rgba(93,124,255,.26);border-radius:12px;padding:10px;color:#dce7ff;font-size:13px;line-height:1.55}
.section-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px;padding-left:2px}

@media(max-width:980px){
  .metrics-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .tabs{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:480px){
  .metrics-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .bf-title{font-size:22px}
}

/* 信頼度バッジ */
.confidence-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid}
.confidence-badge.high{background:rgba(49,209,88,.12);border-color:rgba(49,209,88,.4);color:#31d158}
.confidence-badge.mid{background:rgba(247,183,49,.12);border-color:rgba(247,183,49,.4);color:var(--warn)}
.confidence-badge.low{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.4);color:var(--bad)}
.confidence-badge.new{background:rgba(110,168,254,.12);border-color:rgba(110,168,254,.3);color:var(--accent)}
/* 相場確認パネル */
.market-check{background:rgba(17,26,52,.8);border:1px solid var(--line);border-radius:14px;padding:12px}
.market-check-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mover-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
.mover-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:8px}
.mover-rank{font-size:9px;color:var(--muted);margin-bottom:2px}
.mover-name{font-size:13px;font-weight:800;line-height:1.2}
.mover-change{font-size:11px;font-weight:700;margin-top:2px}
.theme-actual{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.theme-actual-tag{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:11px}
/* 2ペインレイアウト */
.dual-pane{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.dual-pane{grid-template-columns:1fr}.mover-grid{grid-template-columns:1fr}}


/* 根拠タグ */
.reason-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 6px}
.reason-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text);font-weight:600}
.reason-tag.macro{border-color:rgba(247,183,49,.3);color:var(--warn);background:rgba(247,183,49,.06)}
.reason-tag.bad{border-color:rgba(255,107,107,.3);color:var(--bad);background:rgba(255,107,107,.06)}
.reason-tag.good{border-color:rgba(49,209,88,.3);color:var(--good);background:rgba(49,209,88,.06)}

/* 監視銘柄 優先番号 */
.watch-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;border:2px solid}
.watch-num.n1{background:rgba(255,204,102,.2);border-color:var(--gold);color:var(--gold)}
.watch-num.n2{background:rgba(255,204,102,.12);border-color:rgba(255,204,102,.5);color:var(--gold)}
.watch-num.n3{background:rgba(255,204,102,.08);border-color:rgba(255,204,102,.3);color:var(--gold)}
.watch-num.n4{background:rgba(159,214,255,.08);border-color:rgba(159,214,255,.3);color:var(--silver)}
.watch-num.n5{background:rgba(159,214,255,.06);border-color:rgba(159,214,255,.2);color:var(--silver)}
.watch-num.nsub{background:rgba(255,255,255,.04);border-color:var(--line);color:var(--muted)}

/* 危険株セクション */
.danger-section{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.25);border-radius:14px;padding:12px}
.danger-section-title{font-size:12px;font-weight:800;color:var(--bad);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.watch-card.danger-card{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2)}
.watch-card.danger-card .watch-bucket{color:var(--bad);border-color:rgba(255,107,107,.3)}

/* 監視銘柄 tier区切り */
.watch-tier-label{font-size:10px;font-weight:800;color:var(--muted);padding:4px 0 4px 2px;letter-spacing:.05em}
.watch-tier-label.primary{color:var(--gold)}
.watch-tier-label.secondary{color:var(--silver)}
.watch-tier-label.reserve{color:var(--muted)}


/* テーマ詳細 折りたたみ */
.theme-detail-toggle{
  background:rgba(255,255,255,.04);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;width:100%;text-align:center;
  font-size:11px;color:var(--muted);cursor:pointer;font:inherit;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.theme-detail-toggle:hover{background:rgba(255,255,255,.07)}
.theme-detail-body{display:none}
.theme-detail-body.open{display:grid;gap:8px;margin-top:8px}

/* 指標時刻ドット */
.metric-freshness{display:flex;align-items:center;gap:3px;font-size:9px}
.metric-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.metric-dot.live{background:var(--good)}
.metric-dot.old{background:var(--warn)}
.metric-dot.stale{background:var(--bad)}

/* テーマサマリー 折り返し防止 */
.ts-name{font-size:15px;font-weight:900;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* 危険度高 を赤く */
.bf-chip.danger{background:rgba(255,107,107,.15)!important;border-color:rgba(255,107,107,.5)!important;color:var(--bad)!important}


/* データ鮮度パネル */
.freshness-bar{
  background:rgba(6,13,26,.96);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:6px 12px;
  max-width:1180px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
}
.freshness-sessions{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.session-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 8px;border-radius:8px;border:1px solid var(--line);
  font-size:10px;background:rgba(255,255,255,.02);
}
.session-chip.has-today{border-color:rgba(49,209,88,.35);background:rgba(49,209,88,.06)}
.session-chip.has-old{border-color:rgba(247,183,49,.3);background:rgba(247,183,49,.04)}
.session-chip.no-data{opacity:.4}
.session-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.session-dot.today{background:var(--good)}
.session-dot.old{background:var(--warn)}
.session-dot.none{background:var(--line)}
.session-chip-label{font-weight:800;color:var(--text)}
.session-chip-time{color:var(--muted)}
.last-loaded{font-size:10px;color:rgba(154,166,199,.5);white-space:nowrap;flex-shrink:0}

</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-row1">
      <div class="brand">
        <div class="logo">株</div>
        <div>
          <div class="title">株式AI分析</div>
          <div class="subtitle">朝6:00のテーマ認識精度を育てる学習システム</div>
        </div>
      </div>
      <div class="hdr-right">
        <span id="tradingBadge" class="trading-badge nodata">--</span>
        <button class="btn" id="refreshBtn">↻ 再読込</button>
      </div>
    </div>
  <div class="hdr-meta" id="globalMeta" style="font-size:10px;color:var(--muted);padding:2px 0 4px">更新 -</div>
  </div>
</header>

<section class="top-wrap">
  <div class="top-inner">
    <div class="metrics-grid" id="metricsGrid"></div>
    <div class="focus-bar" id="focusBar"></div>
  </div>
</section>

<section class="tabs-wrap">
  <div class="tabs">
    <button class="tab main-tab active" data-tab="tab600">📊 6:00 本番<span class="tab-dot" id="dot600"></span></button>
    <button class="tab log-tab" data-tab="tab905">📝 9:10 記録<span class="tab-dot" id="dot905"></span></button>
    <button class="tab log-tab" data-tab="tab1200">📝 12:00 記録<span class="tab-dot" id="dot1200"></span></button>
    <button class="tab log-tab" data-tab="tab1535">🎯 15:35 学習<span class="tab-dot" id="dot1535"></span></button>
  </div>
</section>

<main class="content">
  <section class="panel active" id="tab600"></section>
  <section class="panel" id="tab905"></section>
  <section class="panel" id="tab1200"></section>
  <section class="panel" id="tab1535"></section>
</main>

<script>
let selectedMarket="日経平均";

// 累計的中率をlearning_dbから計算
function getAccuracyInfo(d600){
  // d600にlearning_db相当の情報がない場合はsafeLoadで取得済みのstateを使う
  // ここではstate.d600のmarket_tagsと過去データを使って信頼度を出す
  // 実装: latest_600.jsonに learning_ctx_summary を含めてもらう想定
  // なければ"初回"扱い
  if(!d600) return null;
  const ctx = d600.learning_context_summary || "";
  const tags = d600.market_tags || [];
  return {ctx, tags};
}

// learning_db.jsonから的中率を取得
async function loadAccuracy(){
  const db = await safe("learning_db.json");
  if(!db || !db.total_days) return null;
  return {
    total: db.total_days,
    hit:   db.hit_days,
    rate:  db.total_days > 0 ? Math.round(db.hit_days / db.total_days * 100) : 0,
    theme_stats: db.theme_stats || {},
    pattern_stats: db.pattern_stats || {},
  };
}

function confidenceBadgeHtml(accuracy, tags){
  if(!accuracy) return `<span class="confidence-badge new">📊 学習中（初日）</span>`;
  const {total, hit, rate} = accuracy;
  if(total < 5) return `<span class="confidence-badge new">📊 学習中 ${total}日分</span>`;

  // 今日の相場タグと過去パターンの一致度
  let patternRate = rate; // デフォルトは全体的中率
  if(tags && tags.length && accuracy.pattern_stats){
    const rates = tags.map(t => accuracy.pattern_stats[t]?.hit_rate || null).filter(v=>v!==null);
    if(rates.length) patternRate = Math.round(rates.reduce((a,b)=>a+b,0)/rates.length*100);
  }

  const cls = patternRate >= 70 ? "high" : patternRate >= 50 ? "mid" : "low";
  const label = patternRate >= 70 ? "高信頼" : patternRate >= 50 ? "中信頼" : "要注意";
  return `<span class="confidence-badge ${cls}">🎯 ${label} ${patternRate}% （${total}日中${hit}日的中）</span>`;
}
let state={d600:null,d905:null,d1200:null,d1535:null,live:null};

const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
const arr=v=>Array.isArray(v)?v:[];
const val=v=>v&&v!=="-"?v:"—";

function baseUrl(){return`https://sszzkkzzkk.github.io/stock-analyzer`}
async function fetchJson(p){const r=await fetch(`${baseUrl()}/data/${p}?t=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(p);return r.json()}
async function safe(p){try{return await fetchJson(p)}catch{return null}}

function todayJST(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10)}
function freshnessClass(d){if(!d)return"old";const t=todayJST();if(d===t)return"today";const diff=(new Date(t)-new Date(d))/(86400*1000);return diff<=1?"yesterday":"old"}
function freshnessLabel(d){if(!d)return"データなし";const f=freshnessClass(d);return f==="today"?"今日":f==="yesterday"?"昨日":d}
function freshnessHtml(d){return`<span class="freshness ${freshnessClass(d)}">${freshnessLabel(d)}</span>`}

function quoteClass(c){const s=String(c||"");return s.startsWith("+")?"good":s.startsWith("-")?"bad":"warn"}

function currentSession(){
  const h=new Date(Date.now()+9*3600*1000).getUTCHours();
  if(h<9)  return{text:"開場前",cls:"pre"};
  if(h<11) return{text:"前場",cls:"am"};
  if(h<12) return{text:"前場後半",cls:"am"};
  if(h<12.5)return{text:"昼休み",cls:"after"};
  if(h<15) return{text:"後場",cls:"pm"};
  return{text:"引け後",cls:"after"};
}

function getMarketItems(){
  const liveItems=arr(state.live?.items);
  if(liveItems.length)return liveItems;
  const md=state.d600?.market_data||{};
  return[
    ...(md.indices||[]),...(md.futures||[]),...(md.forex||[]),
    ...(md.world_indices||[]),...(md.sox||[]),...(md.oil||[])
  ].filter(Boolean);
}

function renderMetrics(){
  const items=getMarketItems();
  const hasLive=arr(state.live?.items).length>0;
  const grid=document.getElementById("metricsGrid");
  const bar=document.getElementById("focusBar");
  if(!items.length){grid.innerHTML=`<div class="notice" style="grid-column:1/-1">指標データなし</div>`;bar.innerHTML="";return}
  if(!items.some(x=>x.name===selectedMarket))selectedMarket=items[0].name;

  grid.innerHTML=items.map(item=>{
    const klass=quoteClass(item.change);
    const active=item.name===selectedMarket?"active":"";
    // 時刻表示: あれば時刻、なければドットだけ
    const rawTime = item.time && item.time!=="N/A" && item.time!=="—" ? item.time : "";
    const dotCls = hasLive ? "live" : "old";
    const timeDisplay = rawTime
      ? `<span class="metric-freshness"><span class="metric-dot ${dotCls}"></span><span style="color:rgba(154,166,199,.6);font-size:9px">${rawTime}</span></span>`
      : `<span class="metric-freshness"><span class="metric-dot ${dotCls}"></span></span>`;
    return`<button class="metric ${active}" data-m="${esc(item.name)}">
      <div class="metric-top">
        <span class="metric-name">${esc(item.name)}</span>
        ${timeDisplay}
      </div>
      <div class="metric-value ${klass}">${esc(item.value||"—")}</div>
      <div class="metric-change ${klass}">${esc(item.change||"—")} ${esc(item.percent||"")}</div>
    </button>`;
  }).join("");
  grid.querySelectorAll("[data-m]").forEach(b=>b.onclick=()=>{selectedMarket=b.dataset.m;renderMetrics();syncTabs()});

  const sel=items.find(x=>x.name===selectedMarket)||items[0];
  const klass=quoteClass(sel.change);
  const sess=currentSession();
  bar.innerHTML=`
    <div class="focus-left">
      <div class="focus-label">選択中の主要指標</div>
      <div class="focus-main ${klass}">${esc(sel.name)} ${esc(sel.value)}</div>
      <div class="focus-change ${klass}">${esc(sel.change)} ${esc(sel.percent)}</div>
      ${sel.time && sel.time!=="N/A" && sel.time!=="—"
        ? `<div style="font-size:10px;color:rgba(154,166,199,.5);margin-top:2px">最終更新 ${esc(sel.time)}</div>`
        : ""}
    </div>
    <div class="focus-right">
      <span class="pill ${hasLive?'live':''}">${hasLive?"🟢 ライブON":"朝データ"}</span>
      <span class="session-badge ${sess.cls}">${sess.text}</span>
    </div>`;
}

function setMeta(){
  const times=[state.d600,state.d905,state.d1200,state.d1535].map(x=>x?.generated_at).filter(Boolean);
  const live=state.live?.generated_at||"";
  document.getElementById("globalMeta").textContent=`更新 ${times.join(" / ")||"-"}${live?" / 指標 "+live:""}`;

  const badge=document.getElementById("tradingBadge");
  const d=state.d600;
  if(!d){badge.textContent="データなし";badge.className="trading-badge nodata";return}
  if(d.date===todayJST()){badge.textContent="📈 本日分析済み";badge.className="trading-badge today"}
  else{badge.textContent=`⚠ ${d.date||"日付不明"}`;badge.className="trading-badge old"}

  const today=todayJST();
  [["dot600",state.d600],["dot905",state.d905],["dot1200",state.d1200],["dot1535",state.d1535]].forEach(([id,d])=>{
    const el=document.getElementById(id);
    if(el)el.classList.toggle("show",d?.date===today);
  });
}

// ═══════════════════════════════
// 6:00 本番画面
// ═══════════════════════════════
function render600(d, accuracy){
  const el=document.getElementById("tab600");
  if(!d){el.innerHTML=`<div class="notice">6:00データがありません。朝6時以降に更新されます。</div>`;return}
  const s=d.strategy||{};
  const themes=arr(d.themes);
  const watchlist=arr(d.watchlist);
  const avoidThemes=arr(d.avoid_themes);

  // ── 主戦場タイトル：必ず断定表示 ──
  // 優先順: battlefield → A本命テーマ → summary冒頭 → "—"
  let bf = s.battlefield||"";
  if(!bf || bf==="分析中" || bf==="—" || bf=="-"){
    const aTheme = themes.find(t=>(t.rank||"").toUpperCase()==="A");
    bf = aTheme?.name || themes[0]?.name || "";
  }
  if(!bf){
    // summaryの先頭テーマ的な単語を抽出（最終フォールバック）
    const sum = d.summary||"";
    const m = sum.match(/^([^。、\n]{2,12})/);
    bf = m ? m[1] : "本日の分析";
  }

  // ── 根拠タグ：conclusion or summary から抽出 ──
  // main.pyのone_lineを箇条書き的に分解、なければsummaryから推測
  const oneLine = s.one_line || s.conclusion || d.summary || "";
  // 句点・読点・スペースで分割して短いフレーズを3つ抽出
  const reasonRaw = oneLine.split(/[。、\n　 ]+/).filter(t=>t.length>=4&&t.length<=20).slice(0,3);
  // 色分けキーワード判定
  function reasonCls(t){
    if(/NY|ダウ|米|下落|円安|円高|原油|金利|関税|SOX/.test(t)) return "macro";
    if(/弱|重|危|禁|注意|回避|売/.test(t)) return "bad";
    if(/強|好|上昇|急騰|集中|優勢|本命/.test(t)) return "good";
    return "";
  }
  const reasonTagsHtml = reasonRaw.length
    ? `<div class="reason-tags">${reasonRaw.map(t=>`<span class="reason-tag ${reasonCls(t)}">${esc(t)}</span>`).join("")}</div>`
    : "";

  const dangerCls = s.danger_level==="高"?"danger":"";
  const oneLine3 = oneLine.split(/。/).slice(0,2).join("。") + (oneLine.includes("。")?"。":"");

  let html = `<div class="stack">`;

  // ① 主戦場 断定ヒーロー
  html += `<div class="battlefield-hero">
    <div class="bf-label">今日の主戦場</div>
    <div class="bf-title">${esc(bf)}</div>
    ${reasonTagsHtml}
    <div class="bf-sub">${esc(oneLine3||oneLine)}</div>
    <div class="bf-meta">
      <span class="bf-chip">${esc(s.market_regime_label||"—")}</span>
      <span class="bf-chip">${esc(s.entry_style_label||"—")}</span>
      <span class="bf-chip ${dangerCls}">危険度 ${esc(s.danger_level||"—")}</span>
      ${freshnessHtml(d.date)}
    </div>
    <div style="margin-top:8px">${confidenceBadgeHtml(accuracy, d.market_tags||[])}</div>
  </div>`;

  // ② 資金集中テーマ 上位3
  const topThemes = themes.slice(0,5);
  if(topThemes.length){
    html += `<div class="theme-summary">`;
    topThemes.forEach(t=>{
      const rank=(t.rank||"C").toUpperCase();
      const rankCls=rank==="A"?"ts-a":rank==="B"?"ts-b":"ts-c";
      const rankLabel=t.rank_label||(rank==="A"?"本命":rank==="B"?"対抗":"監視");
      const score=Math.min(100,Math.max(0,parseInt(t.score)||50));
      html += `<div class="theme-summary-item ${rankCls}">
        <span class="ts-rank">${esc(rank)} ${esc(rankLabel)}</span>
        <span class="ts-name">${esc(t.name||"—")}</span>
        <div class="ts-bar"><div class="ts-bar-fill" style="width:${score}%"></div></div>
        <span class="ts-score">${score}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // ③ テーマ詳細（折りたたみ式）
  if(themes.length){
    const detailId = "theme-detail-"+Date.now();
    let detailCards = "";
    themes.forEach(t=>{
      const rank=(t.rank||"C").toUpperCase();
      const rankCls=rank==="A"?"rank-a":rank==="B"?"rank-b":"rank-c";
      const rankLabel=t.rank_label||rank;
      const score=Math.min(100,Math.max(0,parseInt(t.score)||50));
      const cont=t.continuity||"";
      const ls=t.leader_strength||"";
      const rip=t.ripple||"";
      detailCards += `<div class="theme-card ${rankCls}">
        <div class="theme-header">
          <span class="theme-rank-badge">${esc(rank)} ${esc(rankLabel)}</span>
          <span class="theme-name">${esc(t.name||"—")}</span>
          <div class="theme-score-bar"><div class="theme-score-fill" style="width:${score}%"></div></div>
          <span class="theme-score-num">${score}</span>
        </div>
        <div class="theme-reason">${esc(t.reason||"—")}</div>
        <div class="theme-tags">
          ${cont?`<span class="theme-tag ${cont==="継続"?"strong":cont==="終息"?"warn":""}">${esc(cont)}</span>`:""}
          ${ls?`<span class="theme-tag ${ls==="強"?"strong":""}">先導株: ${esc(ls)}</span>`:""}
          ${rip?`<span class="theme-tag">連想: ${esc(rip)}</span>`:""}
        </div>
        ${t.leader_stock?`<div class="theme-leader">▶ 先導株: ${esc(t.leader_stock)}</div>`:""}
        ${t.entry_hint?`<div class="theme-entry">仕掛け: ${esc(t.entry_hint)}</div>`:""}
      </div>`;
    });
    html += `<button class="theme-detail-toggle" onclick="
      const b=document.getElementById('${detailId}');
      const open=b.classList.toggle('open');
      this.innerHTML=open?'▲ テーマ詳細を閉じる':'▼ テーマ詳細を見る';
    ">▼ テーマ詳細を見る</button>
    <div class="theme-detail-body" id="${detailId}">${detailCards}</div>`;
  }

  // ④ 監視銘柄（危険株を分離、優先番号付き）
  const safeWatch   = watchlist.filter(w=>(w.bucket||"")!=="危険株");
  const dangerWatch = watchlist.filter(w=>(w.bucket||"")==="危険株");

  if(safeWatch.length){
    html += `<div class="section-title">テーマ本物度を確認する監視銘柄</div>`;

    // tier分け: 1-3位=最優先, 4-5位=準主役, 6位以降=予備
    const primary   = safeWatch.slice(0,3);
    const secondary = safeWatch.slice(3,5);
    const reserve   = safeWatch.slice(5,10);

    function watchCardHtml(w, globalIdx){
      const url = w.code ? `https://finance.yahoo.co.jp/quote/${String(w.code).replace(/\D/g,"")}.T` : null;
      const namePart = url
        ? `<a href="${url}" target="_blank" rel="noopener">${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}` + `</a>`
        : `${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}`;
      const numCls = globalIdx<=3?"n"+globalIdx:globalIdx<=5?"n"+globalIdx:"nsub";
      return `<div class="watch-card">
        <div class="watch-head">
          <span class="watch-num ${numCls}">${globalIdx}</span>
          <span class="watch-bucket">${esc(w.bucket||"—")}</span>
          <span class="watch-name">${namePart}</span>
        </div>
        ${w.theme?`<div class="watch-theme">${esc(w.theme)}</div>`:""}
        <div class="watch-rows">
          ${w.reason?`<div class="watch-row"><span class="watch-key">確認目的</span><span>${esc(w.reason)}</span></div>`:""}
          ${w.trigger?`<div class="watch-row"><span class="watch-key">仕掛け</span><span>${esc(w.trigger)}</span></div>`:""}
          ${w.invalidation?`<div class="watch-row"><span class="watch-key">失効</span><span>${esc(w.invalidation)}</span></div>`:""}
          ${w.time_window?`<div class="watch-row"><span class="watch-key">時間帯</span><span>${esc(w.time_window)}</span></div>`:""}
        </div>
      </div>`;
    }

    html += `<div class="watch-grid">`;
    if(primary.length){
      html += `<div class="watch-tier-label primary">▶ 最優先 ${primary.length}件</div>`;
      primary.forEach((w,i)=>{ html += watchCardHtml(w, i+1); });
    }
    if(secondary.length){
      html += `<div class="watch-tier-label secondary">▶ 準主役 ${secondary.length}件</div>`;
      secondary.forEach((w,i)=>{ html += watchCardHtml(w, i+4); });
    }
    if(reserve.length){
      html += `<div class="watch-tier-label reserve">▶ 予備 ${reserve.length}件</div>`;
      reserve.forEach((w,i)=>{ html += watchCardHtml(w, i+6); });
    }
    html += `</div>`;
  }

  // ⑤ 危険株（独立セクション）
  if(dangerWatch.length){
    html += `<div class="danger-section">
      <div class="danger-section-title">⛔ 触るな・危険株</div>
      <div class="watch-grid">`;
    dangerWatch.forEach(w=>{
      const url = w.code ? `https://finance.yahoo.co.jp/quote/${String(w.code).replace(/\D/g,"")}.T` : null;
      const namePart = url
        ? `<a href="${url}" target="_blank" rel="noopener">${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}` + `</a>`
        : `${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}`;
      html += `<div class="watch-card danger-card">
        <div class="watch-head">
          <span class="watch-bucket">危険株</span>
          <span class="watch-name">${namePart}</span>
        </div>
        <div class="watch-rows">
          ${w.reason?`<div class="watch-row"><span class="watch-key">危険理由</span><span>${esc(w.reason)}</span></div>`:""}
          ${w.invalidation?`<div class="watch-row"><span class="watch-key">撤退</span><span>${esc(w.invalidation)}</span></div>`:""}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ⑥ 見ないテーマ（目立つ赤枠セクション）
  if(avoidThemes.length){
    html += `<div class="danger-section" style="border-color:rgba(255,107,107,.2)">
      <div class="danger-section-title">🚫 見ないテーマ</div>
      <div class="watch-grid">`;
    avoidThemes.forEach(t=>{
      html += `<div class="watch-card danger-card">
        <div class="watch-head">
          <span class="watch-bucket" style="color:var(--bad);border-color:rgba(255,107,107,.3)">回避</span>
          <span class="watch-name">${esc(t.name||"—")}</span>
        </div>
        <div class="watch-rows">
          <div class="watch-row"><span class="watch-key">理由</span><span>${esc(t.reason||"—")}</span></div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ⑦ 絶対やらないこと
  if(d.skip_rule){
    html += `<div class="skip-rule"><div class="skip-rule-label">🚫 今日絶対やらないこと</div><div class="skip-rule-text">${esc(d.skip_rule)}</div></div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════
// 9:10 相場確認 + 学習ログ
// ═══════════════════════════════
function render905(d){
  const el=document.getElementById("tab905");
  if(!d){el.innerHTML=`<div class="notice">9:10データがありません</div>`;return}
  const lg=d.log||{};
  const hit=lg.battlefield_correct;

  // 実際の動き（top_gainersなどはd.market_dataから取れないのでlogに含まれる情報を使う）
  const actualBF = lg.actual_battlefield || "—";
  const predBF   = lg.predicted_battlefield || "—";
  const flow     = lg.capital_flow_note || "—";
  const moved    = lg.what_moved_as_predicted || "—";
  const diff     = lg.what_was_different || "—";
  const hintAft  = lg.hint_for_afternoon || "—";
  const hintTmr  = lg.hint_for_tomorrow || "—";
  const acc      = lg.theme_accuracy || "—";

  el.innerHTML=`<div class="stack">
    <div class="dual-pane">
      <!-- 左：実際の相場確認 -->
      <div class="market-check">
        <div class="market-check-title">📈 実際の相場（寄り後）</div>
        <div class="log-grid">
          <div class="log-item ${hit?"hit":"miss"}">
            <div class="log-key">主戦場の予測 vs 実際</div>
            <div class="log-val ${hit?"good":"bad"}">${hit?"✅ 的中":"❌ 外れ"}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">予測: ${esc(predBF)} → 実際: ${esc(actualBF)}</div>
          </div>
          <div class="log-item">
            <div class="log-key">テーマ精度</div>
            <div class="log-val">${esc(acc)}</div>
          </div>
          <div class="log-item">
            <div class="log-key">資金の流れ</div>
            <div class="log-val">${esc(flow)}</div>
          </div>
          <div class="log-item hit">
            <div class="log-key">予測通りだったこと</div>
            <div class="log-val good">${esc(moved)}</div>
          </div>
          <div class="log-item miss">
            <div class="log-key">予測と違ったこと</div>
            <div class="log-val bad">${esc(diff)}</div>
          </div>
        </div>
      </div>
      <!-- 右：次への学習ヒント -->
      <div class="market-check">
        <div class="market-check-title">📝 学習ヒント</div>
        <div class="log-grid">
          <div class="log-item key">
            <div class="log-key">後場への引き継ぎ</div>
            <div class="log-val warn">${esc(hintAft)}</div>
          </div>
          <div class="log-item key">
            <div class="log-key">明日の朝へのヒント</div>
            <div class="log-val warn">${esc(hintTmr)}</div>
          </div>
          <div class="log-item" style="margin-top:4px">
            <div class="log-key" style="font-size:9px">更新時刻</div>
            <div class="log-val" style="font-size:11px;color:var(--muted)">${esc(d.generated_at||"—")} ${freshnessHtml(d.date)}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}
// ═══════════════════════════════
// 12:00 前場答え合わせ + 学習整理
// ═══════════════════════════════
function render1200(d){
  const el=document.getElementById("tab1200");
  if(!d){el.innerHTML=`<div class="notice">12:00データがありません</div>`;return}
  const lg=d.log||{};

  const winner   = lg.am_winner_theme || "—";
  const loser    = lg.am_loser_theme  || "—";
  const newTheme = lg.new_theme_emerged || "";
  const correct  = lg.hypothesis_correction || "—";
  const flow     = lg.capital_flow_am || "—";
  const signV    = lg.sign_that_was_visible || "—";
  const signH    = lg.sign_that_was_hidden  || "—";
  const hint600  = lg.hint_for_tomorrow_600 || "—";

  // 後場監視銘柄
  const pmWatch     = arr(d.pm_watchlist||[]);
  const safePmWatch = pmWatch.filter(w=>(w.bucket||"")!=="危険株");
  const dangerPmWatch = pmWatch.filter(w=>(w.bucket||"")==="危険株");

  function pmCard(w, idx){
    const url = w.code ? `https://finance.yahoo.co.jp/quote/${String(w.code).replace(/\D/g,"")}.T` : null;
    const nm = url
      ? `<a href="${url}" target="_blank" rel="noopener">${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}` + `</a>`
      : `${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}`;
    const nc = idx<=3?"n"+idx:idx<=5?"n"+idx:"nsub";
    return `<div class="watch-card">
      <div class="watch-head">
        <span class="watch-num ${nc}">${idx}</span>
        <span class="watch-bucket">${esc(w.bucket||"—")}</span>
        <span class="watch-name">${nm}</span>
      </div>
      ${w.theme?`<div class="watch-theme">${esc(w.theme)}</div>`:""}
      <div class="watch-rows">
        ${w.reason?`<div class="watch-row"><span class="watch-key">注目理由</span><span>${esc(w.reason)}</span></div>`:""}
        ${w.trigger?`<div class="watch-row"><span class="watch-key">仕掛け</span><span>${esc(w.trigger)}</span></div>`:""}
        ${w.invalidation?`<div class="watch-row"><span class="watch-key">失効</span><span>${esc(w.invalidation)}</span></div>`:""}
        ${w.time_window?`<div class="watch-row"><span class="watch-key">時間帯</span><span>${esc(w.time_window)}</span></div>`:""}
      </div>
    </div>`;
  }

  el.innerHTML=`<div class="stack">
    <div class="dual-pane">
      <div class="market-check">
        <div class="market-check-title">📈 前場の実際の動き</div>
        <div class="log-grid">
          <div class="log-item hit"><div class="log-key">前場で強かったテーマ</div><div class="log-val good">${esc(winner)}</div></div>
          <div class="log-item miss"><div class="log-key">前場で弱かったテーマ</div><div class="log-val bad">${esc(loser)}</div></div>
          ${newTheme?`<div class="log-item key"><div class="log-key">⚡ 新規浮上テーマ</div><div class="log-val warn">${esc(newTheme)}</div></div>`:""}
          <div class="log-item"><div class="log-key">前場の資金フロー</div><div class="log-val">${esc(flow)}</div></div>
          <div class="log-item"><div class="log-key">朝の仮説の修正点</div><div class="log-val">${esc(correct)}</div></div>
        </div>
      </div>
      <div class="market-check">
        <div class="market-check-title">📝 翌朝6:00への学習</div>
        <div class="log-grid">
          <div class="log-item hit"><div class="log-key">朝の時点で見抜けたはずのサイン</div><div class="log-val good">${esc(signV)}</div></div>
          <div class="log-item miss"><div class="log-key">朝の段階では見えなかったサイン</div><div class="log-val bad">${esc(signH)}</div></div>
          <div class="log-item key"><div class="log-key">明日の朝6:00に活かすべきヒント</div><div class="log-val warn">${esc(hint600)}</div></div>
          <div class="log-item" style="margin-top:4px">
            <div class="log-key" style="font-size:9px">更新時刻</div>
            <div class="log-val" style="font-size:11px;color:var(--muted)">${esc(d.generated_at||"—")} ${freshnessHtml(d.date)}</div>
          </div>
        </div>
      </div>
    </div>
    ${safePmWatch.length ? `
      <div class="section-title">後場の監視銘柄</div>
      <div class="watch-grid">
        <div class="watch-tier-label primary">▶ 後場注目 ${safePmWatch.length}件</div>
        ${safePmWatch.map((w,i)=>pmCard(w,i+1)).join("")}
      </div>` : ""}
    ${dangerPmWatch.length ? `
      <div class="danger-section">
        <div class="danger-section-title">⛔ 後場 触るな・危険株</div>
        <div class="watch-grid">
          ${dangerPmWatch.map(w=>`<div class="watch-card danger-card">
            <div class="watch-head">
              <span class="watch-bucket">危険株</span>
              <span class="watch-name">${esc(w.name||"—")}${w.code?` (${esc(w.code)})`:""}` + `</span>
            </div>
            <div class="watch-rows">
              ${w.reason?`<div class="watch-row"><span class="watch-key">危険理由</span><span>${esc(w.reason)}</span></div>`:""}
            </div>
          </div>`).join("")}
        </div>
      </div>` : ""}
    ${arr(d.do_not_do_pm).length ? `
      <div class="skip-rule">
        <div class="skip-rule-label">🚫 後場でやらないこと</div>
        <div class="skip-rule-text">${arr(d.do_not_do_pm).map(esc).join("<br>")}</div>
      </div>` : ""}
  </div>`;
}
// ═══════════════════════════════
// 15:35 学習・答え合わせ
// ═══════════════════════════════
function render1535(d){
  const el=document.getElementById("tab1535");
  if(!d){el.innerHTML=`<div class="notice">15:35データがありません</div>`;return}
  const r=d.review||{};
  const hit=r.theme_hit;
  const ts=r.theme_score??"-";
  const es=r.execution_score??"-";
  const ss=r.skip_score??"-";
  const os=r.overall_score??"-";
  const scoreColor=v=>{if(v==="-")return"warn";return v>=80?"good":v>=60?"warn":"bad"};

  el.innerHTML=`<div class="stack">
    ${d.tomorrow_hint?`<div class="tomorrow-hint">
      <div class="tomorrow-hint-label">🌅 明日の朝6:00に最優先で考慮すること</div>
      <div class="tomorrow-hint-text">${esc(d.tomorrow_hint)}</div>
    </div>`:""}
    <div class="log-panel">
      <div class="log-header">
        <span class="log-icon">🎯</span>
        <span class="log-title">一日の答え合わせ</span>
        <span class="log-freshness">${freshnessHtml(d.date)}</span>
      </div>
      <div class="score-row">
        <div class="score-chip"><div class="score-chip-label">テーマ</div><div class="score-chip-val ${scoreColor(ts)}">${ts}</div></div>
        <div class="score-chip"><div class="score-chip-label">執行</div><div class="score-chip-val ${scoreColor(es)}">${es}</div></div>
        <div class="score-chip"><div class="score-chip-label">見送り</div><div class="score-chip-val ${scoreColor(ss)}">${ss}</div></div>
        <div class="score-chip"><div class="score-chip-label">総合</div><div class="score-chip-val ${scoreColor(os)}">${os}</div></div>
      </div>
      <div class="log-grid" style="margin-top:10px">
        <div class="log-item ${hit?"hit":"miss"}">
          <div class="log-key">テーマ予測精度</div>
          <div class="log-val ${hit?"good":"bad"}">${hit?"✅ 的中":"❌ 外れ"} &nbsp; 予測: ${esc(r.predicted_top_theme||"—")} → 実際: ${esc(r.actual_top_theme||"—")}</div>
        </div>
        <div class="log-item">
          <div class="log-key">的中/外れの理由</div>
          <div class="log-val">${esc(val(r.theme_match_reason))}</div>
        </div>
        <div class="log-item hit">
          <div class="log-key">朝6:00の時点で見抜けたはずのサイン</div>
          <div class="log-val good">${esc(val(r.sign_visible_at_600))}</div>
        </div>
        <div class="log-item miss">
          <div class="log-key">朝6:00では見えなかったサイン</div>
          <div class="log-val bad">${esc(val(r.sign_hidden_at_600))}</div>
        </div>
        ${r.fake_theme?`<div class="log-item miss"><div class="log-key">ダマシだったテーマ</div><div class="log-val bad">${esc(r.fake_theme)} — ${esc(r.fake_reason||"")}</div></div>`:""}
        <div class="log-item">
          <div class="log-key">本日の真の先導株</div>
          <div class="log-val">${esc(val(r.leader_stock_name))} &nbsp; ${esc(r.leader_characteristics||"")}</div>
        </div>
        <div class="log-item key">
          <div class="log-key">今日の最重要学習</div>
          <div class="log-val warn">${esc(val(r.key_lesson))}</div>
        </div>
        <div class="log-item miss">
          <div class="log-key">次回の禁止ルール</div>
          <div class="log-val bad">${esc(val(r.next_ban_rule))}</div>
        </div>
        <div class="log-item hit">
          <div class="log-key">明日の朝に注目すべき視点</div>
          <div class="log-val good">${esc(val(r.next_focus))}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function syncTabs(){
  const t=document.querySelector(".tabs-wrap");
  document.documentElement.style.setProperty("--tabs-h",`${t?Math.ceil(t.getBoundingClientRect().height):0}px`);
}

async function loadAll(){
  ["tab600","tab905","tab1200","tab1535"].forEach(id=>{
    document.getElementById(id).innerHTML=`<div class="notice">読み込み中...</div>`;
  });
  const [live,d600,d905,d1200,d1535,accuracy]=await Promise.all([
    safe("market_live.json"),safe("latest_600.json"),
    safe("latest_905.json"),safe("latest_1200.json"),safe("latest_1535.json"),
    loadAccuracy()
  ]);
  state={live,d600,d905,d1200,d1535,accuracy};
  setMeta();
  renderMetrics();
  render600(d600, accuracy);
  render905(d905);
  render1200(d1200);
  render1535(d1535);
  syncTabs();
}

document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
    syncTabs();
  };
});
document.getElementById("refreshBtn").onclick=loadAll;
window.addEventListener("load",syncTabs);
window.addEventListener("resize",syncTabs);
if("ResizeObserver" in window){
  const ro=new ResizeObserver(syncTabs);
  const el=document.querySelector(".tabs-wrap");
  if(el)ro.observe(el);
}
loadAll();

// 指標だけ60秒ごとに更新（分析JSONは触らない）
async function refreshMetricsOnly(){
  const live = await safe("market_live.json");
  if(live){
    state.live = live;
    renderMetrics();
    // ヘッダーの指標更新時刻だけ更新
    const liveTime = live.generated_at || "";
    const gm = document.getElementById("globalMeta");
    if(gm && liveTime){
      const current = gm.textContent;
      // "/ 指標 xxxx" の部分だけ置き換え
      const base = current.replace(/ \/ 指標 .+$/, "");
      gm.textContent = base + " / 指標 " + liveTime;
    }
  }
}
setInterval(refreshMetricsOnly, 60000);
</script>
