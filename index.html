
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>株式AI分析</title>
<style>
:root{
  --bg:#07101d; --bg2:#0b1430; --panel:#101933; --panel2:#172248; --line:#28345f;
  --text:#eef2ff; --muted:#9aa6c7; --good:#31d158; --bad:#ff6b6b; --warn:#f7b731;
  --accent:#5d7cff; --accent2:#7c53ff; --danger-bg:rgba(255,107,107,.13); --danger-line:rgba(255,107,107,.34);
  --hdr-h:0px; --top-h:0px; --tabs-h:0px;
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text)}
.muted{color:var(--muted)} .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
.hdr{position:sticky;top:0;z-index:300;background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.hdr-inner,.top-inner,.tabs,.content{max-width:1180px;margin:0 auto;padding:12px}
.hdr-inner{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:22px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.title{font-size:22px;font-weight:900;line-height:1.05}.subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.pill,.chip,.btn,.tab,.metric,.mini-btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px}
.pill,.chip{display:inline-flex;align-items:center;padding:6px 10px;font-size:11px}
.btn{padding:11px 14px;font:inherit;cursor:pointer;border-radius:14px}
.topbar{position:sticky;top:var(--hdr-h);z-index:290;background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.top-inner{display:grid;gap:10px}
.decision{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:8px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:10px 12px;min-width:0}
.box.primary{background:linear-gradient(180deg, rgba(93,124,255,.14), rgba(124,83,255,.08));border-color:rgba(93,124,255,.35)}
.label{font-size:11px;color:var(--muted);margin-bottom:4px}
.value{font-size:20px;font-weight:900;line-height:1.05}
.sub{font-size:12px;color:var(--muted);line-height:1.3;margin-top:4px}
.controls{display:flex;gap:8px}.mini-btn{padding:0 14px;font:inherit;cursor:pointer;border-radius:14px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.metric{padding:10px 12px;cursor:pointer;text-align:left;border-radius:14px}
.metric.active{border-color:rgba(93,124,255,.4);box-shadow:0 0 0 1px rgba(93,124,255,.12) inset;background:rgba(93,124,255,.08)}
.metric-top{display:flex;justify-content:space-between;gap:8px}.metric-name,.metric-time{font-size:10px;color:var(--muted)}
.metric-value{font-size:16px;font-weight:900;margin-top:4px}.metric-change{font-size:11px;font-weight:700;margin-top:4px}
.tabs-wrap{position:sticky;top:calc(var(--hdr-h) + var(--top-h));z-index:280;background:rgba(6,13,26,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.tab{padding:11px 10px;font:inherit;font-weight:800;cursor:pointer;text-align:center}
.tab.active{border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.content{padding-top:12px}
.panel{display:none;background:rgba(16,25,51,.96);border:1px solid var(--line);border-radius:20px;padding:12px;scroll-margin-top:calc(var(--hdr-h) + var(--top-h) + var(--tabs-h) + 12px)}
.panel.active{display:block}
.stack{display:grid;gap:12px}.grid{display:grid;gap:12px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.hero{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:12px}
.hero-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.hero-kicker{font-size:11px;color:var(--muted);margin-bottom:4px}.hero-title{font-size:28px;font-weight:900;line-height:1.04}.hero-text{font-size:13px;color:var(--muted);line-height:1.45}
.card{background:#0d1530;border:1px solid var(--line);border-radius:16px;padding:12px;min-width:0}.card h3{margin:0 0 10px;font-size:16px}
.list{display:grid;gap:8px}.item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}.item.danger{background:var(--danger-bg);border-color:var(--danger-line)}
.item-title{font-weight:800;font-size:14px;margin-bottom:4px}.item-sub{font-size:13px;color:var(--muted);line-height:1.45}.item.danger .item-sub{color:#ffd6d6}
.watch{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:10px;display:grid;gap:6px}
.watch-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.watch-name{font-size:15px;font-weight:900}.watch-role{font-size:12px;color:var(--muted)}
.watch-row{display:grid;grid-template-columns:66px 1fr;gap:8px;font-size:12px;line-height:1.4}.watch-key{color:var(--muted)}
.theme{border-radius:14px;padding:12px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.theme.a{background:rgba(255,204,102,.10);border-color:rgba(255,204,102,.28)} .theme.b{background:rgba(159,214,255,.09);border-color:rgba(159,214,255,.20)}
.theme-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}.rank{min-width:28px;height:28px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);font-size:12px;font-weight:900;background:var(--panel2)}
.theme-title{font-size:18px;font-weight:900}.theme-text{font-size:13px;color:var(--muted);line-height:1.45}
.notice{background:rgba(93,124,255,.10);border:1px solid rgba(93,124,255,.26);border-radius:14px;padding:12px;color:#dce7ff;font-size:13px;line-height:1.55}
.news-preview{font-size:13px;color:var(--muted);line-height:1.5}.news-list{display:none;gap:8px;margin-top:8px}.news-list.open{display:grid}.news-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px;color:var(--muted);font-size:13px;line-height:1.45}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px} table{width:100%;min-width:700px;border-collapse:collapse} th,td{padding:10px 9px;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;text-align:left;vertical-align:top} th{color:var(--muted);background:rgba(255,255,255,.03)}
@media (max-width:980px){.decision{grid-template-columns:1fr 1fr}.controls{grid-column:1/-1}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.two{grid-template-columns:1fr}.hero-title{font-size:24px}}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-inner">
  <div class="brand"><div class="logo">株</div><div><div class="title">株式AI分析</div><div class="subtitle">日本株短期トレード用・個人向け売買判断補助</div></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <div class="pill" id="globalMeta">更新 -</div>
    <button class="btn" id="refreshBtn">↻ 再読込</button>
  </div>
</div></header>

<section class="topbar"><div class="top-inner">
  <div class="decision">
    <div class="box primary"><div class="label">いまの結論</div><div class="value" id="topRegime">未読込</div><div class="sub" id="topSummary">データ読み込み待ち</div></div>
    <div class="box"><div class="label">参加戦略</div><div class="value" id="topAction">-</div></div>
    <div class="box"><div class="label">本命テーマ</div><div class="value" id="topTheme">-</div></div>
    <div class="controls"><button class="mini-btn" id="prevTabBtn">←</button><button class="mini-btn" id="nextTabBtn">→</button></div>
  </div>
  <div class="metrics" id="metricsGrid"></div>
</div></section>

<section class="tabs-wrap"><div class="tabs">
  <button class="tab active" data-tab="tab600">6:00 戦略会議</button>
  <button class="tab" data-tab="tab905">9:10 行動修正</button>
  <button class="tab" data-tab="tab1200">12:00 後場戦略</button>
  <button class="tab" data-tab="tab1535">15:35 総括と学習</button>
</div></section>

<main class="content">
  <section class="panel active" id="tab600"></section>
  <section class="panel" id="tab905"></section>
  <section class="panel" id="tab1200"></section>
  <section class="panel" id="tab1535"></section>
</main>

<script>
const STORAGE_USER="stock-ai-user", STORAGE_REPO="stock-ai-repo";
const orderedTabs=["tab600","tab905","tab1200","tab1535"];
let selectedMarketName="日経平均";
let state={d600:null,d905:null,d1200:null,d1535:null,logs:null};

const els={
  globalMeta:document.getElementById("globalMeta"),
  metricsGrid:document.getElementById("metricsGrid"),
  tab600:document.getElementById("tab600"),
  tab905:document.getElementById("tab905"),
  tab1200:document.getElementById("tab1200"),
  tab1535:document.getElementById("tab1535"),
  refreshBtn:document.getElementById("refreshBtn"),
  topRegime:document.getElementById("topRegime"),
  topSummary:document.getElementById("topSummary"),
  topAction:document.getElementById("topAction"),
  topTheme:document.getElementById("topTheme"),
  prevTabBtn:document.getElementById("prevTabBtn"),
  nextTabBtn:document.getElementById("nextTabBtn")
};

const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const nl2br=v=>esc(v??"").replace(/\n/g,"<br>");
const arr=v=>Array.isArray(v)?v:[];
const compactJoin=(list,e="なし")=>{const f=arr(list).filter(Boolean); return f.length?f.join(" / "):e;};

function baseUrl(){
  const user=localStorage.getItem(STORAGE_USER)||"sszzkkzzkk";
  const repo=localStorage.getItem(STORAGE_REPO)||"stock-analyzer";
  return `https://${user}.github.io/${repo}`;
}
async function fetchJson(path){
  const res=await fetch(`${baseUrl()}/data/${path}?t=${Date.now()}`,{cache:"no-store"});
  if(!res.ok) throw new Error(`${path} ${res.status}`);
  return await res.json();
}
async function safeLoad(path){try{return await fetchJson(path)}catch(e){return null}}
function quoteClass(change){
  const s=String(change||"");
  if(s.startsWith("+")) return "good";
  if(s.startsWith("-")) return "bad";
  return "warn";
}
function firstMatchItem(data,names,buckets=[]){
  const market=data?.market_data||{};
  const merged=[];
  (buckets.length?buckets:["indices","futures","forex","world_indices","sox","oil"]).forEach(b=>merged.push(...arr(market[b])));
  return merged.find(x=>names.includes(x.name))||null;
}
function getMarketPicks(d600){
  return [
    firstMatchItem(d600,["日経平均"],["indices"]),
    firstMatchItem(d600,["日経先物","日経225先物"],["futures"]),
    firstMatchItem(d600,["ドル円","米ドル円"],["forex"]),
    firstMatchItem(d600,["NYダウ","ＮＹダウ"],["world_indices"])
  ].filter(Boolean);
}
function setGlobalMeta(...datasets){
  const times=datasets.map(x=>x?.generated_at).filter(Boolean);
  els.globalMeta.textContent=`更新 ${times.length?times.join(" / "):"-"}`;
}
function renderMetrics(d600){
  const picks=getMarketPicks(d600);
  if(!picks.length){
    els.metricsGrid.innerHTML=`<div class="notice" style="grid-column:1/-1">主要指標データが取得できません。いまの画面はGitHub Pages上のJSONを60秒ごとに再取得しています。秒単位の市場フィードではありません。</div>`;
    return;
  }
  if(!picks.some(x=>x.name===selectedMarketName)) selectedMarketName=picks[0].name;
  els.metricsGrid.innerHTML=picks.map(item=>{
    const klass=quoteClass(item.change);
    const active=item.name===selectedMarketName?"active":"";
    return `<button class="metric ${active}" data-market="${esc(item.name)}">
      <div class="metric-top"><div class="metric-name">${esc(item.name||"-")}</div><div class="metric-time">${esc(item.time||"")}</div></div>
      <div class="metric-value ${klass}">${esc(item.value||"—")}</div>
      <div class="metric-change ${klass}">${esc(item.change||"—")} ${esc(item.percent||"")}</div>
    </button>`;
  }).join("");
  els.metricsGrid.querySelectorAll("[data-market]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      selectedMarketName=btn.getAttribute("data-market");
      renderMetrics(d600);
      syncStickyHeights();
    });
  });
}
function renderThemeCards(items){
  const list=arr(items).filter(Boolean);
  if(!list.length) return `<div class="notice">本命テーマデータなし</div>`;
  return `<div class="grid two">${list.slice(0,4).map((x,i)=>`
    <div class="theme ${i===0?'a':'b'}">
      <div class="theme-head"><span class="rank">${i===0?'A本命':'B候補'}</span><div class="theme-title">${esc(x.name||"-")}</div></div>
      <div class="theme-text">${esc(x.reason||"-")}</div>
    </div>`).join("")}</div>`;
}
function renderWatchCards(items){
  const list=arr(items).filter(Boolean);
  if(!list.length) return `<div class="notice">監視銘柄なし</div>`;
  return `<div class="grid two">${list.map((x,idx)=>`
    <div class="watch">
      <div class="watch-head"><span class="pill">優先 ${idx+1}</span><div class="watch-name">${esc(x.name||"-")} ${x.code?`(${esc(x.code)})`:""}</div></div>
      <div class="watch-role">${esc(x.bucket||"-")} / ${esc(x.reason||"-")}</div>
      <div class="watch-row"><div class="watch-key">仕掛け</div><div>${esc(x.trigger||"-")}</div></div>
      <div class="watch-row"><div class="watch-key">失効</div><div>${esc(x.invalidation||"-")}</div></div>
      <div class="watch-row"><div class="watch-key">時間帯</div><div>${esc(x.time_window||"-")}</div></div>
    </div>`).join("")}</div>`;
}
function renderThemeList(items, emptyText="データなし"){
  const list=arr(items).filter(Boolean);
  if(!list.length) return `<div class="notice">${esc(emptyText)}</div>`;
  return `<div class="list">${list.map(x=>`<div class="item"><div class="item-title">${esc(x.name||"-")}</div><div class="item-sub">${esc(x.reason||"-")}</div></div>`).join("")}</div>`;
}
function renderThemeStatus(items){
  const list=arr(items).filter(Boolean);
  if(!list.length) return `<div class="notice">テーマ状態なし</div>`;
  return `<div class="list">${list.map(x=>`<div class="item"><div class="item-title">${esc(x.name||"-")} / ${esc(x.type||"-")}</div><div class="item-sub">${esc(x.comment||"-")}</div></div>`).join("")}</div>`;
}
function renderNews(items,id){
  const list=arr(items).filter(Boolean);
  if(!list.length) return `<div class="notice">ニュースなし</div>`;
  const preview=esc(list[0].title||list[0].headline||list[0].text||list[0]);
  return `<div><div class="news-preview">${preview}</div><div style="margin-top:8px"><button class="btn" data-news-toggle="${id}">ニュースを開く</button></div><div class="news-list" id="${id}">${list.slice(0,5).map(x=>`<div class="news-item">${esc(x.title||x.headline||x.text||x)}</div>`).join("")}</div></div>`;
}
function bindNewsToggles(){
  document.querySelectorAll("[data-news-toggle]").forEach(btn=>{
    btn.onclick=()=>{
      const box=document.getElementById(btn.getAttribute("data-news-toggle"));
      if(!box) return;
      const open=box.classList.toggle("open");
      btn.textContent=open?"ニュースを閉じる":"ニュースを開く";
      syncStickyHeights();
    };
  });
}
function setTopFromActiveTab(){
  const active=document.querySelector(".tab.active")?.dataset.tab||"tab600";
  let regime="-", action="-", theme="-", summary="データなし";
  if(active==="tab600" && state.d600){
    const s=state.d600.strategy||{};
    regime=s.market_regime_label||"未判定";
    action=s.entry_style_label||"-";
    theme=compactJoin(arr(state.d600.priority_themes).slice(0,2).map(x=>x.name), "-");
    summary=s.conclusion||state.d600.summary||"";
  }else if(active==="tab905" && state.d905){
    const j=state.d905.action_judgement||{};
    regime=j.opening_state||"寄り後確認";
    action=j.action_now||"-";
    theme=j.best_current_theme||"-";
    summary=state.d905.summary||j.action_now||"";
  }else if(active==="tab1200" && state.d1200){
    const p=state.d1200.afternoon_plan||{};
    regime=p.status_label||"後場戦略";
    action=p.pm_regime_label||p.status||"-";
    theme=compactJoin(state.d1200.pm_core_themes, "-");
    summary=p.summary||state.d1200.summary||"";
  }else if(active==="tab1535" && state.d1535){
    const r=state.d1535.review||{};
    regime="総括と学習";
    action=`テーマ ${r.theme_score??"-"}`;
    theme=r.actually_best_theme||"-";
    summary=state.d1535.summary||"";
  }
  els.topRegime.textContent=regime;
  els.topAction.textContent=action;
  els.topTheme.textContent=theme;
  els.topSummary.textContent=summary||"データなし";
}
function render600(data){
  if(!data){els.tab600.innerHTML=`<div class="notice">6:00データがありません</div>`; return;}
  const s=data.strategy||{};
  const news=arr(data.major_news||data.market_data?.news||data.news);
  els.tab600.innerHTML=`<div class="stack">
    <div class="hero">
      <div class="hero-top">
        <div><div class="hero-kicker">朝の結論</div><div class="hero-title">${esc(s.market_regime_label||"未判定")}</div></div>
        <div class="chips">${s.entry_style_label?`<span class="chip">${esc(s.entry_style_label)}</span>`:""}${s.danger_level?`<span class="chip">危険度 ${esc(s.danger_level)}</span>`:""}</div>
      </div>
      <div class="hero-text">${esc(s.conclusion||data.summary||"")}</div>
    </div>
    <div class="grid two">
      <div class="card"><h3>本命テーマ</h3>${renderThemeCards(data.priority_themes)}</div>
      <div class="card"><h3>本命監視銘柄</h3>${renderWatchCards(arr(data.watchlist).filter(x=>["先導株","連想1軍"].includes(x.bucket)).slice(0,4))}</div>
    </div>
    <div class="grid two">
      <div class="card"><h3>やること</h3><div class="list">${arr(data.entry_conditions).length?arr(data.entry_conditions).map(x=>`<div class="item"><div class="item-sub">${esc(x)}</div></div>`).join(""):`<div class="notice">仕掛け条件なし</div>`}</div></div>
      <div class="card"><h3>やらないこと</h3><div class="list">${arr(data.skip_conditions).length?arr(data.skip_conditions).map(x=>`<div class="item danger"><div class="item-sub">${esc(x)}</div></div>`).join(""):`<div class="notice">禁止事項なし</div>`}</div></div>
    </div>
    <div class="grid two">
      <div class="card"><h3>本日ニュース</h3>${renderNews(news,"news600")}</div>
      <div class="card"><h3>見ないテーマ / 危険パターン</h3>${renderThemeList(data.avoid_themes,"見ないテーマなし")}<div style="height:10px"></div><div class="list">${arr(data.danger_patterns).length?arr(data.danger_patterns).map(x=>`<div class="item"><div class="item-sub">${esc(x)}</div></div>`).join(""):`<div class="notice">危険パターンなし</div>`}</div></div>
    </div>
  </div>`;
  bindNewsToggles();
}
function render905(data){
  if(!data){els.tab905.innerHTML=`<div class="notice">9:10データがありません</div>`; return;}
  const j=data.action_judgement||{};
  els.tab905.innerHTML=`<div class="stack">
    <div class="hero">
      <div class="hero-top">
        <div><div class="hero-kicker">寄り後の判断</div><div class="hero-title">${esc(j.opening_state||"未判定")}</div></div>
        <div class="chips">${j.best_current_theme?`<span class="chip">${esc(j.best_current_theme)}</span>`:""}${j.best_current_stock?`<span class="chip">${esc(j.best_current_stock)}</span>`:""}</div>
      </div>
      <div class="hero-text">${esc(j.action_now||data.summary||"")}</div>
    </div>
    <div class="grid two">
      <div class="card"><h3>今から何をするか</h3><div class="list">
        <div class="item"><div class="item-title">行動判断</div><div class="item-sub">${esc(j.action_now||"-")}</div></div>
        <div class="item"><div class="item-title">追わないもの</div><div class="item-sub">${esc(j.do_not_chase||"-")}</div></div>
        <div class="item"><div class="item-title">主役テーマ / 銘柄</div><div class="item-sub">${esc(j.best_current_theme||"-")} / ${esc(j.best_current_stock||"-")}</div></div>
      </div></div>
      <div class="card"><h3>テーマ状態</h3>${renderThemeStatus(data.theme_status)}</div>
    </div>
    <div class="card"><h3>寄り後メモ</h3><div class="item"><div class="item-sub">${nl2br(data.summary||"-")}</div></div></div>
  </div>`;
}
function render1200(data){
  if(!data){els.tab1200.innerHTML=`<div class="notice">12:00データがありません</div>`; return;}
  const p=data.afternoon_plan||{};
  els.tab1200.innerHTML=`<div class="stack">
    <div class="hero">
      <div class="hero-top">
        <div><div class="hero-kicker">後場の再構築</div><div class="hero-title">${esc(p.status_label||"後場戦略")}</div></div>
        <div class="chips">${p.pm_regime_label?`<span class="chip">${esc(p.pm_regime_label)}</span>`:""}${p.status?`<span class="chip">${esc(p.status)}</span>`:""}</div>
      </div>
      <div class="hero-text">${esc(p.summary||data.summary||"")}</div>
    </div>
    <div class="grid two">
      <div class="card"><h3>後場の方針</h3><div class="list">
        <div class="item"><div class="item-title">前場で強かったテーマ</div><div class="item-sub">${esc(compactJoin(data.strong_themes_am))}</div></div>
        <div class="item"><div class="item-title">後場の本命テーマ</div><div class="item-sub">${esc(compactJoin(data.pm_core_themes))}</div></div>
        <div class="item"><div class="item-title">捨てるテーマ</div><div class="item-sub">${esc(compactJoin(data.drop_themes))}</div></div>
      </div></div>
      <div class="card"><h3>後場でやること / やらないこと</h3><div class="list">
        <div class="item"><div class="item-title">仕掛け条件</div><div class="item-sub">${arr(data.entry_conditions_pm).map(esc).join("<br>")||"なし"}</div></div>
        <div class="item danger"><div class="item-title">やらないこと</div><div class="item-sub">${arr(data.do_not_do_pm).map(esc).join("<br>")||"なし"}</div></div>
        <div class="item"><div class="item-title">見送り条件</div><div class="item-sub">${arr(data.skip_conditions_pm).map(esc).join("<br>")||"なし"}</div></div>
      </div></div>
    </div>
    <div class="card"><h3>新規監視銘柄</h3>${renderWatchCards(data.new_watchlist)}</div>
  </div>`;
}
function render1535(data,d600,d905,d1200){
  if(!data){els.tab1535.innerHTML=`<div class="notice">15:35データがありません</div>`; return;}
  const r=data.review||{},s600=d600?.strategy||{},s905=d905?.action_judgement||{},s1200=d1200?.afternoon_plan||{};
  els.tab1535.innerHTML=`<div class="stack">
    <div class="hero">
      <div class="hero-top">
        <div><div class="hero-kicker">一日の締め</div><div class="hero-title">${esc(data.summary||"総評なし")}</div></div>
        <div class="chips"><span class="chip">テーマ ${esc(r.theme_score??"-")}</span><span class="chip">執行 ${esc(r.execution_score??"-")}</span><span class="chip">見送り ${esc(r.skip_score??"-")}</span></div>
      </div>
      <div class="hero-text">総評、分析の答え合わせ、次回への学習メモを残します。</div>
    </div>
    <div class="grid two">
      <div class="card"><h3>今日の総評</h3><div class="list">
        <div class="item"><div class="item-title">一言総評</div><div class="item-sub">${esc(data.summary||"-")}</div></div>
        <div class="item"><div class="item-title">本当に取るべきだったテーマ</div><div class="item-sub">${esc(r.actually_best_theme||"-")}</div></div>
        <div class="item"><div class="item-title">危険だったテーマ</div><div class="item-sub">${esc(r.danger_theme_in_morning||"-")}</div></div>
        <div class="item"><div class="item-title">次の注目</div><div class="item-sub">${esc(r.next_focus||"-")}</div></div>
      </div></div>
      <div class="card"><h3>分析の答え合わせ</h3><div class="list">
        <div class="item"><div class="item-title">6:00見立て</div><div class="item-sub">${esc(s600.market_regime_label||"-")} / ${esc(s600.entry_style_label||"-")}</div></div>
        <div class="item"><div class="item-title">9:10修正</div><div class="item-sub">${esc(s905.opening_state||"-")} / ${esc(s905.action_now||"-")}</div></div>
        <div class="item"><div class="item-title">12:00後場戦略</div><div class="item-sub">${esc(s1200.status_label||"-")} / ${esc(s1200.pm_regime_label||"-")}</div></div>
        <div class="item"><div class="item-title">外れた仮説</div><div class="item-sub">${esc(r.wrong_hypothesis||"-")}</div></div>
      </div></div>
    </div>
  </div>`;
}
function syncStickyHeights(){
  const hdr=document.querySelector(".hdr"), top=document.querySelector(".topbar"), tabs=document.querySelector(".tabs-wrap");
  document.documentElement.style.setProperty("--hdr-h",`${hdr?Math.ceil(hdr.getBoundingClientRect().height):0}px`);
  document.documentElement.style.setProperty("--top-h",`${top?Math.ceil(top.getBoundingClientRect().height):0}px`);
  document.documentElement.style.setProperty("--tabs-h",`${tabs?Math.ceil(tabs.getBoundingClientRect().height):0}px`);
}
function activeTabId(){return document.querySelector(".tab.active")?.dataset.tab||"tab600";}
function moveTab(delta){
  const cur=orderedTabs.indexOf(activeTabId());
  const next=Math.max(0,Math.min(orderedTabs.length-1,cur+delta));
  document.querySelector(`.tab[data-tab="${orderedTabs[next]}"]`)?.click();
}
function setTopFromActiveTab(){
  const active=activeTabId();
  let regime="-", action="-", theme="-", summary="データなし";
  if(active==="tab600" && state.d600){
    const s=state.d600.strategy||{};
    regime=s.market_regime_label||"未判定";
    action=s.entry_style_label||"-";
    theme=compactJoin(arr(state.d600.priority_themes).slice(0,2).map(x=>x.name), "-");
    summary=s.conclusion||state.d600.summary||"";
  }else if(active==="tab905" && state.d905){
    const j=state.d905.action_judgement||{};
    regime=j.opening_state||"寄り後確認";
    action=j.action_now||"-";
    theme=j.best_current_theme||"-";
    summary=state.d905.summary||j.action_now||"";
  }else if(active==="tab1200" && state.d1200){
    const p=state.d1200.afternoon_plan||{};
    regime=p.status_label||"後場戦略";
    action=p.pm_regime_label||p.status||"-";
    theme=compactJoin(state.d1200.pm_core_themes, "-");
    summary=p.summary||state.d1200.summary||"";
  }else if(active==="tab1535" && state.d1535){
    const r=state.d1535.review||{};
    regime="総括と学習";
    action=`テーマ ${r.theme_score??"-"}`;
    theme=r.actually_best_theme||"-";
    summary=state.d1535.summary||"";
  }
  els.topRegime.textContent=regime;
  els.topAction.textContent=action;
  els.topTheme.textContent=theme;
  els.topSummary.textContent=summary||"データなし";
}
async function loadAll(){
  els.tab600.innerHTML='<div class="notice">読み込み中...</div>';
  els.tab905.innerHTML='<div class="notice">読み込み中...</div>';
  els.tab1200.innerHTML='<div class="notice">読み込み中...</div>';
  els.tab1535.innerHTML='<div class="notice">読み込み中...</div>';
  const [d600,d905,d1200,d1535,logs]=await Promise.all([
    safeLoad("latest_600.json"),
    safeLoad("latest_905.json"),
    safeLoad("latest_1200.json"),
    safeLoad("latest_1535.json"),
    safeLoad("review_log.json")
  ]);
  state={d600,d905,d1200,d1535,logs};
  setGlobalMeta(d600,d905,d1200,d1535);
  renderMetrics(d600);
  render600(d600);
  render905(d905);
  render1200(d1200);
  render1535(d1535,d600,d905,d1200);
  setTopFromActiveTab();
  bindNewsToggles();
  syncStickyHeights();
}
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
    setTopFromActiveTab();
    syncStickyHeights();
  });
});
els.prevTabBtn.addEventListener("click",()=>moveTab(-1));
els.nextTabBtn.addEventListener("click",()=>moveTab(1));
document.getElementById("refreshBtn").addEventListener("click",loadAll);
window.addEventListener("load",syncStickyHeights);
window.addEventListener("resize",syncStickyHeights);
if("ResizeObserver" in window){
  const ro=new ResizeObserver(syncStickyHeights);
  [".hdr",".topbar",".tabs-wrap"].forEach(sel=>{const el=document.querySelector(sel); if(el) ro.observe(el);});
}
function bindNewsToggles(){
  document.querySelectorAll("[data-news-toggle]").forEach(btn=>{
    btn.onclick=()=>{
      const box=document.getElementById(btn.getAttribute("data-news-toggle"));
      if(!box) return;
      const open=box.classList.toggle("open");
      btn.textContent=open?"ニュースを閉じる":"ニュースを開く";
      syncStickyHeights();
    };
  });
}
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
