<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>株式AI分析</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060d1a;--s1:#0b1628;--s2:#0f1e36;--s3:#162540;
  --border:#1a2d4a;--dim:#243d5e;--muted:#4d6f96;--body:#8fa8c8;--hi:#c8dff5;--white:#e8f3ff;
  --green:#00d68f;--red:#f03e4e;--amber:#f5a623;--blue:#3b8beb;--cyan:#00c4d4;--purple:#9b6dff;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--body);font-family:var(--sans);font-size:13px;-webkit-text-size-adjust:100%}
body{min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

/* ── ヘッダー ── */
.hdr{
position:sticky;top:0;z-index:200;
background:rgba(6,13,26,.97);backdrop-filter:blur(20px);
border-bottom:1px solid var(–border);
padding:8px 14px;
display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.hdr-brand{display:flex;align-items:center;gap:8px}
.hdr-logo{
width:32px;height:32px;border-radius:8px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
display:grid;place-items:center;font-family:var(–mono);font-size:11px;font-weight:800;color:#fff;
flex-shrink:0;
}
.hdr-title{font-size:13px;font-weight:700;color:var(–white);letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:var(–muted);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:6px}
.hdr-time{font-family:var(–mono);font-size:10px;color:var(–muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,214,143,.5)}60%{box-shadow:0 0 0 5px rgba(0,214,143,0)}}
.rbtn{
background:none;border:1px solid var(–border);color:var(–muted);
width:28px;height:28px;border-radius:7px;display:grid;place-items:center;
cursor:pointer;font-size:14px;transition:all .15s;
}
.rbtn:active{background:var(–s2);color:var(–white)}

/* ── ティッカー ── */
.ticker{
position:sticky;top:49px;z-index:190;
background:var(–s1);border-bottom:1px solid var(–border);
overflow:hidden;
}
.ticker-inner{
display:flex;overflow-x:auto;scrollbar-width:none;
-webkit-overflow-scrolling:touch;
}
.ticker-inner::-webkit-scrollbar{display:none}
.ti{
display:flex;flex-direction:column;align-items:center;
padding:5px 10px;min-width:68px;flex-shrink:0;
border-right:1px solid var(–border);gap:1px;
transition:background .15s;
}
.ti:active{background:var(–s2)}
.ti-n{font-family:var(–mono);font-size:8px;color:var(–muted);white-space:nowrap}
.ti-v{font-family:var(–mono);font-size:12px;font-weight:800;line-height:1}
.ti-c{font-family:var(–mono);font-size:8px;font-weight:600}
.up{color:var(–green)}.dn{color:var(–red)}.fl{color:var(–muted)}

/* ── タブ ── */
.tabs{
position:sticky;top:88px;z-index:180;
background:rgba(6,13,26,.97);backdrop-filter:blur(20px);
border-bottom:1px solid var(–border);
display:flex;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
flex-shrink:0;padding:9px 14px;
font-size:11px;color:var(–muted);
border:none;background:none;cursor:pointer;font-family:var(–sans);
border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab.on{color:var(–cyan);border-bottom-color:var(–cyan);font-weight:700}

/* ── ページ ── */
.pg{display:none;padding:10px 12px 32px;animation:fadeUp .2s ease}
.pg.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── マーケットグリッド ── */
.mkt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.mkt-card{
background:var(–s1);border:1px solid var(–border);border-radius:10px;
padding:9px 10px;position:relative;overflow:hidden;
}
.mkt-card::after{
content:’’;position:absolute;bottom:0;left:0;right:0;height:2px;
}
.mkt-card.up::after{background:var(–green)}
.mkt-card.dn::after{background:var(–red)}
.mkt-lbl{font-family:var(–mono);font-size:8px;color:var(–muted);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.mkt-val{font-family:var(–mono);font-size:15px;font-weight:800;line-height:1;color:var(–white)}
.mkt-val.up{color:var(–green)}.mkt-val.dn{color:var(–red)}
.mkt-chg{font-family:var(–mono);font-size:9px;font-weight:600;margin-top:2px}
.live-tag{font-size:7px;padding:1px 3px;border-radius:3px;background:rgba(0,214,143,.12);color:var(–green);border:1px solid rgba(0,214,143,.25)}

/* ── サマリーカード ── */
.summary{
background:var(–s1);border:1px solid var(–border);border-radius:12px;
padding:12px;margin-bottom:8px;position:relative;overflow:hidden;
}
.summary::before{
content:’’;position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,var(–cyan),var(–blue));
}
.sum-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.sum-label{font-family:var(–mono);font-size:9px;color:var(–muted);margin-bottom:4px;letter-spacing:.1em;text-transform:uppercase}
.sum-title{font-size:20px;font-weight:800;color:var(–white);line-height:1.1}
.sum-pills{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.pill{
font-size:10px;padding:3px 8px;border-radius:20px;
border:1px solid var(–border);background:var(–s2);color:var(–body);
white-space:nowrap;
}
.pill.danger-高{color:var(–red);background:rgba(240,62,78,.1);border-color:rgba(240,62,78,.3)}
.pill.danger-中{color:var(–amber);background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.3)}
.pill.danger-低{color:var(–green);background:rgba(0,214,143,.1);border-color:rgba(0,214,143,.3)}
.pill.style{color:var(–cyan);background:rgba(0,196,212,.1);border-color:rgba(0,196,212,.3)}
.sum-text{font-size:12px;color:var(–body);line-height:1.7}

/* ── セクション ── */
.sec{margin-top:10px}
.sec-hdr{
font-family:var(–mono);font-size:9px;color:var(–muted);
letter-spacing:.15em;text-transform:uppercase;
margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.sec-hdr::after{content:’’;flex:1;height:1px;background:var(–border)}

/* ── テーマカード ── */
.theme-list{display:flex;flex-direction:column;gap:5px}
.tc{
background:var(–s1);border:1px solid var(–border);border-radius:10px;
padding:10px 12px;display:flex;align-items:flex-start;gap:10px;
}
.tc.A{border-left:3px solid var(–amber)}
.tc.B{border-left:3px solid var(–cyan)}
.tc.C{border-left:3px solid var(–dim)}
.tp{
font-family:var(–mono);font-size:10px;font-weight:800;
width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
flex-shrink:0;margin-top:1px;
}
.tp.A{background:rgba(245,166,35,.15);color:var(–amber);border:1px solid rgba(245,166,35,.3)}
.tp.B{background:rgba(0,196,212,.15);color:var(–cyan);border:1px solid rgba(0,196,212,.3)}
.tp.C{background:rgba(36,61,94,.4);color:var(–muted);border:1px solid var(–border)}
.tc-name{font-size:13px;font-weight:700;color:var(–white);margin-bottom:2px}
.tc-reason{font-size:11px;color:var(–muted);line-height:1.6}

/* ── 避けるテーマ ── */
.avoid-list{display:flex;flex-direction:column;gap:5px}
.ac{
background:rgba(240,62,78,.05);border:1px solid rgba(240,62,78,.2);
border-radius:10px;padding:9px 12px;
}
.ac-name{font-size:12px;font-weight:700;color:var(–red);margin-bottom:2px}
.ac-r{font-size:11px;color:var(–muted);line-height:1.6}

/* ── 監視銘柄 ── */
.watch-list{display:flex;flex-direction:column;gap:7px}
.wc{background:var(–s1);border:1px solid var(–border);border-radius:11px;padding:11px}
.wc-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.bucket{
font-family:var(–mono);font-size:8px;padding:2px 7px;border-radius:10px;
background:var(–s2);color:var(–muted);border:1px solid var(–border);
}
.bucket.先導株{background:rgba(245,166,35,.1);color:var(–amber);border-color:rgba(245,166,35,.25)}
.bucket.連想1軍{background:rgba(0,196,212,.1);color:var(–cyan);border-color:rgba(0,196,212,.25)}
.bucket.連想2軍{background:rgba(59,139,235,.1);color:var(–blue);border-color:rgba(59,139,235,.25)}
.bucket.危険株{background:rgba(240,62,78,.1);color:var(–red);border-color:rgba(240,62,78,.25)}
.wc-name{font-size:14px;font-weight:800;color:var(–white)}
.wc-code{font-family:var(–mono);font-size:10px;color:var(–muted);margin-left:2px}
.wc-reason{font-size:11px;color:var(–muted);margin-bottom:8px;line-height:1.6}
.wc-rows{display:grid;gap:4px}
.wr{display:grid;grid-template-columns:52px 1fr;gap:6px;font-size:11px;line-height:1.5}
.wk{color:var(–muted)}
.wv.trig{color:var(–green)}
.wv.stop{color:var(–red)}
.wv.time{color:var(–cyan);font-family:var(–mono)}

/* ── 条件リスト ── */
.cond-list{display:flex;flex-direction:column;gap:4px}
.ci{
background:var(–s1);border:1px solid var(–border);
border-radius:9px;padding:8px 11px;font-size:11px;line-height:1.65;color:var(–body);
}
.ci.skip{background:rgba(240,62,78,.05);border-color:rgba(240,62,78,.2);color:var(–red)}
.ci.danger{background:rgba(245,166,35,.05);border-color:rgba(245,166,35,.2)}
.ci::before{margin-right:4px}
.ci.skip::before{content:‘⛔’}
.ci.entry::before{content:‘✅’}
.ci.danger::before{content:‘⚠️’}

/* ── ニュース ── */
.news-list{display:flex;flex-direction:column;gap:4px}
.ni{
background:var(–s1);border:1px solid var(–border);border-radius:8px;
padding:7px 11px;font-size:11px;line-height:1.6;color:var(–body);
border-left-width:2px;
}
.ni.macro{border-left-color:var(–amber)}
.ni.stock{border-left-color:var(–cyan)}
.ni.supply{border-left-color:var(–purple)}
.ni.noise{border-left-color:var(–border);color:var(–muted)}

/* ── スコアリング ── */
.score-box{
display:flex;align-items:center;gap:12px;
background:var(–s1);border:1px solid var(–border);border-radius:12px;
padding:12px;margin-bottom:8px;
}
.score-ring{position:relative;width:60px;height:60px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-num{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
font-family:var(–mono);font-size:17px;font-weight:800;color:var(–white);
}
.score-info .ttl{font-size:13px;font-weight:700;color:var(–white);margin-bottom:3px}
.score-info .sub{font-size:11px;color:var(–muted);line-height:1.65}

/* ── 差分カード ── */
.gap-list{display:flex;flex-direction:column;gap:5px}
.gc{
background:var(–s1);border:1px solid var(–border);border-radius:10px;
padding:9px 11px;display:flex;gap:8px;align-items:flex-start;
}
.gi{font-size:15px;flex-shrink:0}
.gn{font-size:12px;font-weight:700;color:var(–white);margin-bottom:2px}
.gd{font-size:11px;color:var(–muted);line-height:1.55}

/* ── 精度履歴 ── */
.bars{display:flex;align-items:flex-end;gap:4px;height:68px;margin-bottom:5px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bv{font-family:var(–mono);font-size:8px;color:var(–muted)}
.bb{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bd{font-family:var(–mono);font-size:8px;color:var(–dim)}

/* ── 共通 ── */
.empty{
background:var(–s1);border:1px dashed var(–border);border-radius:11px;
padding:28px 16px;text-align:center;color:var(–muted);font-size:12px;
}
.loading{padding:40px 16px;text-align:center;color:var(–muted)}
.spin{width:22px;height:22px;border:2px solid var(–border);border-top-color:var(–cyan);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(–s1);border:1px solid var(–border);border-radius:11px;padding:11px;margin-bottom:7px}
.card h3{font-size:13px;font-weight:700;color:var(–white);margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(–border);color:var(–muted)}
.tag.hi{color:var(–cyan);border-color:rgba(0,196,212,.3)}
.fld{display:grid;gap:5px;margin-bottom:10px}
.fld label{font-size:11px;color:var(–muted)}
.fld input{
padding:9px 11px;border-radius:8px;border:1px solid var(–border);
background:var(–s1);color:var(–white);font:inherit;outline:none;
}
.fld input:focus{border-color:var(–blue)}
.sbtn{
background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;
border:none;border-radius:9px;padding:10px 16px;font:inherit;font-weight:700;
cursor:pointer;width:100%;
}

/* ── 9:05固有 ── */
.flow-list{display:flex;flex-direction:column;gap:5px}
.fc{
background:var(–s1);border:1px solid var(–border);border-radius:10px;
padding:9px 11px;display:flex;align-items:center;gap:9px;
}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fh{font-size:12px;font-weight:700;color:var(–white);margin-bottom:2px}
.fe{font-size:11px;color:var(–muted)}

/* ── 設定 ── */
.notice{
background:rgba(59,139,235,.08);border:1px solid rgba(59,139,235,.25);
border-radius:10px;padding:11px;font-size:12px;color:#b0ccf5;line-height:1.7;margin-bottom:12px;
}
</style>

</head>
<body>

<!-- ヘッダー -->

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">株</div>
    <div>
      <div class="hdr-title">株式AI分析</div>
      <div class="hdr-sub">日本株短期トレード用</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <span class="hdr-time" id="upd">—</span>
    <button class="rbtn" onclick="loadAll()">↻</button>
  </div>
</div>

<!-- リアルタイムティッカー -->

<div class="ticker">
  <div class="ticker-inner" id="ticker">
    <div class="ti"><div class="ti-n">読込中</div><div class="ti-v fl">—</div><div class="ti-c fl">—</div></div>
  </div>
</div>

<!-- タブ -->

<div class="tabs">
  <button class="tab on" onclick="sw('p600',this)">6:00 戦略</button>
  <button class="tab" onclick="sw('p905',this)">9:10 修正</button>
  <button class="tab" onclick="sw('p1200',this)">12:00 後場</button>
  <button class="tab" onclick="sw('p1535',this)">15:35 学習</button>
  <button class="tab" onclick="sw('plog',this)">ログ</button>
  <button class="tab" onclick="sw('pset',this)">設定</button>
</div>

<div id="p600" class="pg on"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
<div id="p905" class="pg"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
<div id="p1200" class="pg"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
<div id="p1535" class="pg"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
<div id="plog" class="pg"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
<div id="pset" class="pg"></div>

<script>
// ===== ユーティリティ =====
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function arr(v){return Array.isArray(v)?v:[];}
function nl2br(v){return esc(v??'').replace(/\n/g,'<br>');}
function join(list,empty='なし'){const f=arr(list).filter(Boolean);return f.length?f.join(' / '):empty;}
function cc(v){const s=String(v||'');return s.startsWith('+')?'up':s.startsWith('-')?'dn':'fl';}
function scC(s){return s>=70?'#00d68f':s>=50?'#f5a623':'#f03e4e';}

// ===== 設定 =====
const GHU='stk-u',GHR='stk-r';
let d600=null,d905=null,d1200=null,d1535=null,dlog=null,rtd={};

function base(){
  return'https://sszzkkzzkk.github.io/stock-analyzer';
}

// ===== タブ =====
function sw(id,btn){
  document.querySelectorAll('.pg').forEach(p=>{p.classList.remove('on');p.style.display='none';});
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById(id);
  el.classList.add('on');el.style.display='block';
  if(btn)btn.classList.add('on');
}
document.querySelectorAll('.pg').forEach((p,i)=>{if(i>0)p.style.display='none';});

// ===== データ取得 =====
async function fj(path){
  try{const r=await fetch(`${base()}/data/${path}?_=${Date.now()}`,{cache:'no-store'});if(!r.ok)return null;return await r.json();}
  catch{return null;}
}

async function loadAll(){
  document.getElementById('upd').textContent='更新中...';
  const[a,b,c,d,e]=await Promise.all([
    fj('latest_600.json'),fj('latest_905.json'),
    fj('latest_1200.json'),fj('latest_1535.json'),
    fj('review_log.json'),
  ]);
  d600=a;d905=b;d1200=c;d1535=d;dlog=e;
  render600();render905();render1200();render1535();renderLog();renderSet();
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  fetchRT();
}

// ===== リアルタイム =====
const RT=[
  {id:'^N225',n:'日経'},
  {id:'NIY=F',n:'先物'},
  {id:'^DJI',n:'DOW'},
  {id:'^IXIC',n:'NAS'},
  {id:'^GSPC',n:'S&P'},
  {id:'^SOX',n:'SOX'},
  {id:'USDJPY=X',n:'¥/$'},
  {id:'CL=F',n:'原油'},
  {id:'GC=F',n:'金'},
  {id:'^VIX',n:'VIX'},
];

function fp(sym,p){
  if(p==null)return'—';
  if(['USDJPY=X','^VIX'].includes(sym))return p.toFixed(2);
  if(p>1000)return p.toLocaleString('ja-JP',{maximumFractionDigits:0});
  return p.toFixed(2);
}
function fpct(pct){return pct==null?'—':(pct>=0?'+':'')+pct.toFixed(2)+'%';}
function rtCls(pct){return pct==null?'fl':pct>0?'up':pct<0?'dn':'fl';}

async function fetchRT(){
  const ids=RT.map(s=>s.id).join(',');
  const api=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ids)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent`;
  for(const px of[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`]){
    try{
      const r=await fetch(px(api),{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      let j=await r.json();
      if(j.contents)j=JSON.parse(j.contents);
      const qs=j?.quoteResponse?.result||[];
      if(!qs.length)continue;
      qs.forEach(q=>{rtd[q.symbol]={p:q.regularMarketPrice,pct:q.regularMarketChangePercent};});
      renderTicker();updateMktCards();return;
    }catch{continue;}
  }
}
setInterval(fetchRT,5*60*1000);

function renderTicker(){
  const el=document.getElementById('ticker');
  let h='';
  RT.forEach(s=>{
    const d=rtd[s.id];
    if(!d)return;
    const cls=rtCls(d.pct);
    h+=`<div class="ti"><div class="ti-n">${s.n}</div><div class="ti-v ${cls}">${fp(s.id,d.p)}</div><div class="ti-c ${cls}">${fpct(d.pct)}</div></div>`;
  });
  if(h)el.innerHTML=h;
}

function updateMktCards(){
  const map={'rt-nikkei':'^N225','rt-futures':'NIY=F','rt-dow':'^DJI','rt-usdjpy':'USDJPY=X','rt-sox':'^SOX','rt-oil':'CL=F'};
  const lbl={'rt-nikkei':'日経平均','rt-futures':'日経先物','rt-dow':'NYダウ','rt-usdjpy':'ドル円','rt-sox':'SOX','rt-oil':'原油WTI'};
  Object.entries(map).forEach(([eid,sym])=>{
    const el=document.getElementById(eid);
    if(!el)return;
    const d=rtd[sym];
    if(!d)return;
    const cls=rtCls(d.pct);
    el.className=`mkt-card ${cls}`;
    el.innerHTML=`
      <div class="mkt-lbl">${lbl[eid]}<span class="live-tag">LIVE</span></div>
      <div class="mkt-val ${cls}">${fp(sym,d.p)}</div>
      <div class="mkt-chg ${cls}">${fpct(d.pct)}</div>`;
  });
}

}
