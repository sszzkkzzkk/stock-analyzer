<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>株式AI分析</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--bg2:#0d1526;--bg3:#131f35;--bg4:#1a2840;
  --border:#1e2e48;--dim:#2a3f5f;--muted:#5a7a9a;--text:#b8cfe8;--bright:#e4f0ff;
  --accent:#2563eb;--accent2:#06b6d4;--green:#10d498;--red:#f05060;--amber:#f59e0b;
  --orange:#f97316;--purple:#8b5cf6;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-text-size-adjust:100%}
body{min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

/* ヘッダー */
.hdr{position:sticky;top:0;z-index:200;background:rgba(6,10,20,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(–border);padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(–mono);font-size:12px;color:var(–accent2);letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,212,152,.5)}60%{opacity:.6;box-shadow:0 0 0 6px rgba(16,212,152,0)}}
.hdr-r{display:flex;align-items:center;gap:8px}
.upd-time{font-family:var(–mono);font-size:10px;color:var(–muted)}
.refresh-btn{background:none;border:1px solid var(–border);color:var(–muted);font-size:15px;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;transition:all .2s}
.refresh-btn:active{background:var(–bg3);color:var(–bright)}

/* リアルタイムティッカー */
.ticker{background:var(–bg2);border-bottom:1px solid var(–border);position:sticky;top:49px;z-index:190;overflow:hidden}
.ticker-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 2px}
.ticker-inner::-webkit-scrollbar{display:none}
.ti{display:flex;flex-direction:column;align-items:center;padding:6px 10px;min-width:70px;flex-shrink:0;border-right:1px solid var(–border);gap:1px}
.ti-n{font-family:var(–mono);font-size:9px;color:var(–muted)}
.ti-v{font-family:var(–mono);font-size:12px;font-weight:600;color:var(–bright)}
.ti-c{font-family:var(–mono);font-size:9px}
.up{color:var(–green)}.dn{color:var(–red)}.fl{color:var(–muted)}
.live-badge{font-family:var(–mono);font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(16,212,152,.12);color:var(–green);border:1px solid rgba(16,212,152,.25)}

/* タブ */
.tabs{display:flex;background:rgba(6,10,20,.96);border-bottom:1px solid var(–border);position:sticky;top:98px;z-index:180;backdrop-filter:blur(16px)}
.tab{flex:1;padding:9px 0;font-size:10px;color:var(–muted);border:none;background:none;cursor:pointer;font-family:var(–sans);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.on{color:var(–accent2);border-bottom-color:var(–accent2);font-weight:500}

/* ページ */
.pg{display:none;padding:10px 12px 32px}
.pg.on{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 共通コンポーネント */
.sec{margin-top:14px}
.sec:first-child{margin-top:4px}
.sec-title{font-family:var(–mono);font-size:9px;color:var(–dim);letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:’’;flex:1;height:1px;background:var(–border)}

/* 相場サマリーカード（最重要） */
.summary-card{background:linear-gradient(135deg,var(–bg2) 0%,var(–bg3) 100%);border:1px solid var(–border);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.summary-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(–accent2),var(–green))}
.regime-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.regime-badge{font-size:11px;font-weight:700;color:var(–bright);background:var(–bg4);border:1px solid var(–border);padding:2px 10px;border-radius:20px}
.style-badge{font-size:10px;color:var(–accent2);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);padding:2px 8px;border-radius:20px}
.danger-badge{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid}
.danger-高{color:var(–red);background:rgba(240,80,96,.1);border-color:rgba(240,80,96,.3)}
.danger-中{color:var(–amber);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)}
.danger-低{color:var(–green);background:rgba(16,212,152,.1);border-color:rgba(16,212,152,.3)}
.summary-text{font-size:12px;color:var(–text);line-height:1.7}

/* マーケットグリッド */
.mkt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mkt-card{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:10px 12px;position:relative}
.mkt-card.live-card{border-color:rgba(16,212,152,.2)}
.mkt-label{font-family:var(–mono);font-size:9px;color:var(–muted);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.mkt-time{font-family:var(–mono);font-size:8px;color:var(–dim)}
.mkt-val{font-family:var(–mono);font-size:16px;font-weight:600;color:var(–bright);line-height:1}
.mkt-chg{font-family:var(–mono);font-size:10px;margin-top:3px}

/* テーマカード */
.theme-cards{display:flex;flex-direction:column;gap:7px}
.theme-card{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:12px;display:flex;align-items:flex-start;gap:10px}
.theme-card.A{border-left:3px solid var(–amber)}
.theme-card.B{border-left:3px solid var(–accent2)}
.theme-card.C{border-left:3px solid var(–dim)}
.priority-badge{font-family:var(–mono);font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.priority-badge.A{background:rgba(245,158,11,.15);color:var(–amber);border:1px solid rgba(245,158,11,.3)}
.priority-badge.B{background:rgba(6,182,212,.15);color:var(–accent2);border:1px solid rgba(6,182,212,.3)}
.priority-badge.C{background:rgba(42,63,95,.3);color:var(–muted);border:1px solid var(–border)}
.theme-name{font-size:14px;font-weight:700;color:var(–bright);margin-bottom:3px}
.theme-reason{font-size:11px;color:var(–muted);line-height:1.6}

/* 避けるテーマ */
.avoid-cards{display:flex;flex-direction:column;gap:5px}
.avoid-card{background:rgba(240,80,96,.04);border:1px solid rgba(240,80,96,.15);border-radius:10px;padding:10px 12px}
.avoid-name{font-size:12px;font-weight:700;color:var(–red);margin-bottom:2px}
.avoid-reason{font-size:11px;color:var(–muted);line-height:1.6}

/* 監視銘柄 */
.watch-cards{display:flex;flex-direction:column;gap:8px}
.watch-card{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:12px}
.watch-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.watch-bucket{font-family:var(–mono);font-size:9px;padding:2px 7px;border-radius:10px;background:var(–bg4);color:var(–muted);border:1px solid var(–border)}
.watch-bucket.先導株{background:rgba(245,158,11,.1);color:var(–amber);border-color:rgba(245,158,11,.2)}
.watch-bucket.連想1軍{background:rgba(6,182,212,.1);color:var(–accent2);border-color:rgba(6,182,212,.2)}
.watch-bucket.連想2軍{background:rgba(37,99,235,.1);color:#60a5fa;border-color:rgba(37,99,235,.2)}
.watch-bucket.危険株{background:rgba(240,80,96,.1);color:var(–red);border-color:rgba(240,80,96,.2)}
.watch-name{font-size:15px;font-weight:700;color:var(–bright)}
.watch-code{font-family:var(–mono);font-size:11px;color:var(–muted);margin-left:4px}
.watch-reason{font-size:11px;color:var(–muted);margin-bottom:8px;line-height:1.6}
.watch-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:11px}
.wg-label{color:var(–dim);white-space:nowrap}
.wg-val{color:var(–text)}
.wg-val.trigger{color:var(–green)}
.wg-val.stop{color:var(–red)}
.wg-val.time{color:var(–accent2);font-family:var(–mono)}

/* 条件リスト */
.cond-list{display:flex;flex-direction:column;gap:5px}
.cond-item{background:var(–bg2);border:1px solid var(–border);border-radius:9px;padding:9px 12px;font-size:12px;line-height:1.65;color:var(–text)}
.cond-item.skip{background:rgba(240,80,96,.04);border-color:rgba(240,80,96,.15);color:var(–red)}
.cond-item.skip::before{content:’⛔ ’}
.cond-item.entry::before{content:’✅ ’}
.cond-item.danger{background:rgba(245,158,11,.04);border-color:rgba(245,158,11,.15)}
.cond-item.danger::before{content:’⚠️ ’}

/* ニュース */
.news-list{display:flex;flex-direction:column;gap:4px}
.news-item{background:var(–bg2);border:1px solid var(–border);border-radius:8px;padding:8px 11px;font-size:12px;line-height:1.6;color:var(–text)}
.news-item.macro{border-left:2px solid var(–orange)}
.news-item.stock{border-left:2px solid var(–accent2)}
.news-item.supply{border-left:2px solid var(–purple)}

/* スコアリング */
.score-row{display:flex;align-items:center;gap:14px;background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:14px;margin-bottom:6px}
.score-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(–mono);font-size:18px;font-weight:700;color:var(–bright)}
.score-info .title{font-size:13px;font-weight:700;color:var(–bright);margin-bottom:4px}
.score-info .sub{font-size:11px;color:var(–muted);line-height:1.65}

/* 精度比較 */
.gap-cards{display:flex;flex-direction:column;gap:6px}
.gap-card{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:10px 12px;display:flex;align-items:flex-start;gap:9px}
.gap-icon{font-size:16px;flex-shrink:0}
.gap-theme{font-size:13px;font-weight:700;color:var(–bright);margin-bottom:2px}
.gap-detail{font-size:11px;color:var(–muted);line-height:1.55}

/* 精度履歴 */
.bars{display:flex;align-items:flex-end;gap:4px;height:72px;margin-bottom:5px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s ease}
.bar-d{font-family:var(–mono);font-size:9px;color:var(–dim)}
.bar-s{font-family:var(–mono);font-size:9px;color:var(–muted)}
.avg-txt{font-family:var(–mono);font-size:11px;color:var(–muted)}
.avg-val{color:var(–accent2);font-weight:600}

/* 空データ */
.empty{background:var(–bg2);border:1px solid var(–border);border-radius:12px;padding:36px 20px;text-align:center;color:var(–muted);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:12px;display:block}
.empty-sub{font-size:11px;margin-top:6px;color:var(–dim)}

/* ローディング */
.loading{padding:48px 20px;text-align:center;color:var(–muted);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(–border);border-top-color:var(–accent2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 設定 */
.settings-wrap{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(–muted);font-family:var(–mono);letter-spacing:.08em}
.field input{background:var(–bg2);border:1px solid var(–border);color:var(–bright);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(–accent)}
.save-btn{background:var(–accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.info-box{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:12px;font-size:12px;color:var(–muted);line-height:1.7}

/* データソースバッジ */
.src-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.src-b{font-family:var(–mono);font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.18);color:var(–accent2)}

/* タグ */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-family:var(–mono);font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(–border);color:var(–muted)}
.tag.hi{color:var(–accent2);border-color:rgba(6,182,212,.3)}
</style>

</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="live-dot"></div>
    株式AI分析
  </div>
  <div class="hdr-r">
    <span class="upd-time" id="upd-time">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻</button>
  </div>
</div>

<div class="ticker" id="ticker">
  <div class="ticker-inner" id="ticker-inner">
    <div class="ti"><div class="ti-n">読込中</div><div class="ti-v">—</div><div class="ti-c fl">—</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="sw('p600')">6:00戦略</button>
  <button class="tab" onclick="sw('p905')">9:10修正</button>
  <button class="tab" onclick="sw('p1535')">15:35学習</button>
  <button class="tab" onclick="sw('phist')">履歴</button>
  <button class="tab" onclick="sw('pset')">設定</button>
</div>

<div id="p600" class="pg on"><div id="c600"><div class="loading"><div class="spin"></div>読み込み中...</div></div></div>
<div id="p905" class="pg"><div id="c905"><div class="loading"><div class="spin"></div>読み込み中...</div></div></div>
<div id="p1535" class="pg"><div id="c1535"><div class="loading"><div class="spin"></div>読み込み中...</div></div></div>
<div id="phist" class="pg"><div id="chist"><div class="loading"><div class="spin"></div>読み込み中...</div></div></div>
<div id="pset" class="pg">
  <div class="sec"><div class="sec-title">接続設定</div>
  <div class="settings-wrap">
    <div class="field"><label>GitHub ユーザー名</label><input id="gh-u" type="text" placeholder="sszzkkzzkk"></div>
    <div class="field"><label>リポジトリ名</label><input id="gh-r" type="text" placeholder="stock-analyzer"></div>
    <button class="save-btn" onclick="saveSetting()">保存して接続</button>
    <div class="info-box">GitHub Pages が有効なリポジトリの data/ フォルダを参照します。</div>
  </div></div>
</div>

<script>
// ===== 設定 =====
const GHU='ghuser',GHR='ghrepo';
let d600=null,d905=null,d1535=null,dhist=null,rtd={};

function base(){return'https://sszzkkzzkk.github.io/stock-analyzer';}

// ===== タブ =====
const TABS=['p600','p905','p1535','phist','pset'];
function sw(id){
  TABS.forEach((t,i)=>{
    const p=document.getElementById(t);
    const b=document.querySelectorAll('.tab')[i];
    const on=t===id;
    p.classList.toggle('on',on);
    p.style.display=on?'block':'none';
    b.classList.toggle('on',on);
  });
}
TABS.slice(1).forEach(t=>{document.getElementById(t).style.display='none';});

// ===== ユーティリティ =====
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scC(s){return s>=70?'#10d498':s>=50?'#f59e0b':'#f05060';}
function empty(msg,sub=''){return`<div class="empty"><span class="empty-icon">📭</span>${esc(msg)}<div class="empty-sub">${esc(sub)}</div></div>`;}
function chgCls(v){
  if(v==null)return'fl';
  const s=String(v);
  return s.startsWith('-')?'dn':s.startsWith('+')||parseFloat(s)>0?'up':'fl';
}

// ===== リアルタイム株価 =====
const RT_SYMS=[
  {id:'^N225',n:'日経'},
  {id:'NIY=F',n:'先物'},
  {id:'^DJI',n:'DOW'},
  {id:'^IXIC',n:'NAS'},
  {id:'^GSPC',n:'S&P'},
  {id:'^SOX',n:'SOX'},
  {id:'USDJPY=X',n:'$/¥'},
  {id:'CL=F',n:'原油'},
  {id:'GC=F',n:'金'},
  {id:'^VIX',n:'VIX'},
];

async function fetchRT(){
  const ids=RT_SYMS.map(s=>s.id).join(',');
  const api=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ids)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent`;
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ];
  for(const px of proxies){
    try{
      const res=await fetch(px(api),{signal:AbortSignal.timeout(8000)});
      if(!res.ok)continue;
      let json=await res.json();
      if(json.contents)json=JSON.parse(json.contents);
      const quotes=json?.quoteResponse?.result||[];
      if(!quotes.length)continue;
      quotes.forEach(q=>{
        rtd[q.symbol]={p:q.regularMarketPrice,c:q.regularMarketChange,pct:q.regularMarketChangePercent};
      });
      renderTicker();
      renderRTCards();
      return;
    }catch(e){continue;}
  }
}

function fp(sym,p){
  if(p==null)return'—';
  if(['USDJPY=X','^VIX'].includes(sym))return p.toFixed(2);
  if(p>1000)return p.toLocaleString('ja-JP',{maximumFractionDigits:0});
  return p.toFixed(2);
}
function fpct(pct){
  if(pct==null)return'—';
  return(pct>=0?'+':'')+pct.toFixed(2)+'%';
}

function renderTicker(){
  const el=document.getElementById('ticker-inner');
  if(!el)return;
  let h='';
  RT_SYMS.forEach(s=>{
    const d=rtd[s.id];
    if(!d)return;
    const cls=d.pct>0?'up':d.pct<0?'dn':'fl';
    h+=`<div class="ti"><div class="ti-n">${s.n}</div><div class="ti-v">${fp(s.id,d.p)}</div><div class="ti-c ${cls}">${fpct(d.pct)}</div></div>`;
  });
  if(h)el.innerHTML=h;
}

function renderRTCards(){
  const map={
    'rt-nikkei':'^N225','rt-futures':'NIY=F','rt-dow':'^DJI',
    'rt-nasdaq':'^IXIC','rt-sp500':'^GSPC','rt-sox':'^SOX',
    'rt-usdjpy':'USDJPY=X','rt-oil':'CL=F','rt-gold':'GC=F','rt-vix':'^VIX'
  };
  const labels={
    'rt-nikkei':'日経平均','rt-futures':'日経先物','rt-dow':'NYダウ',
    'rt-nasdaq':'NASDAQ','rt-sp500':'S&P500','rt-sox':'SOX',
    'rt-usdjpy':'ドル円','rt-oil':'WTI原油','rt-gold':'金','rt-vix':'VIX'
  };
  Object.entries(map).forEach(([eid,sym])=>{
    const el=document.getElementById(eid);
    if(!el)return;
    const d=rtd[sym];
    if(!d)return;
    const cls=d.pct>0?'up':d.pct<0?'dn':'fl';
    el.innerHTML=`
      <div class="mkt-label">${labels[eid]} <span class="live-badge">LIVE</span></div>
      <div class="mkt-val ${cls}">${fp(sym,d.p)}</div>
      <div class="mkt-chg ${cls}">${fpct(d.pct)}</div>`;
  });
}

setInterval(fetchRT,5*60*1000);

// ===== データ取得 =====
async function fetchJ(url){
  try{const r=await fetch(url+'?_='+Date.now());if(!r.ok)return null;return await r.json();}
  catch{return null;}
}
async function loadAll(){
  document.getElementById('upd-time').textContent='更新中...';
  const b=base();
  await Promise.all([
    fetchJ(`${b}/data/latest_600.json`).then(d=>{d600=d;render600();}),
    fetchJ(`${b}/data/latest_905.json`).then(d=>{d905=d;render905();}),
    fetchJ(`${b}/data/latest_1535.json`).then(d=>{d1535=d;render1535();}),
    fetchJ(`${b}/data/accuracy_log.json`).then(d=>{dhist=d;renderHist();}),
  ]);
  document.getElementById('upd-time').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  fetchRT();
}

// ===== 6:00 =====
function render600(){
  const el=document.getElementById('c600');
  const d=d600;
  if(!d||!d.strategy){el.innerHTML=empty('6:00分析がありません','毎朝6:00に自動更新されます');return;}
  const st=d.strategy||{};
  const srcs=(d.data_sources||[]).map(s=>`<span class="src-b">${esc(s)}</span>`).join('');

  // マーケットデータ（静的＋RTカード混在）
  const md=d.market_data||{};
  const idx=md.indices?.[0]||{};
  const fut=md.futures?.[0]||{};
  const dow=md.world_indices?.[0]||{};
  const fx=md.forex?.[0]||{};
  const sox=md.sox?.[0]||{};
  const oil=md.oil?.[0]||{};

  function mktCard(eid,lbl,val,chg,pct,time){
    const cls=chgCls(chg||pct);
    return`<div class="mkt-card live-card" id="${eid}">
      <div class="mkt-label">${lbl} <span class="mkt-time">${esc(time||'')}</span></div>
      <div class="mkt-val ${cls}">${esc(val||'—')}</div>
      <div class="mkt-chg ${cls}">${esc(pct||chg||'—')}</div>
    </div>`;
  }

  // ニュース分類
  const classified=md.classified_news||{};
  const macroNews=(classified.macro||[]).map(n=>`<div class="news-item macro">${esc(n)}</div>`).join('');
  const stockNews=(classified.stock_specific||[]).map(n=>`<div class="news-item stock">${esc(n)}</div>`).join('');
  const supplyNews=(classified.supply_demand||[]).map(n=>`<div class="news-item supply">${esc(n)}</div>`).join('');
  const allNews=macroNews+stockNews+supplyNews||
    (md.key_news||[]).slice(0,6).map(n=>`<div class="news-item">${esc(n)}</div>`).join('');

  // テーマ
  const themes=(d.priority_themes||[]).map(t=>`
    <div class="theme-card ${esc(t.priority||'C')}">
      <div class="priority-badge ${esc(t.priority||'C')}">${esc(t.priority||'?')}</div>
      <div style="flex:1"><div class="theme-name">${esc(t.name||'')}</div><div class="theme-reason">${esc(t.reason||'')}</div></div>
    </div>`).join('');

  // 避けるテーマ
  const avoids=(d.avoid_themes||[]).map(t=>`
    <div class="avoid-card"><div class="avoid-name">🚫 ${esc(t.name||'')}</div><div class="avoid-reason">${esc(t.reason||'')}</div></div>`).join('');

  // 監視銘柄
  const watches=(d.watchlist||[]).map(w=>`
    <div class="watch-card">
      <div class="watch-header">
        <span class="watch-bucket ${esc(w.bucket||'')}">${esc(w.bucket||'')}</span>
        <span class="watch-name">${esc(w.name||'')}</span>
        <span class="watch-code">${esc(w.code||'')}</span>
      </div>
      <div class="watch-reason">${esc(w.reason||'')}</div>
      <div class="watch-grid">
        <div class="wg-label">仕掛け</div><div class="wg-val trigger">${esc(w.trigger||'—')}</div>
        <div class="wg-label">失効</div><div class="wg-val stop">${esc(w.invalidation||'—')}</div>
        <div class="wg-label">時間帯</div><div class="wg-val time">${esc(w.time_window||'—')}</div>
      </div>
    </div>`).join('');

  // 仕掛け条件
  const entries=(d.entry_conditions||[]).map(c=>`<div class="cond-item entry">${esc(c)}</div>`).join('');
  const skips=(d.skip_conditions||[]).map(c=>`<div class="cond-item skip">${esc(c)}</div>`).join('');
  const dangers=(d.danger_patterns||[]).map(c=>`<div class="cond-item danger">${esc(c)}</div>`).join('');

  el.innerHTML=`
    ${srcs?`<div class="src-row">${srcs}</div>`:''}

    <div class="sec">
      <div class="summary-card">
        <div class="regime-row">
          <span class="regime-badge">${esc(st.market_regime_label||st.market_regime||'—')}</span>
          <span class="style-badge">${esc(st.entry_style_label||st.entry_style||'—')}</span>
          <span class="danger-badge danger-${esc(st.danger_level||'中')}">危険度 ${esc(st.danger_level||'—')}</span>
        </div>
        <div class="summary-text">${esc(st.conclusion||d.summary||'—')}</div>
      </div>
    </div>

    <div class="sec"><div class="sec-title">リアルタイム市場</div>
    <div class="mkt-grid">
      ${mktCard('rt-nikkei','日経平均',idx.value,idx.change,idx.percent,idx.time)}
      ${mktCard('rt-futures','日経先物',fut.value,fut.change,fut.percent,fut.time)}
      ${mktCard('rt-dow','NYダウ',dow.value,dow.change,dow.percent,dow.time)}
      ${mktCard('rt-usdjpy','ドル円',fx.value,fx.change,fx.percent,fx.time)}
      ${mktCard('rt-sox','SOX',sox.value,sox.change,sox.percent,sox.time)}
      ${mktCard('rt-oil','WTI原油',oil.value,oil.change,oil.percent,oil.time)}
    </div></div>

    ${allNews?`<div class="sec"><div class="sec-title">本日のニュース</div><div class="news-list">${allNews}</div></div>`:''}

    ${themes?`<div class="sec"><div class="sec-title">本命テーマ</div><div class="theme-cards">${themes}</div></div>`:''}

    ${avoids?`<div class="sec"><div class="sec-title">見ないテーマ</div><div class="avoid-cards">${avoids}</div></div>`:''}

    ${watches?`<div class="sec"><div class="sec-title">監視銘柄一覧</div><div class="watch-cards">${watches}</div></div>`:''}

    ${entries?`<div class="sec"><div class="sec-title">仕掛け条件</div><div class="cond-list">${entries}</div></div>`:''}

    ${skips?`<div class="sec"><div class="sec-title">やらないこと</div><div class="cond-list">${skips}</div></div>`:''}

    ${dangers?`<div class="sec"><div class="sec-title">危険パターン</div><div class="cond-list">${dangers}</div></div>`:''}
  `;
  renderRTCards();
}

  const sc=d.morning_accuracy_score||0;

    ${srcs?`<div class="src-row">${srcs}</div>`:''}
    <div class="sec">
    <div class="score-row">
      <div class="score-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="#131f35" stroke-width="5"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke-width="5" stroke="${col}"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"
            stroke-linecap="round" id="ring905"/>
        </svg>
        <div class="score-num">${sc}</div>
      </div>
      <div class="score-info">
        <div class="title">寄り付き精度</div>
        <div class="sub">
          日経: ${esc(op.nikkei_open||'—')} (${esc(op.nikkei_change||'—')})<br>
          市場: ${esc(op.market_tone||'—')}<br>
          主役: ${esc(op.dominant_theme||'—')}
        </div>
      </div>
    </div></div>

    ${flow?`<div class="sec"><div class="sec-title">実際の資金の流れ</div><div class="watch-cards">${flow}</div></div>`:''}
    ${gaps?`<div class="sec"><div class="sec-title">予測との差分</div><div class="gap-cards">${gaps}</div></div>`:''}
    ${watch?`<div class="sec"><div class="sec-title">午後も注目</div><div class="tags">${watch}</div></div>`:''}
    ${faded?`<div class="sec"><div class="sec-title">朝だけのテーマ</div><div class="tags">${faded}</div></div>`:''}
    ${hints?`<div class="sec"><div class="sec-title">15:35への修正ヒント</div><div class="cond-list">${hints}</div></div>`:''}
    <div class="sec"><div class="sec-title">寄り付き総評</div>
    <div class="summary-card"><div class="summary-text">${esc(d.summary||'—')}</div></div></div>
  `;
  requestAnimationFrame(()=>{
    const r=document.getElementById('ring905');
    if(r)setTimeout(()=>{r.style.transition='stroke-dashoffset .9s ease';r.setAttribute('stroke-dashoffset',offset.toFixed(1));},150);
  });
}

// ===== 精度履歴 =====
function renderHist(){
  const el=document.getElementById('chist');
  if(!dhist||!dhist.length){el.innerHTML=empty('精度履歴がありません','15:35評価が蓄積されると表示されます');return;}
  const recent=dhist.slice(-14);
  const avg=Math.round(recent.reduce((s,r)=>s+(r.accuracy_score||0),0)/recent.length);
  const bars=recent.map(r=>{
    const h=Math.round(((r.accuracy_score||0)/100)*58)+4;
    const col=(r.accuracy_score||0)>=70?'#10d498':(r.accuracy_score||0)>=50?'#f59e0b':'#f05060';
    const dt=(r.date||'').slice(5);
    return`<div class="bar-col"><div class="bar-s">${r.accuracy_score||0}</div><div class="bar" style="height:${h}px;background:${col}"></div><div class="bar-d">${dt}</div></div>`;
  }).join('');
  el.innerHTML=`
    <div class="sec"><div class="sec-title">精度トレンド（直近${recent.length}営業日）</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px">
      <div class="bars">${bars}</div>
      <div class="avg-txt">平均精度: <span class="avg-val">${avg}/100</span></div>
    </div></div>
  `;
}

// ===== 設定 =====
function saveSetting(){
  const u=document.getElementById('gh-u').value.trim();
  const r=document.getElementById('gh-r').value.trim();
  if(!u||!r){alert('入力してください');return;}
  localStorage.setItem(GHU,u);localStorage.setItem(GHR,r);
  sw('p600');loadAll();
}

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded',()=>{
  const u=localStorage.getItem(GHU)||'',r=localStorage.getItem(GHR)||'';
  if(u)document.getElementById('gh-u').value=u;
  if(r)document.getElementById('gh-r').value=r;
  loadAll();
});
</script>
